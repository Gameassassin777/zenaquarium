<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#001428">
<title>Zen Aquarium</title>
<link id="mlink" rel="manifest" href="#">
<style>
:root {
  --ui-accent: #67e8f9;
  --ui-accent-rgb: 103, 232, 249;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:100vw;height:100dvh;position:fixed;overflow:hidden;background:#001428;font-family:system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;padding-bottom:env(safe-area-inset-bottom);}
canvas{position:fixed;top:0;left:0;}

#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:max(25px,env(safe-area-inset-top)) 15px 0;z-index:10;pointer-events:none;gap:7px;}
.dash{background:rgba(0,10,25,.9);border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:22px;padding:7px 10px;display:flex;gap:10px;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:0 4px 14px rgba(0,0,0,.4);transition:all .3s;}
.dash.harmony{border-color:#fbbf24;box-shadow:0 0 16px rgba(251,191,36,.3);background:rgba(20,15,0,.9);}
.stat{display:flex;flex-direction:column;align-items:center;padding:0 6px;border-right:1px solid rgba(255,255,255,.07);}
.stat:last-child{border-right:none;}
.slbl{font-size:9px;text-transform:uppercase;color:#475569;letter-spacing:.5px;font-weight:700;}
.sval{font-size:14px;font-weight:800;color:#e2e8f0;transition:color .2s; display:flex; align-items:center; gap:3px;}
.sval svg { color: var(--ui-accent); width:1.1em; height:1.1em; }
.vg{color:#fbbf24;} .vg svg{color:#fbbf24;} 
.vw{color:#ef4444;} .vw svg{color:#ef4444;}

.hbtn{pointer-events:all;cursor:pointer;font-family:inherit;font-weight:bold;-webkit-tap-highlight-color:transparent;transition:all .15s;box-shadow:0 3px 10px rgba(0,0,0,.4);border-radius:20px;padding:8px 13px;font-size:12px; display:flex; align-items:center; gap:5px;}
.hbtn:active{transform:scale(.91);}
#modebtn{background:rgba(0,20,50,.9);color:var(--ui-accent);border:1px solid rgba(var(--ui-accent-rgb),.3);}
#modebtn.cleaning{background:#065f46;color:#fff;border-color:#34d399;}

#combo-ui{position:fixed;top:calc(75px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) scale(.8);opacity:0;color:#fbbf24;font-size:20px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.8);pointer-events:none;transition:all .15s cubic-bezier(.4,0,.2,1);z-index:9;text-align:center;}
#combo-ui.on{transform:translateX(-50%) scale(1);opacity:1;}
.cbar{width:100%;height:3px;background:rgba(0,0,0,.5);border-radius:2px;margin-top:4px;}
.cfill{height:100%;background:#fbbf24;transform-origin:left;border-radius:2px;}

/* IMPROVED BOTTOM NAV */
#nav{
  position:fixed;
  bottom:0;
  left:0;right:0;
  height:68px;
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(0,5,16,.97);
  border-top:1px solid rgba(var(--ui-accent-rgb),.15);
  display:flex;
  z-index:25;
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  box-shadow:0 -2px 20px rgba(0,0,0,.4);
}
.nb{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  background:none;
  border:none;
  color:#64748b;
  font-size:10px;
  font-weight:700;
  letter-spacing:.3px;
  cursor:pointer;
  transition:all .2s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.nb svg {font-size:22px; transition:transform .2s;}
.nb.active{
  color:var(--ui-accent);
}
.nb.active svg{
  transform:scale(1.15);
}
.nb.active::after{
  content:'';
  position:absolute;
  bottom:6px;
  width:5px;
  height:5px;
  background:var(--ui-accent);
  border-radius:50%;
  box-shadow:0 0 8px var(--ui-accent);
}
.nb:active{transform:scale(0.92);}

#sov{position:fixed;inset:0;background:rgba(0,0,0,.74);z-index:20;opacity:0;pointer-events:none;transition:opacity .28s;}
#sov.open{opacity:1;pointer-events:all;}
.panel{position:fixed;bottom:0;left:0;right:0;background:#00091a;border-top:1px solid rgba(var(--ui-accent-rgb),.15);border-radius:22px 22px 0 0;padding:18px 14px calc(85px + env(safe-area-inset-bottom));z-index:21;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);height:85dvh;display:flex;flex-direction:column;}
.panel.open{transform:translateY(0);}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-shrink:0;}
.pt{color:var(--ui-accent);font-size:18px;font-weight:bold; display:flex; align-items:center; gap:6px;}
.pscroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.xbtn{background:none;border:none;color:#4b5563;font-size:21px;cursor:pointer;box-shadow:none;padding:0;line-height:1;}

.sechead{color:#334155;font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;border-bottom:1px solid #0a1628;padding-bottom:5px;margin:14px 0 0;}
.sechead:first-child{margin-top:0;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px;}
.card{background:linear-gradient(145deg,rgba(0,28,60,.85),rgba(0,10,28,.9));border:1px solid rgba(0,80,140,.28);border-radius:13px;padding:11px 8px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;position:relative;overflow:hidden;}
.card:active{transform:scale(.93);}
.buyable{border-color:rgba(16,185,129,.4)!important;background:linear-gradient(145deg,rgba(0,48,36,.85),rgba(0,20,40,.9))!important;}
.equipped{border-color:rgba(var(--ui-accent-rgb),.6)!important;background:linear-gradient(145deg,rgba(0,40,70,.85),rgba(0,15,35,.9))!important;}
.full{opacity:.38;cursor:default;filter:grayscale(70%);}
.full:active{transform:none!important;}
.locked{opacity:.38;pointer-events:none;}
.locked::after{content:'LOCKED Lv'attr(data-req);position:absolute;inset:0;background:rgba(0,5,16,.82);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#475569;border-radius:13px;}

.ci{font-size:26px;display:block;margin-bottom:2px; color:#e2e8f0;}
.cn{color:#f1f5f9;font-size:12px;font-weight:bold;display:block;margin:1px 0;}
.cd{color:#475569;font-size:9.5px;margin-bottom:5px;display:block;line-height:1.3;height:22px;}
.cpr{color:#fbbf24;font-size:12px;font-weight:900;}
.cown{color:var(--ui-accent);font-size:9.5px;margin-top:3px;display:block;font-weight:bold;}

.ocard{background:linear-gradient(145deg,rgba(0,28,60,.85),rgba(0,10,28,.9));border:1px solid rgba(0,80,140,.22);border-radius:13px;padding:12px;margin-bottom:9px;}
.ocard.odone{border-color:rgba(16,185,129,.4);}
.ocard.oclaimed{opacity:.3;pointer-events:none;}
.ohead{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.oico{font-size:22px; color:#e2e8f0;}
.odesc{color:#f1f5f9;font-size:12px;font-weight:600;display:block;}
.orew{color:#fbbf24;font-size:11px;font-weight:700;}
.opbg{background:rgba(0,0,0,.45);border-radius:4px;height:6px;overflow:hidden;margin-bottom:7px;}
.opf{height:100%;background:linear-gradient(90deg, var(--ui-accent), #38bdf8);border-radius:4px;transition:width .4s;}
.opf.odone{background:linear-gradient(90deg,#10b981,#34d399);}
.ofoot{display:flex;justify-content:space-between;align-items:center;}
.ocnt{color:#374151;font-size:10px; display:flex; align-items:center; gap:4px;}

.cbtn2{background:#10b981;color:#fff;border:none;border-radius:9px;padding:5px 12px;font-weight:bold;font-size:11px;cursor:pointer;box-shadow:none;-webkit-tap-highlight-color:transparent;}
.cbtn2:disabled{background:#1e293b;color:#374151;cursor:default;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .28s;}
.modal.show{opacity:1;pointer-events:all;}
.mbox{background:#00091a;border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:22px;padding:22px 18px;width:min(100%,360px);text-align:center;}
.mbox h2{color:var(--ui-accent);font-size:18px;font-weight:bold;margin-bottom:3px;}
.msub{color:#475569;font-size:12px;display:block;margin-bottom:10px;}
.mbtn{width:100%;padding:12px;border:none;border-radius:13px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:none;margin-top:11px;-webkit-tap-highlight-color:transparent;}
.mbtn.gold{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;}

.wrow{display:flex;justify-content:space-between;align-items:center; padding:6px 10px;background:rgba(0,20,48,.55);border-radius:9px;margin-bottom:5px;}
.wrow span:first-child{color:#94a3b8;font-size:12px; display:flex; align-items:center; gap:5px;}
.wrow span:last-child{color:#fbbf24;font-weight:bold;font-size:12px;}

.drbox{background:rgba(251,191,36,.08);border:2px solid rgba(251,191,36,.28);border-radius:13px;padding:14px;margin:10px 0;}
.dramt{font-size:40px;font-weight:900;color:#fbbf24;}
.sdots{display:flex;justify-content:center;gap:5px;margin-top:9px;}
.sd{width:9px;height:9px;border-radius:50%;background:#0f172a;}
.sd.done{background:#fbbf24;}
.sd.today{background:#fbbf24;box-shadow:0 0 5px #fbbf24;}

.codebox{background:rgba(0,20,48,.6);border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:11px;padding:13px;text-align:center;margin-bottom:14px;}
.cbig{font-size:23px;font-weight:900;color:var(--ui-accent);letter-spacing:4px;font-family:monospace;display:block;margin:5px 0;}
.chint{color:#374151;font-size:10px;}
.copybtn{background:rgba(var(--ui-accent-rgb),.08);color:var(--ui-accent);border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:9px;padding:6px 14px;font-size:12px;font-weight:bold;margin-top:7px;cursor:pointer;}
.irow{display:flex;gap:7px;margin-bottom:10px;}
.cinput{flex:1;background:rgba(0,20,48,.7);border:1px solid rgba(var(--ui-accent-rgb),.16);color:#e2e8f0;border-radius:10px;padding:10px;font-size:14px;font-family:monospace;font-weight:bold;letter-spacing:2px;text-transform:uppercase;outline:none;}
.rbtn{background:#10b981;color:#fff;border:none;border-radius:10px;padding:10px 12px;font-weight:bold;cursor:pointer;font-size:13px;}

.resetbtn{background:#ef4444;color:#fff;border:none;border-radius:13px;padding:14px;font-weight:bold;font-size:14px;cursor:pointer;margin-top:20px;width:100%;}

.ft{position:fixed;pointer-events:none;z-index:30;font-weight:900;animation:spk 1.2s cubic-bezier(.2,.8,.2,1) forwards;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.8); display:flex; align-items:center; gap:4px;}
@keyframes spk{0%{transform:translateY(0) scale(.5);opacity:0;}15%{transform:translateY(-18px) scale(1.15);opacity:1;}100%{transform:translateY(-62px) scale(.8);opacity:0;}}
#toast{position:fixed;top:calc(75px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:6px 14px;border-radius:14px;font-weight:bold;font-size:12px;pointer-events:none;opacity:0;transition:opacity .28s;z-index:55;color:#fff;white-space:nowrap;}
.trait-icon{display:inline-flex; align-items:center; justify-content:center; width:14px;height:14px;border-radius:50%;font-size:9px;margin-right:4px;background:rgba(0,0,0,0.3); color:#fff;}

.swatch-row { display:flex; gap:10px; justify-content:center; margin: 5px 0 15px 0; }
.swatch { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s; }
.swatch:active { transform:scale(0.8); }
.swatch.active { border-color:#fff; box-shadow:0 0 10px currentColor; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="dash" id="mdash">
    <div class="stat"><span class="slbl">Lvl</span><span class="sval vl" id="lbl-lvl"></span></div>
    <div class="stat"><span class="slbl">Coins</span><span class="sval vg" id="lbl-cv"></span></div>
    <div class="stat"><span class="slbl">Water</span><span class="sval" id="wvc"></span></div>
    <div class="stat"><span class="slbl">Fish</span><span class="sval" id="lbl-fv"></span></div>
  </div>
  <button class="hbtn" id="modebtn" onclick="toggleMode()"></button>
</div>
<div id="combo-ui"><div id="ctxt">Combo x1.0</div><div class="cbar"><div class="cfill" id="cfill"></div></div></div>

<nav id="nav">
  <button class="nb active" id="nb-tank"   onclick="setTab('tank')"><span class="ni" id="ic-nav-tank"></span>Tank</button>
  <button class="nb"        id="nb-market" onclick="setTab('market')"><span class="ni" id="ic-nav-market"></span>Market</button>
  <button class="nb"        id="nb-decor"  onclick="setTab('decor')"><span class="ni" id="ic-nav-decor"></span>Decor</button>
  <button class="nb"        id="nb-orders" onclick="setTab('orders')"><span class="ni" id="ic-nav-orders"></span>Orders</button>
  <button class="nb"        id="nb-shop"   onclick="setTab('shop')"><span class="ni" id="ic-nav-shop"></span>Shop</button>
  <button class="nb"        id="nb-social" onclick="setTab('social')"><span class="ni" id="ic-nav-social"></span>Social</button>
</nav>
<div id="sov" onclick="closeAll()"></div>
