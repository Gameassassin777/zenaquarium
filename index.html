    // Per-floor grain/pebble texture
    const grainCol = fl.grain || '#ffffff';
    for(let i = 0; i < 600; i++) {
       const r1 = Math.abs((Math.sin(i * 12.9898) * 43758.5453) % 1);
       const r2 = Math.abs((Math.cos(i * 78.233)  * 43758.5453) % 1);
       const r3 = Math.abs((Math.sin(i * 37.719)  * 43758.5453) % 1);

         sc.globalAlpha = alpha * 1.8;

        sg.addColorStop(0, 'rgba(216,180,254,0.9)'); sg.addColorStop(0.5, 'rgba(255,255,255,0.95)'); sg.addColorStop(1, 'rgba(139,92,246,0.7)');
        sc.fillStyle = sg;
        sc.beginPath(); sc.moveTo(0,-10); sc.lineTo(4,0); sc.lineTo(0,10); sc.lineTo(-4,0); sc.closePath(); sc.fill();
        sc.restore();
      }
    } else if(curFloor === 'snow') {
      // Ice crack lines
      sc.strokeStyle = 'rgba(224,242,254,0.5)'; sc.lineWidth = 1;
      for(let i = 0; i < 20; i++) {
        const r1 = Math.abs((Math.sin(i * 41.7) * 43758.5) % 1);
        const r2 = Math.abs((Math.cos(i * 29.3) * 43758.5) % 1);
        const r3 = Math.abs((Math.sin(i * 67.1) * 43758.5) % 1);
        sc.beginPath(); sc.moveTo(r1 * W, by + r2 * 60);
        sc.lineTo(r1 * W + (r3 - 0.5) * 80, by + r2 * 60 + 30 + r3 * 40); sc.stroke();
      }
    } else if(curFloor === 'gold') {
      // Gold glimmer sparkles
      sc.fillStyle = 'rgba(255,255,180,0.9)';
      for(let i = 0; i < 80; i++) {
        const r1 = Math.abs((Math.sin(i * 53.9) * 43758.5) % 1);
        const r2 = Math.abs((Math.cos(i * 31.7) * 43758.5) % 1);
        sc.globalAlpha = 0.4 + r2 * 0.5;
        sc.beginPath(); sc.arc(r1 * W, by + r2 * 90, 1 + r1 * 1.5, 0, Math.PI * 2); sc.fill();
      }
      sc.globalAlpha = 1;
    } else if(curFloor === 'coral') {
      // Coral branch stumps
      for(let i = 0; i < 25; i++) {
        const r1 = Math.abs((Math.sin(i * 47.2) * 43758.5) % 1);
        const h = 12 + r1 * 20;
        const cx = (i / 25) * W + (r1 - 0.5) * 20;
        const cy = by + 2;
        sc.strokeStyle = `rgba(251,146,60,${0.5 + r1 * 0.45})`; sc.lineWidth = 3 + r1 * 3; sc.lineCap = 'round';
        sc.beginPath(); sc.moveTo(cx, cy + h); sc.lineTo(cx, cy);
        sc.lineTo(cx - 5, cy - 6); sc.moveTo(cx, cy); sc.lineTo(cx + 5, cy - 5); sc.stroke();
      }
    }
    sc.restore();
    // surface edge highlight
    sc.strokeStyle = 'rgba(255,255,255,0.2)'; sc.lineWidth = 2;
    sc.beginPath(); sc.moveTo(-20, by + getH(-20));
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i));
    sc.stroke();
    sc.strokeStyle = 'rgba(0,0,0,0.25)'; sc.lineWidth = 1;
    sc.beginPath(); sc.moveTo(-20, by + getH(-20) + 2);
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i) + 2);
    sc.stroke();
  }
  ctx.drawImage(_substrateCanvas, 0, 0);

  // ── Border rendered on canvas (box-shadow is clipped by body overflow:hidden) ──
  if(curBorder !== 'none') {
    const bd = BORDERS[curBorder];
    const thick = 14;
    const pulse = curBorder === 'pulse' ? 0.55 + 0.45 * Math.abs(Math.sin(time * 0.04)) :
                  curBorder === 'electric' ? 0.6 + 0.4 * Math.abs(Math.sin(time * 0.08)) : 0.85;
    const alpha = pulse;
    const gAlpha = pulse * 0.35;
    ctx.save();
    // outer glow
    ctx.shadowBlur = 28;
    ctx.shadowColor = `rgba(${bd.r},${bd.g},${bd.gb},${gAlpha + 0.15})`;
    ctx.strokeStyle = `rgba(${bd.r},${bd.g},${bd.gb},${alpha})`;
    ctx.lineWidth = thick;
    ctx.strokeRect(thick/2, thick/2, W - thick, H - thick);
    // inner bright rim
    ctx.shadowBlur = 14;
    ctx.strokeStyle = `rgba(${Math.min(255,bd.r+80)},${Math.min(255,bd.g+80)},${Math.min(255,bd.gb+80)},${alpha * 0.5})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(thick + 2, thick + 2, W - thick * 2 - 4, H - thick * 2 - 4);
    // corner decorations
    const cr = 22;
    ctx.lineWidth = 3;
    ctx.strokeStyle = `rgba(${bd.r},${bd.g},${bd.gb},${alpha})`;
    [[cr,cr],[W-cr,cr],[cr,H-cr],[W-cr,H-cr]].forEach(([cx2,cy2]) => {
      ctx.beginPath();
      ctx.arc(cx2, cy2, cr * 0.65, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  saveTimer++;
  if(saveTimer>=1800){saveTimer=0;saveGame();}

} catch(crashError) {
  // Log every crash to console so subsequent failures are visible
  console.error('[ZenAquarium] LOOP CRASH:', crashError);
  window._lastLoopError = crashError;
  window._loopCrashCount = (window._loopCrashCount||0) + 1;

function dropFood(x,y) {

function doTap(x,y){
  if(isClean){
    if(algae>0){
      algae=Math.max(0,algae-.5);sm.cleaned+=.5;
      giveXP(2);
      if(Math.random()<.3)bubbles.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,r:2+Math.random()*3,spd:3,ph:0,life:1});
      if(Math.random()<.08)spawnJuice(x,y, ICONS.clean,'#34d399',.8);
    }
  }else{
    // Check visitor tap first
    for(const v of visitorList) {
      const sz = (v.def.sz || 24) * 1.5;
      if(Math.hypot(v.x - x, v.y - y) < sz) {
        if(v.spooked) return;
        v._tapCount = (v._tapCount || 0) + 1;
        v._tapReset = 180;
        if(v._tapCount > 5) {
          v.spooked = true; v.spookedTimer = 300;
          v.trust = Math.max(0, v.trust - 20); v._tapCount = 0;
          toast('You spooked the ' + v.def.name + '!', '#ef4444');
        } else {
          v.trust = Math.min(100, v.trust + 8);
          for(let i=0;i<3;i++) particles.push({x:v.x,y:v.y-20,vx:(Math.random()-.5)*2,vy:-1-Math.random()*1.5,life:0.8,c:'#a855f7'});
        }
        return;
      }
    }
    let hitFish = null;
    for(const f of fishList) {
      const s = TYPES[f.type].sz * f.scale * (f.genes.szMod||1);
      if(Math.hypot(f.x - x, f.y - y) < s * 2) { hitFish = f; break; }
    }
    if(hitFish) {
      hitFish._nameTs = Date.now();
      if(hitFish.bonded < 300) { 
        hitFish.bonded = 3600;
        sm.bonded++;
        for(let i=0;i<6;i++) particles.push({x:x,y:y-30,vx:(Math.random()-.5)*3,vy:-1-Math.random()*2,life:1,c:'#fb7185'});
      }
      return; 
    }
    dropFood(x,y);
  }
}

  const xpFish=fishList.find(f=>f._colorBonus?.bonus==='xpMult');

function checkLevel(){

function tickVisitor() {
  const now = Date.now();
  if(now - _lastVisitorCheck < 60000) return; // check every 60 s
  _lastVisitorCheck = now;
  if(visitorList.length > 0) return;
  if(fishList.length === 0) return;
  const eligible = Object.entries(VISITOR_SPECIES).filter(([k,v]) => v.era <= currentEra);
  if(!eligible.length) return;
  // Per-check chance = hourlyRate / 60, so average rate caps at 10 %/hr at era 5
  const hourlyRate = Math.min(0.10, 0.02 + currentEra * 0.016);
  const baseChance = hourlyRate / 60;
  if(Math.random() > baseChance) return;
  const weights = eligible.map(([k,v]) => v.rarity);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  let chosen = null, chosenKey = null;
  for(const [k,v] of eligible) { r -= v.rarity; if(r <= 0) { chosen = v; chosenKey = k; break; } }
  if(!chosen) { chosen = eligible[0][1]; chosenKey = eligible[0][0]; }
  let echoCopy = null;
  if(chosen.isEcho) {
    const base = [...fishList].sort((a,b) => (b.isRare?1:0) - (a.isRare?1:0) || b.age - a.age)[0];
    if(!base) return;
    echoCopy = base;
  }
  spawnVisitor(chosenKey, chosen, echoCopy);
}

function spawnVisitor(key, def, echoCopy) {
  const fromLeft = Math.random() < 0.5;
  const genes = echoCopy
    ? { ...echoCopy.genes, szMod: 1.0 }
    : { c1:[def.c1, def.c1], c2:[def.c2, def.c2], trait:['active','active'], szMod:1.0 };
  const sz = def.isEcho && echoCopy ? (TYPES[echoCopy.type]?.sz || 24) : def.sz;
  const v = {
    id: 'v_' + Date.now(),
    key, def,
    type: echoCopy ? echoCopy.type : 'guppy',
    x: fromLeft ? -80 : W + 80,
    y: 110 + Math.random() * (SWIM_BOT() - 200),
    vx: fromLeft ? 0.8 + Math.random()*0.4 : -(0.8 + Math.random()*0.4),
    vy: (Math.random() - 0.5) * 0.3,
    phase: Math.random() * Math.PI * 2,
    timer: 0, eat: 0, hunger: 100, age: 30000, scale: 1.0, bonded: 0, bcd: 0,
    genes, isRare: false, isVisitor: true,
    trust: 0, trustTimer: def.trustTime * 60, spooked: false, spookedTimer: 0,
    name: def.name, abyssal: def.abyssal || false, isEcho: def.isEcho || false,
    echoCopy: echoCopy ? echoCopy.type : null, _sz: sz,
    birthTime: Date.now() - 30000*16.666,
  };
  computeColorBonus(v);
  visitorList.push(v);
  toast(ICONS.eye+' '+def.name+' spotted...','#6366f1');
}

function updateVisitors() {
  for(let i = visitorList.length - 1; i >= 0; i--) {
    const v = visitorList[i];
    v.timer++;
    v.phase += 0.1;
    if(v._tapReset > 0) { v._tapReset--; if(v._tapReset <= 0) v._tapCount = 0; }
    v.vx *= 0.97; v.vy *= 0.97;
    if(v.timer % 90 === 0) { v.vx += (Math.random()-.5)*0.6; v.vy += (Math.random()-.5)*0.3; }
    const spd = v.def.spd;
    const cap = spd * 2;
    const sp = Math.hypot(v.vx, v.vy);
    if(sp > cap) { v.vx *= cap/sp; v.vy *= cap/sp; }
    if(Math.abs(v.vx) < spd * 0.3) v.vx += v.vx >= 0 ? 0.15 : -0.15;
    v.x += v.vx; v.y += v.vy;
    const mx=60, ty=110, by=SWIM_BOT();
    if(v.x < mx){ v.x=mx; v.vx=Math.abs(v.vx)*0.8; }
    if(v.x > W-mx){ v.x=W-mx; v.vx=-Math.abs(v.vx)*0.8; }
    if(v.y < ty){ v.y=ty; v.vy=Math.abs(v.vy)*0.8; }
    if(v.y > by){ v.y=by; v.vy=-Math.abs(v.vy)*0.8; }
    if(v.spooked) { v.spookedTimer--; if(v.spookedTimer <= 0) v.spooked = false; }
    if(!v.spooked) {
      for(const fd of foodList) {
        if(!fd.eaten && Math.hypot(fd.x-v.x, fd.y-v.y) < 60) {
          v.trust = Math.min(100, v.trust + 0.15);
          fd.eaten = true; v.eat = 18;
          break;
        }
      }
    }
    v.trustTimer--;
    if(v.trustTimer <= 0) {
      spawnJuice(v.x, v.y - 30, v.def.name + ' swam away...', '#94a3b8', 0.9);
      visitorList.splice(i, 1);
      continue;
    }
    if(v.trust >= 100) { tameVisitor(i); break; }
  }
}

function checkMilestones() {
  currentOrders.forEach(o => {

function getPersonality(f) {
  const p1 = ['Playful','Calm','Curious','Vibrant','Loyal','Grumpy'][f.id % 6];
  const p2 = ['Bubbler','Explorer','Dancer','Watcher','Zinger','Floaty'][Math.floor(f.id/10) % 6];
  const likes = ['Green Algae','Bubbles','Sand','Snails','Food Plankton'][f.id % 5];
  const dislikes = ['Dirty Water','Noise','Empty Tanks','Cold'][Math.floor(f.id/7) % 4];
  return { desc: `${p1} ${p2}`, likes, dislikes };
}

function _toRoman(n){
  const v=[1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const r=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let s='';for(let i=0;i<v.length;i++){while(n>=v[i]){s+=r[i];n-=v[i];}}return s.toLowerCase();
}

function drawFishPreview(type, c1, c2, canvasW, canvasH, time) {
  const cvs = document.createElement('canvas');
  cvs.width = canvasW * 2; cvs.height = canvasH * 2;
  cvs.style.width = canvasW + 'px'; cvs.style.height = canvasH + 'px';
  cvs.className = 'aq-fish-preview';
  const pc = cvs.getContext('2d');
  pc.scale(2, 2);
  const def = TYPES[type];
  if (!def) return cvs;
  const s = def.sz;
  const cx = canvasW / 2, cy = canvasH / 2;
  pc.save();
  pc.translate(cx, cy);
  const previewScale = Math.min((canvasW * 0.45) / s, (canvasH * 0.45) / s);
  pc.scale(previewScale, previewScale);
  const _c1 = c1 || def.c1, _c2 = c2 || def.c2;
  const bg = pc.createLinearGradient(0, -s, 0, s);
  bg.addColorStop(0, _c1); bg.addColorStop(0.5, _c1); bg.addColorStop(1, _c2);
  const wag = time ? Math.sin(time * 2.5) * s * 0.35 : 0;
  const paddle = time ? Math.sin(time * 1.8 + 0.8) * s * 0.12 : 0;
  if (time) pc.rotate(Math.sin(time * 2.5) * 0.05);

  if (type === 'guppy') {
    pc.fillStyle = _c2 + 'aa';
    pc.beginPath(); pc.moveTo(-s * .2, 0);
    pc.bezierCurveTo(-s * 1.5, -s * 1.2, -s * 1.8, -s + wag * 1.5, -s * 2.2, wag * 2);
    pc.bezierCurveTo(-s * 1.8, s + wag * 1.5, -s * 1.5, s * 1.2, -s * .2, 0); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * .8, s * .35, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .4, -s * .05, s * .12);
  } else if (type === 'tetra') {
    pc.fillStyle = _c1; pc.beginPath(); pc.moveTo(-s * .8, 0); pc.lineTo(-s * 1.5, -s * .5 + wag); pc.lineTo(-s * 1.5, s * .5 + wag); pc.fill();
    pc.fillStyle = _c2; pc.beginPath(); pc.ellipse(0, 0, s * .9, s * .28, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .5, -s * .05, s * .08);
  } else if (type === 'seahorse') {
    pc.fillStyle = bg; pc.beginPath();
    pc.moveTo(s * .2, -s * .6);
    pc.quadraticCurveTo(-s * .3, -s * .2, -s * .3, s * .3);
    pc.quadraticCurveTo(-s * .6, s * 1.2, 0, s * 1.2);
    pc.quadraticCurveTo(s * .3, s * 1.2, -s * .1, s * .4);
    pc.quadraticCurveTo(s * .5, -s * .2, s * .4, -s * .3);
    pc.closePath(); pc.fill();
    drawEye(pc, s * .2, -s * .45, s * .06);
  } else if (type === 'goldfish') {
    pc.fillStyle = _c2 + '66'; pc.beginPath(); pc.moveTo(-s * .2, 0);
    pc.bezierCurveTo(-s * 1.2, -s * .6, -s * 1.8, -s * 1.4 + wag * 1.5, -s * 2.2, wag * 2);
    pc.bezierCurveTo(-s * 1.5, s * 1.4 + wag * 1.5, -s * 1.2, s * .6, -s * .2, 0); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * 1.1, s * .6, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .7, -s * .1, s * .12);
  } else if (type === 'angelfish') {
    pc.fillStyle = _c2 + 'aa'; pc.beginPath();
    pc.moveTo(0, 0); pc.lineTo(-s * 1.8, -s * 1.5 + wag); pc.lineTo(-s * .2, 0); pc.lineTo(-s * 1.8, s * 1.5 + wag); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * .6, s * .9, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .25, -s * .2, s * .08);
  } else if (type === 'discus') {
    pc.fillStyle = _c2 + 'aa'; pc.beginPath(); pc.moveTo(-s * .6, 0); pc.lineTo(-s * 1.5, -s * .8 + wag); pc.lineTo(-s * 1.5, s * .8 + wag); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.arc(0, 0, s, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .6, -s * .1, s * .1);
  } else if (type === 'jellyfish') {
    pc.strokeStyle = _c1 + '44'; pc.lineWidth = s * .1;
    for (let i = -3; i <= 3; i++) { pc.beginPath(); pc.moveTo(i * s * .15, -s * .2); pc.quadraticCurveTo(i * s * .4, s * .5, i * s * .2, s * 1.8 + paddle * (i % 2 ? 1 : -1)); pc.stroke(); }
    pc.fillStyle = _c2 + '88'; pc.beginPath();
    pc.moveTo(-s * .7, -s * .2); pc.bezierCurveTo(-s * .7, -s * 1, s * .7, -s * 1, s * .7, -s * .2);
    pc.quadraticCurveTo(0, 0, -s * .7, -s * .2); pc.fill();
  } else if (type === 'octopus') {
    pc.strokeStyle = bg; pc.lineCap = 'round';
    for (let i = 0; i < 4; i++) { pc.lineWidth = s * .2; const a = (i / 3) * Math.PI * .8 - Math.PI * .4;
      pc.beginPath(); pc.moveTo(0, s * .2); pc.quadraticCurveTo(Math.cos(a) * s, s, Math.cos(a) * s * 1.2, s * 1.8 + wag * (i % 2 ? 1 : -1)); pc.stroke(); }
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(-s * .3, -s * .2, s * .8, s * .6, -Math.PI / 12, 0, Math.PI * 2); pc.fill();
    pc.beginPath(); pc.ellipse(s * .3, 0, s * .5, s * .4, Math.PI / 12, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .5, -s * .1, s * .08);
  } else if (type === 'turtle') {
    pc.fillStyle = _c1; pc.beginPath(); pc.ellipse(s * .9, 0, s * .35, s * .25, 0, 0, Math.PI * 2); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, s * .1, s * .95, s * .5, 0, Math.PI, Math.PI * 2); pc.closePath(); pc.fill();
    pc.fillStyle = _c2 + 'ee'; pc.beginPath(); pc.ellipse(0, s * .1, s * .9, s * .2, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * 1.0, -s * .05, s * .06);
  } else if (type === 'whaleshark') {
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * 2, s * .8, 0, 0, Math.PI * 2); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.moveTo(-s * 1.5, 0); pc.lineTo(-s * 2.2, -s * .6 + wag); pc.lineTo(-s * 2.2, s * .6 + wag); pc.closePath(); pc.fill();
    drawEye(pc, s * 1.8, -s * .2, s * .05);
  } else if (type === 'narwhal') {
    pc.fillStyle = bg; pc.beginPath();
    pc.moveTo(-s * 1.5, 0); pc.bezierCurveTo(-s, -s * .8, s * .8, -s * .8, s * 1.4, -s * .2);
    pc.quadraticCurveTo(s * 1.5, s * .1, s * 1.2, s * .3);
    pc.bezierCurveTo(s * .5, s * .6, -s, s * .5, -s * 1.5, 0); pc.fill();
    pc.strokeStyle = '#f8fafc'; pc.lineWidth = s * .08; pc.lineCap = 'round';
    pc.beginPath(); pc.moveTo(s * 1.4, -s * .1); pc.lineTo(s * 3.2, -s * .3); pc.stroke();
    drawEye(pc, s * 1.1, -s * .05, s * .05);
  } else if (type === 'lionfish') {
    pc.strokeStyle = _c1; pc.lineCap = 'round';
    for (let i = 0; i < 9; i++) { const a = -Math.PI / 2 + (i / 8) * Math.PI; const r = s * 1.5;
      pc.lineWidth = 4; pc.strokeStyle = _c1;
      pc.beginPath(); pc.moveTo(0, 0); pc.lineTo(Math.cos(a) * r, Math.sin(a) * r); pc.stroke(); }
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * .9, s * .5, 0, 0, Math.PI * 2); pc.fill();
    drawEye(pc, s * .5, -s * .15, s * .1);
  } else if (type === 'idol') {
    pc.fillStyle = bg; pc.beginPath(); pc.ellipse(0, 0, s * .8, s, 0, 0, Math.PI * 2); pc.fill();
    pc.save(); pc.beginPath(); pc.ellipse(0, 0, s * .8, s, 0, 0, Math.PI * 2); pc.clip();
    pc.fillStyle = _c2; pc.fillRect(-s * .3, -s, s * .25, s * 2); pc.fillRect(s * .2, -s, s * .15, s * 2);
    pc.restore();
    drawEye(pc, s * .4, -s * .3, s * .08);
  } else if (type === 'betta') {
    pc.fillStyle = _c2 + '77'; pc.beginPath(); pc.moveTo(s * .2, -s * .1);
    pc.bezierCurveTo(-s * .5, -s * 2.5, -s * 2, -s * 1.5 + wag, -s * 1.8, -s * .5); pc.fill();
    pc.beginPath(); pc.moveTo(s * .2, s * .1);
    pc.bezierCurveTo(-s * .5, s * 2.5, -s * 2, s * 1.5 + wag, -s * 1.8, s * .5); pc.fill();
    pc.fillStyle = bg; pc.beginPath(); pc.moveTo(-s * .7, 0);
    pc.quadraticCurveTo(0, -s * .4, s * .7, -s * .2);
    pc.quadraticCurveTo(s * .8, -s * .3, s * .9, -s * .2);
    pc.lineTo(s * .8, s * .1);
    pc.quadraticCurveTo(s * .6, s * .4, 0, s * .4);
    pc.quadraticCurveTo(-s * .5, s * .3, -s * .7, 0); pc.fill();
    drawEye(pc, s * .5, -s * .1, s * .08);
  }

  pc.restore();
  return cvs;
}

function buildAquapedia() {
  const el = document.getElementById('aqlist');

  const BAND_INK = {
    Crimson:  { bg:'#5a1414', border:'#8a2828', label:'#e8a0a0' },
    Ember:    { bg:'#5a2c0a', border:'#904814', label:'#f0b878' },
    Solar:    { bg:'#504400', border:'#847000', label:'#e8d87a' },
    Verdant:  { bg:'#143a22', border:'#226038', label:'#80cfa0' },
    Abyssal:  { bg:'#082e3c', border:'#0e5268', label:'#72c8e8' },
    Void:     { bg:'#22143e', border:'#4a2e80', label:'#c0a0e8' },
    Prismatic:{ bg:'#3a1028', border:'#7a2852', label:'#f0a8d0' },
  };
  const BAND_SYM = { Crimson:'C', Ember:'E', Solar:'S', Verdant:'V', Abyssal:'A', Void:'X', Prismatic:'P' };
  const nonPrismaticCount = COLOR_BANDS.filter(b => b.name !== 'Prismatic').length;
  const totalBands = COLOR_BANDS.length;

  _bookPages = [];

  // ── Page 0: Cover ──
  _bookPages.push(`
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px 18px;">
    <div class="aq-page-item" style="animation-delay:0ms;">

      <div style="font-family:Georgia,serif;font-size:8px;letter-spacing:2px;color:#a08060;margin-top:6px;text-transform:uppercase;">Ocean Records &amp; Chromatic Registry</div>
    </div>
    <div class="aq-page-item" style="animation-delay:80ms;">
      <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#c8a870,transparent);margin:14px auto 10px;"></div>
    </div>
    <div class="aq-page-item" style="animation-delay:160ms;">
      <div class="aq-wax-seal"><span>ZA</span></div>
    </div>
    <div class="aq-page-item" style="animation-delay:240ms;">
      <div style="font-family:Georgia,serif;font-size:9px;color:#8a7050;font-style:italic;margin-top:10px;max-width:220px;line-height:1.5;">"Let all hues be known before the Prismatic may swim."</div>
    </div>
    <div class="aq-page-item" style="animation-delay:320ms;">
      <div style="margin-top:18px;font-family:Georgia,serif;font-size:8px;color:#b09070;letter-spacing:1.5px;">${Object.keys(TYPES).length} Species Catalogued</div>
    </div>
  </div>`);

  // ── Species pages (one per type) ──
  let pageIdx = 1;
  for(const [key, def] of Object.entries(TYPES)) {
    const seen = sm.aqSeen?.[key] || [];
    const prismaticUnlocked = hasPrismaticUnlocked(key);
    const seenCount = seen.length;
    const discovered = def.req <= playerLevel;

    const scaleX = (seenCount / totalBands).toFixed(3);
    const barColor = prismaticUnlocked ? '#c0905a' : (seenCount >= nonPrismaticCount && seenCount > 0 ? '#8a6c40' : '#4a3010');

    // Band stamps — circular ink seals with embossed look
    const stamps = COLOR_BANDS.map((b, si) => {
      const isSeen = seen.includes(b.name);
      const ink = BAND_INK[b.name];
      const sym = BAND_SYM[b.name] || '●';
      const isPrismatic = b.name === 'Prismatic';
      const locked = isPrismatic && !prismaticUnlocked;
      const stampDelay = (si * 40) + 'ms';
      if(locked && !isSeen) {
        return `<div class="aq-stamp-seal" title="Prismatic — locked" style="background:rgba(0,0,0,0.06);border:1px dashed rgba(160,140,110,0.4);opacity:0.4;">
          <div style="width:12px;height:12px;color:#b09070;">${ICONS.lock}</div></div>`;

      return `<div class="aq-stamp-seal${isSeen?' seen':''} aq-page-item" title="${b.name}"

function _renderBookPage() {
  const content = document.getElementById('book-content');
  if(!content) return;
  const totalPages = _bookPages.length;
  content.innerHTML = `<div id="aqlist" class="book-page-fade-in" style="height:100%;position:relative;">
    ${_bookPages[_bookPage]}
    <div class="book-page-corner"></div>
  </div>`;

  // Draw fish preview canvases on species pages
  _drawBookPreviews(content);

  // Update page number (roman numerals)
  const pageNum = document.getElementById('book-page-num');
  if(pageNum) pageNum.innerHTML = `<span class="aq-page-num">${_toRoman(_bookPage + 1)}</span>`;

  // Update nav buttons
  document.getElementById('book-prev').disabled = (_bookPage <= 0);
  document.getElementById('book-next').disabled = (_bookPage >= totalPages - 1);
}

function _drawBookPreviews(container) {
  _cancelBookAnimations();
  container.querySelectorAll('canvas.aq-fish-preview').forEach(cvs => {
    const type = cvs.dataset.fishType;
    const c1 = cvs.dataset.c1;
    const c2 = cvs.dataset.c2;
    const seen = parseInt(cvs.dataset.seen, 10) || 0;

    if (seen > 0) {
      // Animated preview for unlocked species
      const anim = { running: true, t: 0, frameId: 0 };
      const draw = () => {
        if (!anim.running) return;
        anim.t += 0.04;
        const preview = drawFishPreview(type, c1, c2, 160, 120, anim.t);
        const pc = cvs.getContext('2d');
        pc.clearRect(0, 0, cvs.width, cvs.height);
        pc.drawImage(preview, 0, 0);
        anim.frameId = requestAnimationFrame(draw);
      };
      anim.frameId = requestAnimationFrame(draw);
      _bookAnimations.push(anim);
    } else {
      // Static preview for locked/undiscovered species
      const preview = drawFishPreview(type, c1, c2, 160, 120);
      const pc = cvs.getContext('2d');
      pc.clearRect(0, 0, cvs.width, cvs.height);
      pc.drawImage(preview, 0, 0);
    }
  });
}

// ─── BOOK SWIPE & TAP NAVIGATION ─────────────────────────────────────────────
(function(){
  let _swipeSX = 0, _swipeSY = 0, _swipeJustDone = false;

  function _bookIsOpen() {
    const ov = document.getElementById('book-overlay');
    return ov && !ov.classList.contains('book-closed');
  }

  document.addEventListener('touchstart', e => {
    if (!_bookIsOpen()) return;
    const bc = document.getElementById('book-content');
    if (!bc || !bc.contains(e.target)) return;
    _swipeSX = e.touches[0].clientX;
    _swipeSY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!_bookIsOpen()) return;
    const bc = document.getElementById('book-content');
    if (!bc || !bc.contains(e.changedTouches[0].target)) return;
    const dx = e.changedTouches[0].clientX - _swipeSX;
    const dy = e.changedTouches[0].clientY - _swipeSY;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
      _swipeJustDone = true;
      bookFlip(dx < 0 ? 1 : -1);
      setTimeout(() => { _swipeJustDone = false; }, 400);
    }
  }, { passive: true });

  document.addEventListener('click', e => {
    if (!_bookIsOpen()) return;
    const bc = document.getElementById('book-content');
    if (!bc || !bc.contains(e.target)) return;
    // Don't trigger on interactive elements
    if (e.target.closest('button, a, input, select, textarea')) return;
    // Don't trigger shortly after a swipe
    if (_swipeJustDone) return;
    const rect = bc.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const pct = relX / rect.width;
    if (pct < 0.4) bookFlip(-1);
    else if (pct > 0.6) bookFlip(1);
  });
})();

let _bookFlipping = false;
function bookFlip(dir){
  if(_bookFlipping) return;
  const totalPages = _bookPages.length;
  if(!totalPages) return;
  const newPage = _bookPage + dir;
  if(newPage < 0 || newPage >= totalPages) return;

  _bookFlipping = true;
  _cancelBookAnimations();
  const content = document.getElementById('book-content');
  const aqlist = document.getElementById('aqlist');
  if(!aqlist) { _bookFlipping = false; return; }

  // Animate old page out
  const outClass = dir > 0 ? 'book-page-flip-out-left' : 'book-page-flip-out-right';
  aqlist.className = outClass;

  setTimeout(() => {
    _bookPage = newPage;
    // Render new page with in animation
    const inClass = dir > 0 ? 'book-page-flip-in-right' : 'book-page-flip-in-left';
    content.innerHTML = `<div id="aqlist" class="${inClass} book-page-fade-in" style="height:100%;position:relative;">
      ${_bookPages[_bookPage]}
      <div class="book-page-corner"></div>
    </div>`;

    // Draw fish preview canvases
    _drawBookPreviews(content);

    // Update page number
    const pageNum = document.getElementById('book-page-num');
    if(pageNum) pageNum.innerHTML = `<span class="aq-page-num">${_toRoman(_bookPage + 1)}</span>`;

    // Update nav buttons
    document.getElementById('book-prev').disabled = (_bookPage <= 0);
    document.getElementById('book-next').disabled = (_bookPage >= totalPages - 1);

    _bookFlipping = false;
  }, 300);
}

// ─── PANEL DRAG SYSTEM ────────────────────────────────────────────────────────
const HALF_H=0.52, FULL_H=0.92;
let _dp=null,_dSY=0,_dS0=0,_dLY=0,_dLT=0,_dVel=0,_dCur=0;

function _pSetH(p,h){
  h=Math.max(0,Math.min(1,h)); _dCur=h;
  p.style.height=`${h*100}dvh`;
  document.getElementById('sov').style.opacity=Math.max(0,Math.min(1,(h/FULL_H)*0.7));
}
function _pSnap(p){
  p.classList.remove('dragging');
  p.style.height=''; p.style.transform='';
  document.getElementById('sov').style.opacity='';
  const h=_dCur, v=_dVel;
  if(v>0.5){       if(h>0.4){p.classList.remove('full');p.classList.add('open');}else closeAll(); }
  else if(v<-0.5){ p.classList.add('full','open'); }
  else if(h>0.72){ p.classList.add('full','open'); }
  else if(h>0.26){ p.classList.remove('full');p.classList.add('open'); }
  else{            closeAll(); }
  _dp=null;
}

document.querySelectorAll('.ph').forEach(ph=>{
  ph.addEventListener('touchstart',e=>{
    const p=ph.closest('.panel');
    if(!p||!p.classList.contains('open'))return;
    _dp=p; _dSY=e.touches[0].clientY;
    _dS0=p.classList.contains('full')?FULL_H:HALF_H;
    _dCur=_dS0; _dLY=_dSY; _dLT=Date.now(); _dVel=0;
    p.classList.add('dragging');
  },{passive:true});
});

window.addEventListener('touchmove',e=>{
  if(!_dp)return;
  if(e.cancelable)e.preventDefault();
  const y=e.touches[0].clientY;
  const h=_dS0+(_dSY-y)/window.innerHeight;
  _pSetH(_dp,h);
  const now=Date.now(),dt=now-_dLT;
  if(dt>0)_dVel=(y-_dLY)/dt;
  _dLY=y; _dLT=now;
},{passive:false});

window.addEventListener('touchend',()=>{ if(_dp)_pSnap(_dp); });
window.addEventListener('touchcancel',()=>{ if(_dp)_pSnap(_dp); });

// ─── FISH GIFT ENCODE / DECODE ────────────────────────────────────────────────
const TYPE_MAP  = ['guppy','tetra','goldfish','betta','angelfish','discus'];
const TRAIT_MAP = ['greedy','shy','lazy','active'];

function encodeFish(f) {
  const ti = TYPE_MAP.indexOf(f.type);
  const t1 = TRAIT_MAP.indexOf(f.genes.trait[0]);
  const t2 = TRAIT_MAP.indexOf(f.genes.trait[1]);
  const r  = f.isRare ? 1 : 0;
  const raw = `${ti}${t1}${t2}${r}`;
  let sum = raw.split('').reduce((a,c)=>a+parseInt(c),0);
  const check = (sum % 36).toString(36).toUpperCase();
  return `FISH${raw}${check}`;
}

function decodeFish(code) {
  if(!code.startsWith('FISH') || code.length !== 9) return null;
  const raw = code.slice(4,8), check = code[8];
  if(!/^[0-9]+$/.test(raw)) return null;
  let sum = raw.split('').reduce((a,c)=>a+parseInt(c),0);
  if((sum%36).toString(36).toUpperCase() !== check) return null;
  const type  = TYPE_MAP[parseInt(raw[0])];
  const t1    = TRAIT_MAP[parseInt(raw[1])];
  const t2    = TRAIT_MAP[parseInt(raw[2])];
  const isRare = raw[3] === '1';
  if(!type||!t1||!t2) return null;
  return {type, t1, t2, isRare};
}

function getEggHatchTime(type) {
  const req = (TYPES[type] && TYPES[type].req) || 1;
  let mins = 5;
  if(req === 2) mins = 10;
  if(req === 3) mins = 20;
  if(req === 4) mins = 30;
  if(req === 5) mins = 45;
  if(req === 6) mins = 60;
  return Date.now() + mins * 60 * 1000;
}

let lastGiftCode = '';
function giftFish(id) {
  const idx = fishList.findIndex(f=>f.id===id);
  if(idx < 0) return;
  const f = fishList[idx];
  const code = encodeFish(f);
  lastGiftCode = code;
  fishList.splice(idx, 1);
  updateHUD();
  document.getElementById('gift-code-val').textContent = code;
  document.getElementById('gift-code-box').style.display = 'block';
  toast(ICONS.social + ' Fish gifted! Share the code.', '#10b981');
  buildSocial(); saveGame();
}
function copyGiftCode() {
  try { navigator.clipboard.writeText(lastGiftCode).catch(()=>{}); } catch(_) {}
  toast(ICONS.done + ' Gift code copied!', '#10b981');
}

function makeCosmCard(id, def, isOwned, isEquipped, lk, colorVal, onBuy, onEquip) {
  const canBuy = !isOwned && !lk && coins >= def.cost;
  let btnHtml = '';
  if(isEquipped) btnHtml = `<span class="cpr" style="color:var(--ui-accent)">${ICONS.done} EQUIPPED</span>`;
  else if(isOwned) btnHtml = `<span class="cpr" style="color:#10b981">OWNED</span>`;
  else btnHtml = `<span class="cpr" style="display:flex;align-items:center;justify-content:center;gap:3px;">${ICONS.coin}${def.cost}</span>`;
  const c = document.createElement('div');
  c.className = `card ${(canBuy||isOwned)?'buyable':''} ${isEquipped?'equipped':''} ${lk?'locked':''}`;
  c.setAttribute('data-req', def.req);
  c.innerHTML = `<span class="ci" style="color:${colorVal}">${def.icon}</span><span class="cn">${def.name}</span>${btnHtml}`;
  if(!lk) c.onclick = () => {
    if(isEquipped) return;
    if(isOwned) { onEquip(); spawnJuice(W/2,H/2,ICONS.done+' Equipped!','var(--ui-accent)',1.4); }
    else if(canBuy) { coins-=def.cost; sm.coinsSpent=(sm.coinsSpent||0)+def.cost; document.getElementById('cv').textContent=formatCoins(coins); onBuy(); spawnJuice(W/2,H/2,ICONS.star+' Unlocked!','#10b981',1.4); }
    buildDecor(); saveGame();
  };
  return c;
}

function buildDecor() {
  let cardEl;
  cardEl = makeAccordion('acc-themes','Water Themes', THEMES[curTheme].name, null, 'themes');
  if(cardEl) for(const [id,def] of Object.entries(THEMES))
    cardEl.appendChild(makeCosmCard(id,def,ownedThemes.includes(id),curTheme===id,playerLevel<def.req,def.c1,
      ()=>{ ownedThemes.push(id); curTheme=id; _waterGrad=null; _rayGrads=null; }, ()=>{ curTheme=id; _waterGrad=null; _rayGrads=null; }));

  cardEl = makeAccordion('acc-substrates','Substrates', FLOORS[curFloor].name, null, 'substrates');
  if(cardEl) for(const [id,def] of Object.entries(FLOORS))
    cardEl.appendChild(makeCosmCard(id,def,ownedFloors.includes(id),curFloor===id,playerLevel<def.req,def.c,
      ()=>{ ownedFloors.push(id); curFloor=id; _substrateDirty=true; }, ()=>{ curFloor=id; _substrateDirty=true; }));

  cardEl = makeAccordion('acc-bubbles','Bubble Styles', BUBBLES[curBubble].name, null, 'bubbles');
  if(cardEl) for(const [id,def] of Object.entries(BUBBLES))

      ()=>{ ownedBubbles.push(id); curBubble=id; }, ()=>{ curBubble=id; }));

  cardEl = makeAccordion('acc-borders','Tank Border', BORDERS[curBorder].name, null, 'borders');
  if(cardEl) for(const [id,def] of Object.entries(BORDERS))
    cardEl.appendChild(makeCosmCard(id,def,ownedBorders.includes(id),curBorder===id,playerLevel<def.req,'#f59e0b',
      ()=>{ ownedBorders.push(id); curBorder=id; applyBorder(); }, ()=>{ curBorder=id; applyBorder(); }));
      
  const allFlora = [
    {id:'seaweed', name:'Seaweed', icon:ICONS.seaweed, req:1},
    {id:'grass',   name:'Grass',   icon:ICONS.grass, req:1},
    {id:'kelp',    name:'Purple Kelp', icon:ICONS.kelp, req:3, upgrade:'kelp'},
    {id:'coral',   name:'Fan Coral',   icon:ICONS.coral_fan, req:5, upgrade:'coral'}
  ];

    allFlora.forEach(f => {
      const isOwned = ownedFlora.includes(f.id);
      const isActive = activeFlora.includes(f.id);
      const c = document.createElement('div');
      const locked = !isOwned;
      c.className = `card ${isOwned ? 'buyable' : 'locked'} ${isActive ? 'equipped' : ''}`;
      if(locked) c.setAttribute('data-req', f.req);
      c.innerHTML = `<span class="ci">${f.icon}</span><span class="cn">${f.name}</span><span class="cpr" style="color:${isActive?'var(--ui-accent)':'#64748b'}">${locked?'LOCKED':isActive?'ON':'OFF'}</span>`;

          if(!activeFlora.includes(f.id)) activeFlora.push(f.id);

        initDecor(); buildDecor(); saveGame();
        spawnJuice(W/2, H/2, `${f.icon} ${isActive?'Hidden':'Showing'}!`, 'var(--ui-accent)', 1.2);
      };
      cardEl.appendChild(c);
    });
  }

    const hd=document.createElement('div');hd.className='sechead';

function myCode(){
  const d=new Date(),key=uid+`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  let h=0;for(const c of key)h=((h<<5)-h+c.charCodeAt(0))&0x7FFFFFFF;
  const ch='ACDEFGHJKLMNPQRUVWXY34679';let code='Z';
  for(let i=0;i<7;i++){h=(h*1103515245+12345)&0x7FFFFFFF;code+=ch[Math.abs(h)%ch.length];}
  return code;
}
function copyCode(){
  const c=myCode();
  try{navigator.clipboard.writeText(c).catch(()=>{});}catch(_){}
  toast(ICONS.done + ' Code copied!','#10b981');
}
function redeemCode(raw){
  const code=raw.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(code.startsWith('FISH')) {
    const fData = decodeFish(code);
    if(!fData) { toast('Invalid fish code!','#ef4444'); return; }
    if(claimedCodes.has(code)){ toast('Already claimed this fish!','#ef4444'); return; }
    const mF = baseMaxFish + (UPGRADES.tank.owned*4);
    if((fishList.length+eggs.length) >= mF) { toast('Tank is full!','#ef4444'); return; }
    
    claimedCodes.add(code); codesRedeemed++;
    const def = TYPES[fData.type];
    const genes = { c1: [def.c1, def.c1], c2: [def.c2, def.c2], trait: [fData.t1, fData.t2] };
    if(fData.isRare) {
        if(Math.random()<0.5) genes.c1[0] = def.rare.c1;
        else genes.c2[0] = def.rare.c2;
    }
    eggs.push({x:Math.random()*(W-100)+50,y:H-85,type:fData.type,hatchTime:getEggHatchTime(fData.type),genes:genes,isRareMut:fData.isRare});
    updateHUD();
    toast(ICONS.egg + ' Egg received!','#10b981');
    document.getElementById('codein').value='';
    document.getElementById('soclog').innerHTML=`${ICONS.done} Claimed fish code!`;
    saveGame(); buildSocial();
    return;
  }
  
  if(code.length<8){toast('Enter a valid code!','#ef4444');return;}
  if(code===myCode()){toast("Can't redeem your own code!",'#ef4444');return;}
  if(claimedCodes.has(code)){toast('Already redeemed!','#ef4444');return;}
  if(code.startsWith('Z')&&code.length===8){
    claimedCodes.add(code);codesRedeemed++;
    const r=100+Math.floor(Math.random()*101);
    addCoins(r,W/2,H/3,true);
    toast(ICONS.social + ` Gift received! +${formatCoins(r)}`,'#10b981');
    document.getElementById('codein').value='';
    document.getElementById('soclog').innerHTML=`${ICONS.done} Redeemed ${code} for +${formatCoins(r)} coins`;
    saveGame();buildSocial();
  }else{toast('Invalid code format!','#ef4444');}
}

function getRawMetricValue(o) {
  if (o.metric === 'combo_trade') {
    const matchCount = fishList.filter(f => f.type === o.ftypereq && (!o.reqRare || f.isRare) && (!o.reqAdult || f.age > getAdultAge(f))).length;
    return (matchCount >= (o.reqAmt||1) && coins >= (o.reqCoins||0)) ? 1 : 0;
  }
  
  switch(o.metric){
    case 'feeds':       return sm.feeds || 0;
    case 'harmonySec':  return Math.floor(sm.harmonySec || 0);
    case 'cleaned':     return Math.floor(sm.cleaned || 0);
    case 'marketSales': return sm.marketSales || 0;
    case 'hatched':     return sm.hatched || 0;
    case 'rares':       return sm.rares || 0;
    case 'bonded':      return sm.bonded || 0;
    case 'fish':        return fishList.filter(f=>f.type===o.ftype).length;
    case 'fish_total':  return fishList.length + eggs.length;
    case 'adults':      return fishList.filter(f=>f.age>18000).length;
    case 'rares_owned': return fishList.filter(f=>f.isRare).length;
    case 'totalCoins':  return totalCoins;
    case 'decor_owned': return ownedThemes.length + ownedFloors.length + ownedBorders.length + ownedBubbles.length - 4;
    case 'upgrades_owned': return Object.values(UPGRADES).reduce((sum, u) => sum + u.owned, 0);
    case 'coinsSpent':  return sm.coinsSpent || 0;
    case 'visitorsTamed': return sm.visitorsTamed || 0;
    case 'abyssalTamed':  return sm.abyssalTamed || 0;
    case 'currentEra':    return currentEra;
    case 'homozyBred':    return sm.homozyBred || 0;
    case 'homozyOwned':   return fishList.filter(f => f._colorBonus?.full).length;
    default:            return 0;
  }
}

function getDifficultyScale() {
  // Scales with orders, levels, and raw wealth to keep tasks meaningful
  const wealthLvl = totalCoins === 0 ? 0 : Math.log10(totalCoins) * 0.2;
  return 1.0 + Math.min(completedOrders * 0.04, 1.5) + (playerLevel * 0.3) + wealthLvl;
}

function _selectTier(slotIdx) {
  // Exactly 10% global chance for a legendary across the 5 slots
  const probs = [
    [80, 20, 0,  0 ], // Slot 0
    [40, 50, 10, 0 ], // Slot 1
    [20, 50, 30, 0 ], // Slot 2
    [0,  30, 60, 10], // Slot 3
    [0,  10, 50, 40], // Slot 4
  ][Math.min(slotIdx, 4)];
  const maxTierIdx = playerLevel < 3 ? 1 : playerLevel < 5 ? 2 : playerLevel < 7 ? 3 : 4;
  const capped = probs.map((p,i) => i < maxTierIdx ? p : 0);
  const total = capped.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  const names = ['easy','med','hard','legend'];
  for(let i=0;i<4;i++){r-=capped[i];if(r<=0)return names[i];}
  return 'easy';
}

function generateSingleOrder(index, init=false) {
  const tier = _selectTier(index);
  const usedMetrics = currentOrders.slice(0,index).map(o=>o.metric+(o.ftype||''));
  const pool = ORDER_POOL.filter(o =>
    o.tier===tier && playerLevel>=(o.minLvl||1) &&
    !usedMetrics.includes(o.metric+(o.ftype||''))
  );
  const fallback = ORDER_POOL.filter(o=>playerLevel>=(o.minLvl||1));
  let src = pool.length>0 ? pool : (fallback.length>0 ? fallback : ORDER_POOL);
  if(index === 4 && playerLevel >= 3 && Math.random() < 0.35) src = COMBINATION_POOL; // Replaces trade pool completely. Allows duplicate metrics safely since metric is combo_trade
  if(src.length === 0) src = ORDER_POOL;
  const tmpl = src[Math.floor(Math.random()*src.length)];
  const scale = getDifficultyScale();
  const t = tmpl.isState ? tmpl.target : Math.ceil(tmpl.target*scale);
  let r = tmpl.reward>0 ? Math.ceil(tmpl.reward*scale) : 0;
  
  if (tmpl.tier === 'legend') {
    r *= 5; // Way more interesting coin reward
    if (Math.random() < 0.2) tmpl.ftyperew = 'narwhal';
  }

  const cooldownMap = { 'easy': 5, 'med': 10, 'hard': 15, 'legend': 15 };
  const mins = cooldownMap[tmpl.tier || 'easy'] || 5;
  const unlockTs = Date.now() + (mins * 60000);

  currentOrders[index]={
    id:tmpl.id, icon:tmpl.icon, desc:tmpl.desc, tier:tmpl.tier||'easy',
    metric:tmpl.metric, ftype:tmpl.ftype, isState:tmpl.isState, isTrade:tmpl.isTrade, ftypereq:tmpl.ftypereq,
    reqAdult:tmpl.reqAdult, reqRare:tmpl.reqRare, reqAmt:tmpl.reqAmt, reqCoins:tmpl.reqCoins, rewardIsRare:tmpl.rewardIsRare,
    ftyperew:tmpl.ftyperew, target:t, reward:r, howTo:tmpl.howTo, unlockAt: init ? 0 : unlockTs,
    startVal:0, progress:0, complete:false, claimed:false, delivered:false
  };
  if(!tmpl.isState) currentOrders[index].startVal=getRawMetricValue(currentOrders[index]);
}

function generateDailyQuest() {
  if(playerLevel < 3) return;
  const now = new Date();
  const midnight = new Date(now).setHours(0,0,0,0);
  if(lastEliteTs && lastEliteTs >= midnight && currentOrders[5]) return;
  
  const tmpl = ELITE_DAILY_POOL[Math.floor(Math.random()*ELITE_DAILY_POOL.length)];
  lastEliteTs = Date.now();
  
  const scale = getDifficultyScale();
  const scaledTarget = tmpl.isState ? tmpl.target : Math.ceil(tmpl.target * scale);
  const scaledReward = tmpl.reward > 0 ? Math.ceil(tmpl.reward * scale) : 0;
  
  currentOrders[5] = {
    id: tmpl.id, icon: ICONS.star, desc: tmpl.desc, tier: 'legend',
    metric: tmpl.metric, target: scaledTarget, reward: scaledReward,
    isState: tmpl.isState, isDaily: true, isMasterpieceReward: true,
    howTo: tmpl.howTo, startVal: 0, progress: 0, complete: false, claimed: false
  };
  if(!tmpl.isState) currentOrders[5].startVal = getRawMetricValue(currentOrders[5]);
}

function getRerollCost() {
  return Math.max(50, 50 + playerLevel * 25);
}

function rerollOrder(i) {
  const cost = getRerollCost();
  if(coins < cost) { toast(ICONS.close + " Not enough coins to Reroll!", "#ef4444"); return; }
  coins -= cost; sm.coinsSpent=(sm.coinsSpent||0)+cost;
  document.getElementById('cv').textContent=formatCoins(coins);
  generateSingleOrder(i, true);
  buildOrders();
  saveGame();
  toast(ICONS.market + " Quest Rerolled!", "var(--ui-accent)");
}

function generateOrders() {
  currentOrders=[];
  for(let i=0;i<ORDER_SLOTS;i++) generateSingleOrder(i, true);
  generateDailyQuest();
}

function orderProg(o) {
  if(o.claimed) return o.target;
  const current=getRawMetricValue(o);
  if(o.isState) return current;
  return Math.max(0, current-(o.startVal||0));
}

function tickOrders() {
  let newDone=false;
  for(const o of currentOrders){
    if(o.claimed) continue;
    o.progress=Math.min(orderProg(o),o.target);
    if(!o.complete&&o.progress>=o.target){o.complete=true;newDone=true;}
  }
  if(newDone){
    const tier=currentOrders.find(o=>o.complete&&!o.claimed)?.tier||'easy';
    const tm=TIER_META[tier]||TIER_META.easy;
    toast(ICONS.done+` ${tm.label} Quest ready to claim!`, tm.strip);
    document.getElementById('nb-orders').classList.add('notify');
    if(currentTab==='orders') buildOrders();
  }
}

function claimOrder(i) {
  const o=currentOrders[i];if(!o||!o.complete||o.claimed)return;
  if(o.isTrade && !o.delivered) {
    const qty = o.reqAmt || 1;
    let found = 0;
    const toRemove = [];
    for(let j=0; j<fishList.length; j++) {
      const f = fishList[j];
      if(f.type === o.ftypereq && (!o.reqRare || f.isRare) && (!o.reqAdult || f.age > getAdultAge(f))) {
        toRemove.push(j);
        found++;
        if(found >= qty) break;
      }
    }
    if(found >= qty) {
      if(o.reqCoins && coins < o.reqCoins) { toast(ICONS.close + " Not enough coins!", "#ef4444"); return; }
      if(o.reqCoins) { 
        coins -= o.reqCoins; 
        sm.coinsSpent=(sm.coinsSpent||0)+o.reqCoins; 
        document.getElementById('cv').textContent=formatCoins(coins); 
      }
      for(let j=toRemove.length-1; j>=0; j--) fishList.splice(toRemove[j], 1);
      o.delivered = true;
      toast(ICONS.done + " Project Delivered!", "#f59e0b");
      buildOrders();
      saveGame();
      return;
    } else return; 
  }
  o.claimed=true; completedOrders++;
  questStreak++;
  const tm=TIER_META[o.tier||'easy']||TIER_META.easy;
  const streakBonus=Math.min((questStreak-1)*0.1,1.0);
  const _qXP={easy:40,med:80,hard:160,legend:350}[o.tier||'easy']||40;
  giveXP(_qXP+(questStreak>=3?100:0));

  // Give coin reward (always, even alongside fish reward)
  if(o.reward>0){
    const bonused=Math.ceil(o.reward*(1+streakBonus));
    addCoins(bonused,W/2,H/3,true);
    if(streakBonus>0) setTimeout(()=>spawnJuice(W/2,H/3-50,`<div style="display:flex;align-items:center;gap:4px;">${ICONS.fire} +${Math.round(streakBonus*100)}% streak!</div>`,'#f59e0b',1.3),120);
  }

  // Random Bonus Egg drop
  let droppedBonusEgg = false;
  const eggChanceMap = { 'easy': 0.05, 'med': 0.10, 'hard': 0.15 };
  const rollChance = eggChanceMap[o.tier || 'easy'] || 0;
  if(o.tier !== 'legend' && !o.ftyperew && Math.random() < rollChance) {
     const types = ['guppy','tetra','betta'];
     o.ftyperew = types[Math.floor(Math.random()*types.length)];
     o.rewardIsRare = true;
     droppedBonusEgg = true;
  }

  // Give fish egg unlock
  if(o.ftyperew&&TYPES[o.ftyperew]){
    const def=TYPES[o.ftyperew];
    const isLeg=o.tier==='legend' || o.rewardIsRare;
    const genes={c1:[isLeg?def.rare.c1:def.c1,isLeg?def.rare.c1:def.c1],c2:[isLeg?def.rare.c2:def.c2,isLeg?def.rare.c2:def.c2],trait:['active','greedy'],isRareMut:isLeg,szMod:1};
    eggs.push({x:Math.random()*(W-100)+50,y:H-85,type:o.ftyperew,hatchTime:getEggHatchTime(o.ftyperew),genes,isRareMut:isLeg});
    spawnJuice(W/2,H/4,ICONS.egg+(droppedBonusEgg?` BONUS EGG: ${def.name}!`:` UNLOCKED: ${def.name}!`),isLeg?'#c084fc':'var(--ui-accent)',2);
    updateHUD();
  }

  // Elite Masterpiece Reward
  if(o.isMasterpieceReward){
    const types=['guppy','tetra','betta','goldfish','angelfish'];
    const type=types[Math.floor(Math.random()*types.length)];
    const genes=generateMasterpieceGenes(type);
    eggs.push({x:W/2,y:H-85,type,hatchTime:getEggHatchTime(type),genes,isRareMut:true});
    spawnJuice(W/2,H/3,ICONS.sparkle+` MASTERPIECE EGG DISCOVERED!`, '#a855f7', 2.5);
  }

  spawnJuice(W/2,H/5,`${o.icon} ${tm.label} COMPLETE!`,tm.strip,o.tier==='legend'?2.8:o.tier==='hard'?2.2:1.8);

  if(o.tier==='legend'){
    for(let b=0;b<16;b++){
      setTimeout(()=>{
        const bx=80+Math.random()*(W-160);
        const by=60+Math.random()*(H*0.5);
        spawnJuice(bx,by,ICONS.sparkle,'#fbbf24',1.2);
        for(let p=0;p<4;p++) particles.push({x:bx,y:by,vx:(Math.random()-.5)*8,vy:-2-Math.random()*5,life:1,c:tm.strip});
      },b*60);
    }
  }

  const sText=questStreak>1?` <div style="display:flex;align-items:center;gap:4px">${ICONS.fire}${questStreak} streak!</div>`:'';
  toast(ICONS.done+` Quest claimed!${sText}`,tm.strip);
  generateSingleOrder(i);
  buildOrders();
  saveGame();
}

function buildOrders() {
  const olist=document.getElementById('olist');
  if(!olist) return;
  
  // ── AUTO-REPAIR LOGIC: Ensure quest list is robust ──
  if(!currentOrders || currentOrders.length < 5) {
    console.log("Repairing Orders menu...");
    generateOrders(); 
  }
  
  let html='';

  if(questStreak>=2){
    // Streak UI explicitly hidden per user request to keep UI clean and compact
  }

  const orderIndices = Array.from(currentOrders.keys());
  orderIndices.sort((a,b) => {
    const oa = currentOrders[a]; const ob = currentOrders[b];
    const aTop = a === 5 && oa && !oa.claimed;
    const bTop = b === 5 && ob && !ob.claimed;
    if(aTop && !bTop) return -1;
    if(bTop && !aTop) return 1;
    
    // Cooldown quests move to bottom
    const aCool = oa && oa.unlockAt && Date.now() < oa.unlockAt;
    const bCool = ob && ob.unlockAt && Date.now() < ob.unlockAt;
    if(aCool && !bCool) return 1;
    if(bCool && !aCool) return -1;

    return a - b;
  });

  html+=orderIndices.map((i)=>{
    const o=currentOrders[i];
    if(o.unlockAt && Date.now() < o.unlockAt) {
      const wait = Math.max(0, o.unlockAt - Date.now());
      const mins = Math.floor(wait / 60000);
      const secs = Math.floor((wait % 60000) / 1000).toString().padStart(2, '0');
      return `<div class="ocard" style="opacity:0.65; padding:18px; filter:grayscale(0.5);">
        <div style="display:flex;align-items:center;justify-content:center;height:45px;">
           <span style="color:var(--text-dim);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;">
             ${ICONS.lock} Next Quest In: <span class="c-timer" data-t="${o.unlockAt}" style="color:var(--ui-accent);font-family:monospace;font-size:14px;">${mins}:${secs}</span>
           </span>
        </div>
      </div>`;
    }

    const p=o.progress||0;
    const pct=Math.min(100,(p/o.target)*100);
    const done=o.complete||p>=o.target;
    const tm=TIER_META[o.tier||'easy']||TIER_META.easy;
    const isLeg=o.tier==='legend' || o.rewardIsRare;
    const isDaily = o.isDaily;
    const expanded = _openQuests.has(i);

    const rewHtml=o.ftyperew&&TYPES[o.ftyperew]
      ?`<div class="o-reward-item" style="color:var(--tier-legend);">${ICONS.egg} Rare ${TYPES[o.ftyperew].name} Unlock ${o.reward>0?'<span style="color:var(--ui-accent);margin-left:5px;">+ '+ICONS.coin+formatCoins(o.reward)+'</span>':''}</div>`
      :`<div class="o-reward-item" style="color:var(--ui-accent);">${ICONS.coin} ${formatCoins(o.reward)} Coins</div>`;

    const btnText = o.claimed 
      ? (ICONS.done + ' Claimed') 
      : (o.isTrade && !o.delivered) 
        ? (done ? ICONS.market + ' Hand In' : ICONS.market + ' Collect...')
        : (done ? 'Claim Reward!' : 'In Progress...');

    return`<div class="ocard ${o.claimed?'oclaimed':done?'odone':''} ${isLeg?'ql':''} ${isDaily?'q-daily':''} ${expanded?'expanded':''}" 
           style="position:relative;padding-left:24px;" onclick="toggleQuest(${i}, this)">
      ${isDaily?'<div class="nebula-glow"></div>':''}
      <div style="position:absolute;left:0;top:0;bottom:0;width:6px;background:${isDaily?'#a855f7':tm.strip};border-radius:6px 0 0 6px;opacity:${o.claimed?.3:1};"></div>
      <div class="ohead"><span class="oico" style="font-size:24px;">${o.icon}</span>
        <div style="flex:1; margin-left:12px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:6px;">
              <span class="tier-badge">${isDaily?'ELITE DAILY':tm.label}</span>
              <span style="color:var(--card-text); font-weight:700; font-size:14px;">${o.desc}</span>
            </div>
            <div class="o-chevron">▼</div>
          </div>
          <div class="opbg" style="margin:8px 0;"><div class="opf ${done?'odone':''}" style="width:${pct}%;background:${isDaily?'linear-gradient(90deg,#a855f7,#67e8f9)':tm.strip};"></div></div>
          <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim); text-transform:uppercase;">
             <span>${Math.min(p,o.target)} / ${o.target}</span>
             <span>${Math.round(pct)}%</span>
          </div>
        </div>
      </div>
      
      <div class="o-details">
         <div style="font-weight:700; color:var(--card-text); margin-bottom:4px; font-size:11px; text-transform:uppercase; letter-spacing:1px;">Quest Rewards</div>
         ${rewHtml}
         ${(o.tier !== 'legend' && !o.ftyperew) ? `<div class="o-reward-item" style="color:var(--text-dim); font-size:11px;">${ICONS.egg} Chance for Bonus Egg Drop</div>` : ''}
         <div class="o-how">
            <strong>GUIDE:</strong> ${o.howTo || 'Complete the tracking metric to fulfill this quest and earn rewards.'}
         </div>
      </div>

      <div class="ofoot" style="margin-top:12px; display:flex; justify-content:flex-end;">
          <button class="cbtn2 ${done&&!o.claimed?'claim-ready':''}" onclick="event.stopPropagation(); claimOrder(${i})" ${done&&!o.claimed?'':'disabled'} 
                  style="width:auto; min-width:120px; border-radius:14px; border-width:2px; ${done&&!o.claimed?`border-color:${isDaily?'#a855f7':tm.strip};color:white;background:${isDaily?'#a855f7':tm.strip};`:''}">
            ${btnText}
          </button>
      </div>
    </div>`;
  }).join('');

  const done=currentOrders.filter(o=>o.claimed).length;
  generateDailyQuest(); // Ensure daily is present
  html+=`<div id="daily-timer" style="text-align:center;font-size:11px;font-weight:700;color:var(--text-dim);margin:20px 0 10px;"></div>`;
  html+=`<div class="q-total" style="margin-top:0;">${completedOrders} quests completed lifetime • ${ORDER_POOL.length} quests in pool</div>`;
  olist.innerHTML=html;
}

     fishList=[];eggs=[];foodList=[];bubbles=[];

     curFloor='default';curTheme='default';curBorder='none';curBubble='default';_substrateDirty=true;_waterGrad=null;
     ownedThemes=['default'];ownedFloors=['default'];ownedBorders=['none'];
     ownedBubbles=['default'];ownedFlora=['seaweed','grass'];activeFlora=['seaweed','grass'];applyBorder();
     boughtCounts={};for(let k in TYPES)boughtCounts[k]=0;
     sm={feeds:0,harmonySec:0,cleaned:0,hatched:0,rares:0,marketSales:0,bonded:0};
     questStreak=0; currentOrders=[]; completedOrders=0; codesRedeemed=0;
     Object.values(UPGRADES).forEach(u=>u.owned=0);
     saveGame();
     location.reload();
  }
}

function toggleQuest(i, el){
  if(_openQuests.has(i)) {
    _openQuests.delete(i);
    if(el) el.classList.remove('expanded');
  } else {
    _openQuests.add(i);
    if(el) el.classList.add('expanded');
  }
}

// Build a flat node map for fast lookup
const SW_NODE_MAP = {};

// ── Tree layout precomputation ─────────────────────────────────────
function swHexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
const SW_TREE_POS = {};
function swBuildTreeLayout() {
  const depthCache = {};
  function getDepth(nodeId) {
    if (depthCache[nodeId] !== undefined) return depthCache[nodeId];
    const nd = SW_NODE_MAP[nodeId];
    if (!nd || nd.req.length === 0) { depthCache[nodeId] = 0; return 0; }
    let maxD = 0;
    for (const rid of nd.req) maxD = Math.max(maxD, getDepth(rid) + 1);
    depthCache[nodeId] = maxD;
    return maxD;
  }
  SW_CLUSTERS.forEach(cl => {
    if (cl.id === 'core') {
      cl.nodes.forEach(nd => {
        const depth = getDepth(nd.id);
        const rad = (nd.angle * Math.PI) / 180;
        const dist = 80 + depth * 78;
        SW_TREE_POS[nd.id] = {
          x: cl.cx + Math.cos(rad) * dist,
          y: cl.cy + Math.sin(rad) * dist
        };
      });
    } else {
      const len = Math.sqrt(cl.cx * cl.cx + cl.cy * cl.cy) || 1;
      const dirX = cl.cx / len;
      const dirY = cl.cy / len;
      const perpX = -dirY;
      const perpY = dirX;
      cl.nodes.forEach((nd, i) => {
        const depth = getDepth(nd.id);
        const wobble = Math.sin(depth * 2.3 + i * 1.7) * 20;
        SW_TREE_POS[nd.id] = {
          x: cl.cx + dirX * depth * 85 + perpX * wobble,
          y: cl.cy + dirY * depth * 85 + perpY * wobble
        };
      });
    }
  });
}
swBuildTreeLayout();

// State

// Compute world position for a node given its parent cluster
function swNodePos(nd, cl) {
  if (SW_TREE_POS[nd.id]) return SW_TREE_POS[nd.id];
  const rad = (nd.angle * Math.PI) / 180;
  return {
    x: cl.cx + Math.cos(rad) * nd.dist,
    y: cl.cy + Math.sin(rad) * nd.dist
  };
}

// ── World <-> Screen conversions ────────────────────────────────────
function swWorldToScreen(wx, wy) {
  const cvs = document.getElementById('swc');
  if (!cvs) return { x: 0, y: 0 };
  return {
    x: (wx - sw_camX) * sw_zoom + cvs.width / 2,
    y: (wy - sw_camY) * sw_zoom + cvs.height / 2
  };
}
function swScreenToWorld(sx, sy) {
  const cvs = document.getElementById('swc');
  if (!cvs) return { x: 0, y: 0 };
  return {
    x: (sx - cvs.width / 2) / sw_zoom + sw_camX,
    y: (sy - cvs.height / 2) / sw_zoom + sw_camY
  };
}

// ── Reveal Check ─────────────────────────────────────────────────────
function swCheckReveal(silent) {
  SW_CLUSTERS.forEach(cl => {
    if (playerLevel >= cl.req && !sw_revealed.has(cl.id)) {
      sw_revealed.add(cl.id);
      if (!silent) {
        sw_revealAnims.push({ clusterId: cl.id, startTime: performance.now() });
      }
    }
  });
}

// ── Ownership helpers ─────────────────────────────────────────────────
function swOwned(nodeId) {
  return SW_NODE_OWNED[nodeId] || 0;
}
function swMastery(nodeId) {
  return sw_mastery[nodeId] || 0;
}
function swNodeMaxed(nd) {
  return swOwned(nd.id) >= nd.max;
}
function swNodeCost(nd) {
  const base = nd.cost;
  const m = swMastery(nd.id);
  if (!swNodeMaxed(nd)) return base;
  if (m === 0) return base * 5;   // M1
  if (m === 1) return base * 25;  // M2
  if (m === 2) return base * 125; // M3
  return Infinity;
}
function swNodeFullyDone(nd) {
  return swMastery(nd.id) >= 3;
}
function swCanBuy(nd, cl) {
  if (swNodeFullyDone(nd)) return false;
  if (playerLevel < cl.req) return false;
  for (const reqId of nd.req) {
    const reqNd = SW_NODE_MAP[reqId];
    if (!reqNd) continue;
    const reqCl = SW_CLUSTERS.find(c => c.id === reqNd.clusterId);
    if (!reqCl) continue;
    if (!swNodeMaxed(reqNd)) return false;
  }
  return coins >= swNodeCost(nd);
}

// ── Supernova check ──────────────────────────────────────────────────
function swCheckSupernova(cl) {
  if (cl.nodes.every(nd => swMastery(nd.id) >= 1)) {
    if (!sm.clusterMastered) sm.clusterMastered = [];
    if (!sm.clusterMastered.includes(cl.id)) {
      sm.clusterMastered.push(cl.id);
      sw_supernova.push({ clusterId: cl.id, startTime: performance.now() });
      swShowToast('Cluster Mastered: ' + cl.name);
    }
  }
}
