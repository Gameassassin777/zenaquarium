// ── Purchase logic ────────────────────────────────────────────────────
function swBuyNode(nd) {
  const cl = SW_CLUSTERS.find(c => c.id === nd.clusterId);
  if (!cl) return;
  if (!swCanBuy(nd, cl)) return;

  const cost = swNodeCost(nd);
  coins -= cost;
  sm.coinsSpent = (sm.coinsSpent || 0) + cost;

  if (!swNodeMaxed(nd)) {
    SW_NODE_OWNED[nd.id] = (SW_NODE_OWNED[nd.id] || 0) + 1;
    // Sync Core cluster nodes with UPGRADES
    if (cl.id === 'core' && nd.effect && UPGRADES[nd.effect] !== undefined) {
      UPGRADES[nd.effect].owned = Math.max(UPGRADES[nd.effect].owned || 0, SW_NODE_OWNED[nd.id]);
    }
  } else {
    // Buying mastery level
    sw_mastery[nd.id] = (sw_mastery[nd.id] || 0) + 1;
    swCheckSupernova(cl);
  }

  updateHUD();
  saveGame();
  // Buy burst animation
  const bpos = swNodePos(nd, cl);
  sw_buyBursts.push({ x: bpos.x, y: bpos.y, startTime: performance.now(), color: cl.color });
  swDrawAll();
}

// ── Main render ───────────────────────────────────────────────────────
function swDrawAll() {
  const cvs = document.getElementById('swc');
  if (!cvs) return;
  const ctx2 = cvs.getContext('2d');
  if (!ctx2) return;
  const W2 = cvs.width, H2 = cvs.height;
  const now = performance.now();
  const dt = now - (sw_lastFrame || now);
  sw_lastFrame = now;

  // ── Background ──
  ctx2.clearRect(0, 0, W2, H2);
  const bg = ctx2.createRadialGradient(W2/2, H2/2, 0, W2/2, H2/2, Math.max(W2,H2)*0.9);
  bg.addColorStop(0, '#0a0e1a');
  bg.addColorStop(0.5, '#060a14');
  bg.addColorStop(1, '#020408');
  ctx2.fillStyle = bg;
  ctx2.fillRect(0, 0, W2, H2);

  // ── Nebula clouds ──
  sw_nebulae.forEach((neb, i) => {
    const drift = now * 0.00003;
    const nx = neb.x + Math.sin(drift + i * 1.5) * 50;
    const ny = neb.y + Math.cos(drift * 0.7 + i * 2.1) * 40;
    const spos = swWorldToScreen(nx, ny);
    const radius = neb.r * sw_zoom;
    const [nr,ng,nb] = swHexRgb(neb.color);
    const grad = ctx2.createRadialGradient(spos.x, spos.y, 0, spos.x, spos.y, radius);
    grad.addColorStop(0, `rgba(${nr},${ng},${nb},0.07)`);
    grad.addColorStop(0.4, `rgba(${nr},${ng},${nb},0.03)`);
    grad.addColorStop(1, `rgba(${nr},${ng},${nb},0)`);
    ctx2.fillStyle = grad;
    ctx2.beginPath();
    ctx2.arc(spos.x, spos.y, radius, 0, Math.PI * 2);
    ctx2.fill();
  });

  // ── Star field with twinkling ──
  for (let i = 0; i < sw_stars.length; i++) {
    const star = sw_stars[i];
    const px = star.x * star.parallax;
    const py = star.y * star.parallax;
    const spos = swWorldToScreen(px, py);
    if (spos.x < -20 || spos.x > W2 + 20 || spos.y < -20 || spos.y > H2 + 20) continue;
    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(now * star.twinkleSpeed + star.twinklePhase));
    const alpha = star.alpha * twinkle;
    ctx2.beginPath();
    ctx2.arc(spos.x, spos.y, Math.max(0.4, star.size * sw_zoom), 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(${star.cr},${star.cg},${star.cb},${alpha.toFixed(2)})`;
    ctx2.fill();
    if (star.size > 1.4 && alpha > 0.45) {
      ctx2.globalAlpha = alpha * 0.25;
      ctx2.strokeStyle = `rgba(${star.cr},${star.cg},${star.cb},1)`;
      ctx2.lineWidth = 0.5;
      const fl = star.size * 4 * sw_zoom;
      ctx2.beginPath();
      ctx2.moveTo(spos.x - fl, spos.y); ctx2.lineTo(spos.x + fl, spos.y);
      ctx2.moveTo(spos.x, spos.y - fl); ctx2.lineTo(spos.x, spos.y + fl);
      ctx2.stroke();
      ctx2.globalAlpha = 1;
    }
  }

  // ── Inter-cluster curved connectors ──
  SW_CLUSTERS.forEach(cl => {
    if (cl.id === 'core') return;
    const coreCl = SW_CLUSTERS.find(c => c.id === 'core');
    if (!coreCl) return;
    const a = swWorldToScreen(cl.cx, cl.cy);
    const b = swWorldToScreen(coreCl.cx, coreCl.cy);
    const perpX = -(a.y - b.y) * 0.15;
    const perpY = (a.x - b.x) * 0.15;
    const midX = (a.x + b.x) / 2;
    const midY = (a.y + b.y) / 2;
    // Glow layer
    ctx2.beginPath();
    ctx2.moveTo(a.x, a.y);
    ctx2.quadraticCurveTo(midX + perpX, midY + perpY, b.x, b.y);
    ctx2.strokeStyle = cl.color;
    ctx2.globalAlpha = 0.06;
    ctx2.lineWidth = 8 * sw_zoom;
    ctx2.stroke();
    // Thin dashed line
    ctx2.beginPath();
    ctx2.moveTo(a.x, a.y);
    ctx2.quadraticCurveTo(midX + perpX, midY + perpY, b.x, b.y);
    ctx2.strokeStyle = cl.color;
    ctx2.globalAlpha = 0.12;
    ctx2.lineWidth = 1.2;
    ctx2.setLineDash([4, 6]);
    ctx2.stroke();
    ctx2.setLineDash([]);
    ctx2.globalAlpha = 1;
  });

  // ── Node connector lines (bezier curves) ──
  SW_CLUSTERS.forEach(cl => {
    const revealed = sw_revealed.has(cl.id);
    cl.nodes.forEach(nd => {
      nd.req.forEach(reqId => {
        const reqNd = SW_NODE_MAP[reqId];
        if (!reqNd) return;
        const reqCl = SW_CLUSTERS.find(c => c.id === reqNd.clusterId);
        if (!reqCl) return;
        const posA = swWorldToScreen(swNodePos(nd, cl).x, swNodePos(nd, cl).y);
        const posB = swWorldToScreen(swNodePos(reqNd, reqCl).x, swNodePos(reqNd, reqCl).y);
        const bothOwned = swOwned(nd.id) > 0 && swOwned(reqNd.id) > 0;
        const perpX2 = -(posA.y - posB.y) * 0.12;
        const perpY2 = (posA.x - posB.x) * 0.12;
        const midX2 = (posA.x + posB.x) / 2;
        const midY2 = (posA.y + posB.y) / 2;

        if (!revealed) {
          ctx2.beginPath();
          ctx2.moveTo(posA.x, posA.y);
          ctx2.quadraticCurveTo(midX2 + perpX2, midY2 + perpY2, posB.x, posB.y);
          ctx2.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx2.lineWidth = 1;
          ctx2.stroke();
        } else {
          // Wide glow for owned connections
          if (bothOwned) {
            ctx2.beginPath();
            ctx2.moveTo(posA.x, posA.y);
            ctx2.quadraticCurveTo(midX2 + perpX2, midY2 + perpY2, posB.x, posB.y);
            ctx2.strokeStyle = cl.color;
            ctx2.globalAlpha = 0.12;
            ctx2.lineWidth = Math.max(3, 6 * sw_zoom);
            ctx2.stroke();
            ctx2.globalAlpha = 1;
          }
          // Main line
          ctx2.beginPath();
          ctx2.moveTo(posA.x, posA.y);
          ctx2.quadraticCurveTo(midX2 + perpX2, midY2 + perpY2, posB.x, posB.y);
          if (bothOwned) {
            ctx2.strokeStyle = cl.color;
            ctx2.globalAlpha = 0.8;
            ctx2.lineWidth = 2;
          } else {
            ctx2.strokeStyle = cl.color;
            ctx2.globalAlpha = 0.2;
            ctx2.lineWidth = 1.2;
            ctx2.setLineDash([3, 5]);
          }
          ctx2.stroke();
          ctx2.setLineDash([]);
          ctx2.globalAlpha = 1;
        }
      });
    });
  });

  // ── Energy flow particles along owned connections ──
  sw_energyParticles.forEach(ep => {
    ep.progress += ep.speed * dt * 0.001;
    if (ep.progress > 1) ep.progress -= 1;
    const ndA = SW_NODE_MAP[ep.fromId];
    const ndB = SW_NODE_MAP[ep.toId];
    if (!ndA || !ndB) return;
    if (swOwned(ep.fromId) <= 0 || swOwned(ep.toId) <= 0) return;
    const clA = SW_CLUSTERS.find(c => c.id === ndA.clusterId);
    const clB = SW_CLUSTERS.find(c => c.id === ndB.clusterId);
    if (!clA || !clB) return;
    const posA = swWorldToScreen(swNodePos(ndA, clA).x, swNodePos(ndA, clA).y);
    const posB = swWorldToScreen(swNodePos(ndB, clB).x, swNodePos(ndB, clB).y);
    const perpX3 = -(posA.y - posB.y) * 0.12;
    const perpY3 = (posA.x - posB.x) * 0.12;
    const cpx = (posA.x + posB.x) / 2 + perpX3;
    const cpy = (posA.y + posB.y) / 2 + perpY3;
    const t = ep.progress;
    const it = 1 - t;
    const px = it*it*posA.x + 2*it*t*cpx + t*t*posB.x;
    const py = it*it*posA.y + 2*it*t*cpy + t*t*posB.y;
    const alpha = Math.sin(t * Math.PI) * 0.8;
    const [er,eg,eb] = swHexRgb(ep.color);
    // Glow
    ctx2.beginPath();
    ctx2.arc(px, py, Math.max(3, 5 * sw_zoom), 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(${er},${eg},${eb},${(alpha * 0.2).toFixed(2)})`;
    ctx2.fill();
    // Core dot
    ctx2.beginPath();
    ctx2.arc(px, py, Math.max(1, 2 * sw_zoom), 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(${Math.min(255,er+60)},${Math.min(255,eg+60)},${Math.min(255,eb+60)},${alpha.toFixed(2)})`;
    ctx2.fill();
  });

  // ── Supernova flash ──
  sw_supernova.forEach(sn => {
    const elapsed = now - sn.startTime;
    if (elapsed < 800) {
      let alpha;
      if (elapsed < 400) alpha = (elapsed / 400) * 0.7;
      else alpha = 0.7 * (1 - (elapsed - 400) / 400);
      ctx2.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx2.fillRect(0, 0, W2, H2);
    }
    if (elapsed < 3000) {
      const cl2 = SW_CLUSTERS.find(c => c.id === sn.clusterId);
      if (cl2) {
        const t2 = (now / 500) % 1;
        cl2.nodes.forEach(ndA => {
          cl2.nodes.forEach(ndB => {
            if (ndA === ndB) return;
            const pA = swWorldToScreen(swNodePos(ndA, cl2).x, swNodePos(ndA, cl2).y);
            const pB = swWorldToScreen(swNodePos(ndB, cl2).x, swNodePos(ndB, cl2).y);
            const h = (t2 * 360 + ndA.angle) % 360;
            ctx2.beginPath();
            ctx2.moveTo(pA.x, pA.y); ctx2.lineTo(pB.x, pB.y);
            ctx2.strokeStyle = `hsl(${h},100%,65%)`;
            ctx2.globalAlpha = 0.5;
            ctx2.lineWidth = 1.5;
            ctx2.stroke();
            ctx2.globalAlpha = 1;
          });
        });
      }
    }
  });

  // ── Buy burst animations ──
  for (let i = sw_buyBursts.length - 1; i >= 0; i--) {
    const burst = sw_buyBursts[i];
    const elapsed = now - burst.startTime;
    if (elapsed > 600) { sw_buyBursts.splice(i, 1); continue; }
    const spos = swWorldToScreen(burst.x, burst.y);
    const [br,bGreen,bb] = swHexRgb(burst.color);
    const progress = elapsed / 600;
    // Expanding rings
    for (let ring = 0; ring < 3; ring++) {
      const rp = Math.max(0, progress - ring * 0.12);
      if (rp <= 0) continue;
      const radius = rp * 50 * sw_zoom;
      const alpha = (1 - rp) * 0.5;
      ctx2.beginPath();
      ctx2.arc(spos.x, spos.y, radius, 0, Math.PI * 2);
      ctx2.strokeStyle = `rgba(${br},${bGreen},${bb},${alpha.toFixed(2)})`;
      ctx2.lineWidth = 2;
      ctx2.stroke();
    }
    // Center flash
    const flashAlpha = Math.max(0, 1 - progress * 2);
    if (flashAlpha > 0) {
      const flashGrad = ctx2.createRadialGradient(spos.x, spos.y, 0, spos.x, spos.y, 20 * sw_zoom);
      flashGrad.addColorStop(0, `rgba(255,255,255,${(flashAlpha * 0.6).toFixed(2)})`);
      flashGrad.addColorStop(1, `rgba(${br},${bGreen},${bb},0)`);
      ctx2.fillStyle = flashGrad;
      ctx2.beginPath();
      ctx2.arc(spos.x, spos.y, 20 * sw_zoom, 0, Math.PI * 2);
      ctx2.fill();
    }
  }

  // ── Draw clusters & nodes ──
  SW_CLUSTERS.forEach(cl => {
    const revealed = sw_revealed.has(cl.id);
    let revAlpha = 1, revScale = 1;
    const ra = sw_revealAnims.find(r => r.clusterId === cl.id);
    if (ra) {
      const elapsed = now - ra.startTime;
      if (elapsed < 800) {
        revAlpha = elapsed / 800;
        revScale = 0.5 + 0.5 * Math.min(1, elapsed / 600);
      }
    }

    // Cluster name label with glow
    const clCenter = swWorldToScreen(cl.cx, cl.cy);
    ctx2.save();
    ctx2.globalAlpha = revealed ? 0.7 * revAlpha : 0.15;
    const fontSize = Math.max(9, Math.round(12 * sw_zoom));
    ctx2.font = `bold ${fontSize}px system-ui`;
    ctx2.fillStyle = cl.color;
    ctx2.textAlign = 'center';
    ctx2.textBaseline = 'bottom';
    if (revealed) {
      ctx2.shadowColor = cl.color;
      ctx2.shadowBlur = 15;
    }
    ctx2.fillText(cl.name.toUpperCase(), clCenter.x, clCenter.y - 12);
    ctx2.shadowBlur = 0;
    ctx2.restore();

    // Lock ring for unrevealed clusters
    if (!revealed) {
      ctx2.save();
      const lockPulse = 0.5 + 0.5 * Math.sin(now * 0.002);
      ctx2.globalAlpha = 0.08 + lockPulse * 0.04;
      ctx2.beginPath();
      ctx2.arc(clCenter.x, clCenter.y, (120 + lockPulse * 10) * sw_zoom, 0, Math.PI * 2);
      ctx2.strokeStyle = cl.color;
      ctx2.lineWidth = 1;
      ctx2.setLineDash([3, 5]);
      ctx2.stroke();
      ctx2.setLineDash([]);
      ctx2.globalAlpha = 0.25;
      ctx2.font = `${Math.max(8, Math.round(10 * sw_zoom))}px system-ui`;
      ctx2.fillStyle = cl.color;
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'middle';
      ctx2.fillText(`\u{1F512} Level ${cl.req}`, clCenter.x, clCenter.y + 4);
      ctx2.restore();
    }

    // Draw nodes
    cl.nodes.forEach(nd => {
      const wpos = swNodePos(nd, cl);
      const spos = swWorldToScreen(wpos.x, wpos.y);
      if (spos.x < -80 || spos.x > W2+80 || spos.y < -80 || spos.y > H2+80) return;
      const baseR = Math.max(8, 26 * sw_zoom * (revealed ? revScale : 1));
      const owned = swOwned(nd.id);
      const mastery = swMastery(nd.id);
      const maxed = swNodeMaxed(nd);
      const canBuy = revealed && swCanBuy(nd, cl);

      ctx2.save();
      if (!revealed) ctx2.globalAlpha = 0.12;
      else ctx2.globalAlpha = revAlpha;

      // Buyable pulse
      let pulseScale = 1;
      if (canBuy && !swNodeFullyDone(nd)) {
        pulseScale = 1 + 0.08 * Math.sin(now * 0.004);
      }
      const r = baseR * pulseScale;

      // Outer glow for owned nodes
      if (owned > 0 && revealed) {
        const [gr,gg,gb] = swHexRgb(cl.color);
        const glowR = r + Math.max(4, 8 * sw_zoom);
        const glow = ctx2.createRadialGradient(spos.x, spos.y, r * 0.7, spos.x, spos.y, glowR);
        glow.addColorStop(0, `rgba(${gr},${gg},${gb},0.25)`);
        glow.addColorStop(1, `rgba(${gr},${gg},${gb},0)`);
        ctx2.fillStyle = glow;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, glowR, 0, Math.PI * 2);
        ctx2.fill();
      }

      // Buyable glow (green pulse)
      if (canBuy && !swNodeFullyDone(nd) && revealed) {
        const gAlpha = 0.1 + 0.08 * Math.sin(now * 0.003);
        const glowR2 = r + Math.max(6, 12 * sw_zoom);
        const glow2 = ctx2.createRadialGradient(spos.x, spos.y, r, spos.x, spos.y, glowR2);
        glow2.addColorStop(0, `rgba(52,211,153,${gAlpha.toFixed(2)})`);
        glow2.addColorStop(1, 'rgba(52,211,153,0)');
        ctx2.fillStyle = glow2;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, glowR2, 0, Math.PI * 2);
        ctx2.fill();
      }

      // Node fill (radial gradient for 3D look)
      const [cr,cg,cb] = swHexRgb(cl.color);
      const nodeGrad = ctx2.createRadialGradient(
        spos.x - r * 0.25, spos.y - r * 0.25, 0,
        spos.x, spos.y, r
      );
      if (owned > 0 || maxed) {
        nodeGrad.addColorStop(0, `rgba(${Math.min(255,cr+70)},${Math.min(255,cg+70)},${Math.min(255,cb+70)},1)`);
        nodeGrad.addColorStop(1, cl.color);
      } else {
        nodeGrad.addColorStop(0, `rgba(${cr},${cg},${cb},0.4)`);
        nodeGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0.18)`);
      }
      ctx2.beginPath();
      ctx2.arc(spos.x, spos.y, r, 0, Math.PI * 2);
      ctx2.fillStyle = nodeGrad;
      ctx2.fill();

      // Mastery rings
      if (mastery >= 3) {
        ctx2.shadowColor = '#ffffff';
        ctx2.shadowBlur = Math.max(8, 20 * sw_zoom);
        ctx2.strokeStyle = '#ffffff';
        ctx2.lineWidth = 2.5;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, r + 2, 0, Math.PI * 2);
        ctx2.stroke();
        // Orbiting particles
        for (let k = 0; k < 4; k++) {
          const a2 = (now * 0.002 + k * Math.PI / 2) % (Math.PI * 2);
          const px2 = spos.x + Math.cos(a2) * (r + 6);
          const py2 = spos.y + Math.sin(a2) * (r + 6);
          ctx2.beginPath();
          ctx2.arc(px2, py2, Math.max(1, 1.5 * sw_zoom), 0, Math.PI * 2);
          ctx2.fillStyle = '#ffffff';
          ctx2.fill();
        }
        ctx2.shadowBlur = 0;
      } else if (mastery === 2) {
        const h2 = (now / 500) % 360;
        ctx2.strokeStyle = `hsl(${h2},100%,65%)`;
        ctx2.lineWidth = 2.5;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, r + 1, 0, Math.PI * 2);
        ctx2.stroke();
      } else if (mastery === 1) {
        ctx2.strokeStyle = '#fbbf24';
        ctx2.lineWidth = 2.5;
        ctx2.shadowColor = '#fbbf24';
        ctx2.shadowBlur = 8;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, r + 1, 0, Math.PI * 2);
        ctx2.stroke();
        ctx2.shadowBlur = 0;
      } else {
        ctx2.strokeStyle = (owned > 0) ? cl.color : `rgba(${cr},${cg},${cb},0.5)`;
        ctx2.lineWidth = 1.5;
        ctx2.beginPath();
        ctx2.arc(spos.x, spos.y, r, 0, Math.PI * 2);
        ctx2.stroke();
      }

      // Inner badge/symbol
      if (swNodeFullyDone(nd)) {
        ctx2.font = `${Math.max(8, Math.round(12 * sw_zoom))}px system-ui`;
        ctx2.fillStyle = '#fbbf24';
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'middle';
        ctx2.fillText('\u2605', spos.x, spos.y);
      } else if (maxed && nd.max === 1) {
        ctx2.font = `${Math.max(8, Math.round(12 * sw_zoom))}px system-ui`;
        ctx2.fillStyle = '#f8fafc';
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'middle';
        ctx2.fillText('\u2713', spos.x, spos.y);
      } else if (owned > 0 && nd.max > 1) {
        ctx2.font = `bold ${Math.max(7, Math.round(9 * sw_zoom))}px system-ui`;
        ctx2.fillStyle = '#f8fafc';
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'middle';
        ctx2.fillText(owned + '/' + nd.max, spos.x, spos.y);
      }

      if (revealed) {
        // Node name
        const fsize = Math.max(7, Math.round(9 * sw_zoom));
        ctx2.font = `600 ${fsize}px system-ui`;
        ctx2.fillStyle = '#e2e8f0';
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'top';
        ctx2.fillText(nd.name, spos.x, spos.y + r + 5);
        // Cost label
        if (!swNodeFullyDone(nd)) {
          const costStr = swFmtCost(swNodeCost(nd));
          const costFsize = Math.max(6, Math.round(8 * sw_zoom));
          ctx2.font = `bold ${costFsize}px system-ui`;
          ctx2.fillStyle = canBuy ? '#34d399' : `rgba(${cr},${cg},${cb},0.6)`;
          ctx2.textAlign = 'center';
          ctx2.textBaseline = 'bottom';
          ctx2.fillText(costStr, spos.x, spos.y - r - 3);
        }
      }

      ctx2.restore();
    });
  });

  // ── Ambient floating particles ──
  sw_ambientParticles.forEach(p => {
    p.x += p.vx * dt * 0.001;
    p.y += p.vy * dt * 0.001;
    p.life += dt * 0.001;
    let alpha;
    if (p.life < 1) alpha = p.life;
    else if (p.life > p.maxLife - 1) alpha = Math.max(0, p.maxLife - p.life);
    else alpha = 1;
    alpha *= p.baseAlpha;
    if (p.life > p.maxLife) {
      p.x = (Math.random() - 0.5) * 2000;
      p.y = (Math.random() - 0.5) * 1500;
      p.life = 0;
    }
    const spos = swWorldToScreen(p.x, p.y);
    if (spos.x < -10 || spos.x > W2+10 || spos.y < -10 || spos.y > H2+10) return;
    ctx2.beginPath();
    ctx2.arc(spos.x, spos.y, Math.max(0.5, p.size * sw_zoom), 0, Math.PI * 2);
    ctx2.fillStyle = `rgba(${p.cr},${p.cg},${p.cb},${Math.max(0, alpha).toFixed(2)})`;
    ctx2.fill();
  });

  // ── Vignette ──
  const vigGrad = ctx2.createRadialGradient(W2/2, H2/2, Math.min(W2,H2)*0.3, W2/2, H2/2, Math.max(W2,H2)*0.7);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx2.fillStyle = vigGrad;
  ctx2.fillRect(0, 0, W2, H2);

  // Clean up old animations
  for (let i = sw_revealAnims.length - 1; i >= 0; i--) {
    if (now - sw_revealAnims[i].startTime > 850) sw_revealAnims.splice(i, 1);
  }
  for (let i = sw_supernova.length - 1; i >= 0; i--) {
    if (now - sw_supernova[i].startTime > 3200) sw_supernova.splice(i, 1);
  }

  // Draw minimap
  swDrawMinimap();
}

function swFmtCost(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(Math.round(n));
}

// ── Minimap ──────────────────────────────────────────────────────────
function swDrawMinimap() {
  const mini = document.getElementById('sw-mini');
  if (!mini) return;
  const mc = mini.getContext('2d');
  const MW = SW_MINI_W, MH = SW_MINI_H;
  mc.clearRect(0, 0, MW, MH);
  mc.fillStyle = 'rgba(0,0,0,0.7)';
  mc.fillRect(0, 0, MW, MH);

  // World bounds
  const WX_MIN = -1000, WX_MAX = 1000, WY_MIN = -900, WY_MAX = 900;
  const ww = WX_MAX - WX_MIN, wh = WY_MAX - WY_MIN;
  const toMiniX = wx => ((wx - WX_MIN) / ww) * MW;
  const toMiniY = wy => ((wy - WY_MIN) / wh) * MH;
  SW_CLUSTERS.forEach(cl => {
    mc.beginPath();
    mc.arc(toMiniX(cl.cx), toMiniY(cl.cy), 5, 0, Math.PI * 2);
    mc.fillStyle = sw_revealed.has(cl.id) ? cl.color : 'rgba(255,255,255,0.15)';
    mc.fill();
  });

  // Viewport rect
  const cvs = document.getElementById('swc');
  if (cvs) {
    const tl = swScreenToWorld(0, 0);
    const br = swScreenToWorld(cvs.width, cvs.height);
    const mx = toMiniX(tl.x), my = toMiniY(tl.y);
    const mw = toMiniX(br.x) - mx, miniH = toMiniY(br.y) - my;
    mc.strokeStyle = 'rgba(255,255,255,0.55)';
    mc.lineWidth = 1;
    mc.strokeRect(mx, my, mw, miniH);
  }
}

// ── RAF loop ─────────────────────────────────────────────────────────
function swLoop() {
  if (!sw_open) { sw_animRAF = null; return; }
  swCheckReveal(false);
  swDrawAll();
  sw_animRAF = requestAnimationFrame(swLoop);
}
function swStartLoop() {
  if (sw_animRAF) cancelAnimationFrame(sw_animRAF);
  sw_animRAF = requestAnimationFrame(swLoop);
}

// ── Tooltip ───────────────────────────────────────────────────────────
function swShowTip(nd, cl, sx, sy) {
  const tip = document.getElementById('sw-tip');
  if (!tip) return;
  const owned = swOwned(nd.id);
  const mastery = swMastery(nd.id);
  const cost = swNodeCost(nd);
  const canBuy = swCanBuy(nd, cl);
  let masteryLabel = '';
  if (mastery > 0) masteryLabel = ' (M' + mastery + ')';
  let costLine = swNodeFullyDone(nd) ? 'Mastered' : 'Cost: ' + swFmtCost(cost) + (canBuy ? '' : ' (need more coins)');
  tip.innerHTML = `<strong>${nd.name}</strong>${masteryLabel}<br>${nd.desc}<br><span style="opacity:0.7;font-size:11px;">${costLine}</span>`;
  const cvs = document.getElementById('swc');
  const tipW = 200, tipH = 80;
  let tx = sx + 14, ty = sy - 20;
  if (cvs && tx + tipW > cvs.width) tx = sx - tipW - 14;
  if (cvs && ty + tipH > cvs.height) ty = sy - tipH;
  tip.style.left = tx + 'px';
  tip.style.top  = ty + 'px';
  tip.style.display = 'block';
}
function swHideTip() {
  const tip = document.getElementById('sw-tip');
  if (tip) tip.style.display = 'none';
}

// ── Hit test ─────────────────────────────────────────────────────────
function swHitNode(sx, sy) {
  const hitR = Math.max(8, 28 * sw_zoom + 6);
  for (const cl of SW_CLUSTERS) {
    for (const nd of cl.nodes) {
      const wpos = swNodePos(nd, cl);
      const spos = swWorldToScreen(wpos.x, wpos.y);
      const dx = sx - spos.x, dy = sy - spos.y;
      if (dx*dx + dy*dy <= hitR*hitR) return { nd, cl };
    }
  }
  return null;
}

// ── Mouse / touch events ─────────────────────────────────────────────
function swInitEvents() {
  const cvs = document.getElementById('swc');
  const mini = document.getElementById('sw-mini');
  if (!cvs) return;

  // Mouse wheel zoom
  cvs.addEventListener('wheel', e => {
    e.preventDefault();
    const scaleFactor = e.deltaY < 0 ? 1.12 : 0.89;
    const oldZoom = sw_zoom;
    sw_zoom = Math.min(SW_ZOOM_MAX, Math.max(SW_ZOOM_MIN, sw_zoom * scaleFactor));
    // Zoom toward cursor
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const wBefore = swScreenToWorld(mx, my);
    // After zoom change, adjust cam so wBefore maps back to same screen pos
    sw_camX = wBefore.x - (mx - cvs.width/2) / sw_zoom;
    sw_camY = wBefore.y - (my - cvs.height/2) / sw_zoom;
  }, { passive: false });

  // Mouse drag
  cvs.addEventListener('mousedown', e => {
    sw_dragging = true;
    sw_dragSX = e.clientX; sw_dragSY = e.clientY;
    sw_dragCamX = sw_camX; sw_dragCamY = sw_camY;
  });
  window.addEventListener('mousemove', e => {
    if (!sw_open) return;
    if (sw_dragging) {
      const dx = e.clientX - sw_dragSX;
      const dy = e.clientY - sw_dragSY;
      sw_camX = sw_dragCamX - dx / sw_zoom;
      sw_camY = sw_dragCamY - dy / sw_zoom;
      swHideTip();
    } else if (sw_open && cvs) {
      const rect = cvs.getBoundingClientRect();
      const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
      const hit = swHitNode(sx, sy);
      if (hit) {
        cvs.style.cursor = 'pointer';
        swShowTip(hit.nd, hit.cl, sx, sy);
      } else {
        cvs.style.cursor = 'grab';
        swHideTip();
      }
    }
  });
  window.addEventListener('mouseup', e => {
    if (!sw_open) return;
    if (sw_dragging) {
      const dist = Math.hypot(e.clientX - sw_dragSX, e.clientY - sw_dragSY);
      sw_dragging = false;
      if (dist < 5) {
        // Click — buy node
        const rect = cvs.getBoundingClientRect();
        const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
        const hit = swHitNode(sx, sy);
        if (hit && sw_revealed.has(hit.cl.id)) {
          swBuyNode(hit.nd);
        }
      }
    }
  });

  // Touch events
  cvs.addEventListener('touchstart', e => {
    e.preventDefault();
    sw_touches = Array.from(e.touches);
    if (sw_touches.length === 1) {
      sw_dragging = true;
      sw_dragSX = sw_touches[0].clientX; sw_dragSY = sw_touches[0].clientY;
      sw_dragCamX = sw_camX; sw_dragCamY = sw_camY;
    } else if (sw_touches.length === 2) {
      sw_dragging = false;
      sw_lastPinchDist = Math.hypot(
        sw_touches[0].clientX - sw_touches[1].clientX,
        sw_touches[0].clientY - sw_touches[1].clientY
      );
    }
  }, { passive: false });

  cvs.addEventListener('touchmove', e => {
    e.preventDefault();
    sw_touches = Array.from(e.touches);
    if (sw_touches.length === 1 && sw_dragging) {
      const dx = sw_touches[0].clientX - sw_dragSX;
      const dy = sw_touches[0].clientY - sw_dragSY;
      sw_camX = sw_dragCamX - dx / sw_zoom;
      sw_camY = sw_dragCamY - dy / sw_zoom;
    } else if (sw_touches.length === 2) {
      const dist = Math.hypot(
        sw_touches[0].clientX - sw_touches[1].clientX,
        sw_touches[0].clientY - sw_touches[1].clientY
      );
      const midX = (sw_touches[0].clientX + sw_touches[1].clientX) / 2;
      const midY = (sw_touches[0].clientY + sw_touches[1].clientY) / 2;
      const rect = cvs.getBoundingClientRect();
      const smx = midX - rect.left, smy = midY - rect.top;
      const wBefore = swScreenToWorld(smx, smy);
      const scale = dist / sw_lastPinchDist;
      sw_zoom = Math.min(SW_ZOOM_MAX, Math.max(SW_ZOOM_MIN, sw_zoom * scale));
      sw_camX = wBefore.x - (smx - cvs.width/2) / sw_zoom;
      sw_camY = wBefore.y - (smy - cvs.height/2) / sw_zoom;
      sw_lastPinchDist = dist;
    }
  }, { passive: false });

  cvs.addEventListener('touchend', e => {
    const prev = sw_touches;
    sw_touches = Array.from(e.touches);
    if (prev.length === 1 && sw_touches.length === 0 && sw_dragging) {
      const dx = (prev[0].clientX - sw_dragSX);
      const dy = (prev[0].clientY - sw_dragSY);
      sw_dragging = false;
      if (Math.hypot(dx, dy) < 8) {
        // Tap — buy node
        const rect = cvs.getBoundingClientRect();
        const sx = prev[0].clientX - rect.left, sy = prev[0].clientY - rect.top;
        const hit = swHitNode(sx, sy);
        if (hit && sw_revealed.has(hit.cl.id)) {
          swBuyNode(hit.nd);
          swShowTip(hit.nd, hit.cl, sx, sy);
        }
      }
    }
  }, { passive: false });

  // Minimap click-to-pan
  if (mini) {
    mini.addEventListener('click', e => {
      const rect = mini.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const WX_MIN = -1000, WX_MAX = 1000, WY_MIN = -900, WY_MAX = 900;
      const ww = WX_MAX - WX_MIN, wh = WY_MAX - WY_MIN;
      sw_camX = WX_MIN + (mx / SW_MINI_W) * ww;
      sw_camY = WY_MIN + (my / SW_MINI_H) * wh;
    });
  }

  // ResizeObserver
  const ro = new ResizeObserver(() => {
    if (sw_open) swResizeCanvas();
  });
  const ov = document.getElementById('skill-web-overlay');
  if (ov) ro.observe(ov);
}

// ── Save / Load hooks ─────────────────────────────────────────────────
// These are called from buildSave / applyState below via the main functions.
// Sync Core nodes from UPGRADES on load
function swSyncCoreFromUpgrades() {
  const coreCl = SW_CLUSTERS.find(c => c.id === 'core');
  if (!coreCl) return;
  coreCl.nodes.forEach(nd => {
    if (nd.effect && UPGRADES[nd.effect] !== undefined) {
      const upOwned = UPGRADES[nd.effect].owned || 0;
      if (upOwned > (SW_NODE_OWNED[nd.id] || 0)) {
        SW_NODE_OWNED[nd.id] = upOwned;
      }
    }
  });
}

// Initialize events after DOM ready (called from BOOT_APP)
function initSkillWeb() {
  swInitEvents();
}

// ── Passive bonuses applied by skill web nodes ───────────────────────
// These flags/multipliers are checked at the appropriate game tick points.
function swGetBonus(effect) {
  // Returns owned count for nodes that provide the effect
  for (const cl of SW_CLUSTERS) {
    for (const nd of cl.nodes) {
      if (nd.effect === effect) return swOwned(nd.id) || 0;
    }
  }
  return 0;
}

function BOOT_APP() {
  if(_stopBoot) return;
  try { initSwatches(); } catch(e) { console.error("BOOT: initSwatches failed:", e); }
  try { resize(); } catch(e) { console.error("BOOT: resize failed:", e); }
  try { initSkillWeb(); } catch(e) { console.error("BOOT: initSkillWeb failed:", e); }
  try {
    initDecor();
    const saved=loadSave();
    if(saved){
      const offline=calcOffline(saved);
      applyState(saved);
      if(offline&&offline.total>0){
        if(needsDaily()){pendingDaily=true;showWelcome(offline);}
        else showWelcome(offline);
      }else if(needsDaily()){
        showDailyModal();
      }
    }else{
      const def=TYPES['guppy'];
      for(let i=0;i<3;i++)fishList.push({id:fid++,type:'guppy',x:W*(i+1)/4,y:H/2,vx:i%2===0?.5:-.5,vy:0,phase:Math.random()*Math.PI*2,timer:Math.floor(Math.random()*120),eat:0,hunger:100,age:0,scale:0.28,bonded:0,bcd:0,genes:generateRandomGenes('guppy', true),isRare:false});
      updateHUD();
      if(needsDaily())showDailyModal();
    }
    applyBorder();
    if(saved) {
      if(saved._openQuests) _openQuests = new Set(saved._openQuests);
      lastEliteTs = saved.lastEliteTs || 0;
    }
    try { swSyncCoreFromUpgrades(); } catch(e) { console.error("BOOT: swSyncCoreFromUpgrades failed:", e); }
    window.addEventListener('beforeunload',saveGame);
  } catch (crashError) {
    console.error("BOOT: core simulation setup failed:", crashError);
    const errBox = document.createElement('div');
    errBox.style.cssText = 'position:fixed;inset:0;background:black;color:red;z-index:999999;font-family:monospace;padding:20px;font-size:16px;overflow:auto;word-wrap:break-word;';
    errBox.innerHTML = '<h2>CRASH DETECTED</h2>' + crashError.message + '<br><br>' + crashError.stack;
    document.body.appendChild(errBox);
  }
  
  try { buildOrders(); } catch(e) { console.error("BOOT: buildOrders failed:", e); }
  try { updateHUD(); } catch(e) { console.error("BOOT: updateHUD failed:", e); }
  requestAnimationFrame(loop);
}
BOOT_APP();
