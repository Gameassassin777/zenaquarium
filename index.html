<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#001428">
<title>Zen Aquarium v2.0</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
:root {
  --ui-accent: #67e8f9;
  --ui-accent-rgb: 103, 232, 249;
}
html, body{width:100%;height:100%;margin:0;padding:0;position:fixed;inset:0;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
svg { display:inline-block; vertical-align:middle; width:1em; height:1em; }

#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:max(25px,env(safe-area-inset-top)) 15px 0;z-index:10;pointer-events:none;gap:7px;}
.dash{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);border-radius:22px;padding:7px 10px;display:flex;gap:10px;-webkit-backdrop-filter:blur(30px) grayscale(1);backdrop-filter:blur(30px) grayscale(1);box-shadow:0 8px 32px rgba(0,0,0,.3);transition:all .3s;}
.dash.harmony{border-color:rgba(251,191,36,.5);box-shadow:0 0 20px rgba(251,191,36,.3), inset 0 0 10px rgba(251,191,36,.2);background:rgba(251,191,36,.05);}
.stat{display:flex;flex-direction:column;align-items:center;padding:0 6px;border-right:1px solid rgba(255,255,255,.07);}
.stat:last-child{border-right:none;}
.slbl{font-size:9px;text-transform:uppercase;color:#475569;letter-spacing:.5px;font-weight:700;}
.sval{font-size:14px;font-weight:800;color:#e2e8f0;transition:color .2s; display:flex; align-items:center; gap:3px;}
.sval svg { color: var(--ui-accent); width:1.1em; height:1.1em; }
.vg{color:#fbbf24;} .vg svg{color:#fbbf24;} 
.vw{color:#ef4444;} .vw svg{color:#ef4444;}

.hbtn{pointer-events:all;cursor:pointer;font-family:inherit;font-weight:bold;-webkit-tap-highlight-color:transparent;transition:all .15s;border-radius:20px;padding:8px 13px;font-size:12px; display:flex; align-items:center; gap:5px;box-shadow:0 4px 12px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.2);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);}
.hbtn:active{transform:scale(.91);}
#modebtn{background:rgba(103,232,249,.1);color:var(--ui-accent);border-color:rgba(103,232,249,.3);}
#modebtn.cleaning{background:rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.4);box-shadow:0 0 15px rgba(52,211,153,.2);}

#combo-ui{position:fixed;top:calc(75px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) scale(.8);opacity:0;color:#fbbf24;font-size:20px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.8);pointer-events:none;transition:all .15s cubic-bezier(.4,0,.2,1);z-index:9;text-align:center;}
#combo-ui.on{transform:translateX(-50%) scale(1);opacity:1;}
.cbar{width:100%;height:3px;background:rgba(0,0,0,.5);border-radius:2px;margin-top:4px;}
.cfill{height:100%;background:#fbbf24;transform-origin:left;border-radius:2px;}
.xpb{width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:3px;overflow:hidden;position:absolute;bottom:4px;left:50%;transform:translateX(-50%);}
.xpf{height:100%;background:var(--ui-accent);width:0%;transition:width 0.3s ease;}

#nav{position:fixed;bottom:0;left:0;right:0;padding:10px 0 2px 0;background:linear-gradient(to bottom, transparent, rgba(0,0,0,.6) 30%, rgba(0,0,0,.85) 100%);display:flex;z-index:25;pointer-events:none;}
/* docked into safe area */
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:#94a3b8;font-size:9px;font-weight:800;letter-spacing:.5px;cursor:pointer;box-shadow:none;border-radius:0;transition:all .2s cubic-bezier(.4,0,.2,1);-webkit-tap-highlight-color:transparent;position:relative;padding:15px 0 0 0;pointer-events:auto;}
.nb svg {font-size:24px; transition:transform .2s; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.nb.active{color:#fff; text-shadow:0 0 12px rgba(255,255,255,.6), 0 0 24px rgba(103,232,249,.8);}
.nb.active svg{transform:translateY(-1px); filter:drop-shadow(0 2px 4px rgba(103,232,249,.6));}
.nb.notify::after{content:'';position:absolute;top:2px;right:calc(50% - 12px);width:7px;height:7px;background:#f43f5e;border-radius:50%;border:2px solid rgba(0,0,0,.5);box-shadow:0 0 10px rgba(244,63,94,.6);}

#sov.open{opacity:1;pointer-events:all;background:rgba(0,0,0,0.15);backdrop-filter:blur(3px);}
.panel{position:fixed;bottom:0;left:0;right:0;background:rgba(10,18,32,0.8);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(255,255,255,0.14);border-radius:32px 32px 0 0;padding:24px 20px 0;z-index:21;transform:translateY(102%);transition:transform .55s cubic-bezier(.34, 1.56, .64, 1), height .55s cubic-bezier(.34, 1.56, .64, 1);height:54dvh;display:flex;flex-direction:column;pointer-events:none;box-shadow:0 -10px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);will-change:transform;}
.pscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}
.panel::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:42px;height:5px;background:rgba(255,255,255,.3);border-radius:3px;}
.panel.open{transform:translateY(0);pointer-events:auto;height:82dvh;opacity:1;filter:none;}
.panel.full{transform:translateY(0);pointer-events:auto;height:94dvh;opacity:1;filter:none;background:rgba(10,18,32,0.9);}
.panel.dragging{transition:none;}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-shrink:0;padding-top:5px;cursor:grab;touch-action:none;}
.pt{color:#fff;font-size:22px;font-weight:900; display:flex; align-items:center; gap:8px; text-shadow:0 0 16px rgba(103,232,249,.5);}

.xbtn{background:none;border:none;color:#4b5563;font-size:21px;cursor:pointer;box-shadow:none;padding:0;line-height:1;}
.acc-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07);-webkit-tap-highlight-color:transparent;}
.acc-hd-left{display:flex;flex-direction:column;gap:2px;}
.acc-hd-title{color:var(--ui-accent);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;text-shadow:0 0 10px rgba(103,232,249,.4);}
.acc-hd-sub{color:#475569;font-size:10px;font-weight:600;}
.acc-arrow{color:#475569;font-size:14px;transition:transform .25s;}
.acc-arrow.open{transform:rotate(180deg);}
.acc-body{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.acc-body.open{max-height:600px;}
.acc-body-inner{padding:12px 0 4px;}

.sechead{color:var(--ui-accent);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px;margin:20px 0 10px;text-shadow:0 0 10px rgba(103,232,249,.4);}
.sechead:first-child{margin-top:0;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px 10px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.2);}
.card:active{transform:scale(.95);}
.buyable{border-color:rgba(52,211,153,.3)!important;background:rgba(52,211,153,.05)!important;box-shadow:0 0 20px rgba(52,211,153,.15)!important;}
.equipped{border-color:var(--ui-accent)!important;background:rgba(103,232,249,.08)!important;box-shadow:0 0 20px rgba(103,232,249,.2)!important;}
.full{opacity:.38;cursor:default;filter:grayscale(70%);}
.full:active{transform:none!important;}
.locked{opacity:.38;pointer-events:none;}
.locked::after{content:'LOCKED Lv'attr(data-req);position:absolute;inset:0;background:rgba(0,5,16,.82);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#475569;border-radius:13px;}

/* MARKET REVAMP */
.m-header { background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.25); border-radius:12px; padding:12px; margin-bottom:16px; display:flex; align-items:center; gap:12px; position:relative; overflow:hidden; box-shadow:inset 0 0 20px rgba(251,191,36,0.05); }
.m-header::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent); animation:mshine 3s infinite; }
.m-badge { font-size:8.5px; font-weight:800; padding:2px 5px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px; }
.b-trait { background:rgba(56,189,248,0.12); color:#38bdf8; border:1px solid rgba(56,189,248,0.25); }
.b-age { background:rgba(16,185,129,0.12); color:#10b981; border:1px solid rgba(16,185,129,0.25); }
.b-rare { background:rgba(251,191,36,0.12); color:#fbbf24; border:1px solid rgba(251,191,36,0.25); }
.m-price { font-weight:900; color:#fbbf24; font-size:13.5px; text-shadow:0 0 10px rgba(251,191,36,0.25); }
.m-surge-hl { border:1.5px solid rgba(245,158,11,0.5) !important; background:rgba(245,158,11,0.04) !important; box-shadow:0 0 15px rgba(245,158,11,0.1); }
@keyframes mshine { 0% { left:-150%; } 100% { left:150%; } }

/* FISH COLORS & FINDER */
.c-dot { width:12px; height:12px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); box-shadow:0 0 8px rgba(0,0,0,0.5); position:relative; }
.c-dot::after { content:''; position:absolute; inset:0; border-radius:50%; box-shadow:0 0 10px inherit; opacity:0.6; }
.finder-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:16px; margin-bottom:12px; transition:transform 0.2s; position:relative; overflow:hidden;}
.finder-card:active { transform:scale(0.98); }
.finder-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--ui-accent); opacity:0.3; }
.f-row { display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:11px; color:#94a3b8; }
.f-val { color:#fff; font-weight:800; text-shadow:0 0 10px rgba(255,255,255,0.2); }
.f-trait-desc { font-style:italic; font-size:10px; color:#475569; margin-top:3px; padding-left:4px; }
.f-personality { background:rgba(103,232,249,0.08); border:1px solid rgba(103,232,249,0.15); border-radius:10px; padding:10px; margin-top:12px; color:#67e8f9; font-size:11px; line-height:1.4; text-shadow:0 0 8px rgba(103,232,249,0.2); }

/* HUD POLISH */
.stat { background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.05); border-radius:10px; padding:4px 10px; backdrop-filter:blur(4px); transition:all 0.3s; }
.stat:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); }
.vl { color:var(--ui-accent) !important; text-shadow:0 0 12px var(--ui-accent); }
.vg { color:#fbbf24 !important; text-shadow:0 0 12px rgba(251,191,36,0.4); }
#combo-ui { background:rgba(15,23,42,0.6) !important; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); }



.ci{font-size:32px;display:block;margin-bottom:6px; color:#e2e8f0; filter:drop-shadow(0 0 8px rgba(255,255,255,.3));}
.cn{color:#fff;font-size:14px;font-weight:800;display:block;margin:2px 0;}
.cd{color:#94a3b8;font-size:10px;margin-bottom:8px;display:block;line-height:1.4;height:28px;}
.cpr{color:#fbbf24;font-size:13px;font-weight:900;text-shadow:0 0 10px rgba(251,191,36,.5);}
.cown{color:var(--ui-accent);font-size:10px;margin-top:5px;display:block;font-weight:bold;}

.ocard{background:linear-gradient(145deg,rgba(0,28,60,.85),rgba(0,10,28,.9));border:1px solid rgba(0,80,140,.22);border-radius:13px;padding:12px;margin-bottom:9px;}
.ocard.odone{border-color:rgba(16,185,129,.4);}
.ocard.oclaimed{opacity:.3;pointer-events:none;}
.ohead{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.oico{font-size:22px; color:#e2e8f0;}
.odesc{color:#f1f5f9;font-size:12px;font-weight:600;display:block;}
.orew{color:#fbbf24;font-size:11px;font-weight:700;}
.opbg{background:rgba(0,0,0,.45);border-radius:4px;height:6px;overflow:hidden;margin-bottom:7px;}
.opf{height:100%;background:linear-gradient(90deg, var(--ui-accent), #38bdf8);border-radius:4px;transition:width .4s;}
.opf.odone{background:linear-gradient(90deg,#10b981,#34d399);}
.ofoot{display:flex;justify-content:space-between;align-items:center;}
.ocnt{color:#374151;font-size:10px; display:flex; align-items:center; gap:4px;}

.cbtn2{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.4);color:#34d399;border-radius:12px;padding:8px 16px;font-weight:bold;font-size:12px;cursor:pointer;transition:all .2s;box-shadow:0 0 15px rgba(52,211,153,.1);-webkit-tap-highlight-color:transparent;}
.cbtn2:disabled{background:rgba(255,255,255,.05);color:#64748b;border-color:rgba(255,255,255,.1);box-shadow:none;cursor:default;}
.cbtn2:not(:disabled):active{transform:scale(.95);background:rgba(52,211,153,.25);}
.tabbtn{flex:1;background:rgba(255,255,255,.03);color:#94a3b8;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;font-weight:bold;font-size:13px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-appearance:none;appearance:none;transition:all 0.2s;}
.tabbtn.active{background:rgba(103,232,249,.15);color:#fff;border-color:var(--ui-accent);box-shadow:0 0 20px rgba(103,232,249,.2);}

.modal{position:fixed;inset:0;background:rgba(0,5,15,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal.show{opacity:1;pointer-events:auto;}
.mbox{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);border-radius:26px;padding:28px 22px;width:min(100%,360px);text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5);-webkit-backdrop-filter:blur(40px) grayscale(1);backdrop-filter:blur(40px) grayscale(1);}
.mbox h2{color:var(--ui-accent);font-size:18px;font-weight:bold;margin-bottom:3px;}
.msub{color:#475569;font-size:12px;display:block;margin-bottom:10px;}
.mbtn{width:100%;padding:12px;border:none;border-radius:13px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:none;margin-top:11px;-webkit-tap-highlight-color:transparent;}
.mbtn.gold{background:linear-gradient(135deg,#b45309,#f59e0b);color:#fff;}

.wrow{display:flex;justify-content:space-between;align-items:center; padding:6px 10px;background:rgba(0,20,48,.55);border-radius:9px;margin-bottom:5px;}
.wrow span:first-child{color:#94a3b8;font-size:12px; display:flex; align-items:center; gap:5px;}
.wrow span:last-child{color:#fbbf24;font-weight:bold;font-size:12px;}

.drbox{background:rgba(251,191,36,.08);border:2px solid rgba(251,191,36,.28);border-radius:13px;padding:14px;margin:10px 0;}
.dramt{font-size:40px;font-weight:900;color:#fbbf24;}
.sdots{display:flex;justify-content:center;gap:5px;margin-top:9px;}
.sd{width:9px;height:9px;border-radius:50%;background:#0f172a;}
.sd.done{background:#fbbf24;}
.sd.today{background:#fbbf24;box-shadow:0 0 5px #fbbf24;}

.codebox{background:rgba(0,20,48,.6);border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:11px;padding:13px;text-align:center;margin-bottom:14px;}
.cbig{font-size:23px;font-weight:900;color:var(--ui-accent);letter-spacing:4px;font-family:monospace;display:block;margin:5px 0;}
.chint{color:#374151;font-size:10px;}
.copybtn{background:rgba(var(--ui-accent-rgb),.08);color:var(--ui-accent);border:1px solid rgba(var(--ui-accent-rgb),.2);border-radius:9px;padding:6px 14px;font-size:12px;font-weight:bold;margin-top:7px;cursor:pointer;}
.irow{display:flex;gap:7px;margin-bottom:10px;}
.cinput{flex:1;background:rgba(0,20,48,.7);border:1px solid rgba(var(--ui-accent-rgb),.16);color:#e2e8f0;border-radius:10px;padding:10px;font-size:14px;font-family:monospace;font-weight:bold;letter-spacing:2px;text-transform:uppercase;outline:none;}
.rbtn{background:#10b981;color:#fff;border:none;border-radius:10px;padding:10px 12px;font-weight:bold;cursor:pointer;font-size:13px;}

.o-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; }
@media (max-width:768px) {
  .o-grid { grid-template-columns:repeat(2, 1fr); gap:8px; }
  .ocard { padding:10px; }
  .odesc { font-size:10px; }
  .orew { font-size:9px; }
}
.resetbtn{background:#ef4444;color:#fff;border:none;border-radius:13px;padding:14px;font-weight:bold;font-size:14px;cursor:pointer;margin-top:20px;width:100%;transition:opacity 0.2s;}
.resetbtn:active{opacity:0.75;}

.ft{position:fixed;pointer-events:none;z-index:30;font-weight:900;animation:spk 1.2s cubic-bezier(.2,.8,.2,1) forwards;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,.8); display:flex; align-items:center; gap:4px;}
@keyframes spk{0%{transform:translateY(0) scale(.5);opacity:0;}15%{transform:translateY(-18px) scale(1.15);opacity:1;}100%{transform:translateY(-62px) scale(.8);opacity:0;}}
#toast{position:fixed;top:calc(75px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:6px 14px;border-radius:14px;font-weight:bold;font-size:12px;pointer-events:none;opacity:0;transition:opacity .28s;z-index:55;color:#fff;white-space:nowrap;}
.trait-icon{display:inline-flex; align-items:center; justify-content:center; width:14px;height:14px;border-radius:50%;font-size:9px;margin-right:4px;background:rgba(0,0,0,0.3); color:#fff;}

.swatch-row { display:flex; gap:10px; justify-content:center; margin: 5px 0 15px 0; }
.swatch { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s; }
.swatch:active { transform:scale(0.8); }
.swatch.active { border-color:#fff; box-shadow:0 0 10px currentColor; }
.srow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;color:#94a3b8;font-size:12px;}
.gift-fish-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(0,20,48,.55);border-radius:9px;margin-bottom:6px;}
.gift-fish-row span{color:#e2e8f0;font-size:12px;display:flex;align-items:center;gap:6px;}
.giftbtn{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:9px;padding:5px 12px;font-weight:bold;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>
<div id="p-particles"></div>

<canvas id="c"></canvas>
<div id="ui">
  <div class="dash" id="mdash">
    <div class="stat" style="position:relative;padding-bottom:8px;"><span class="slbl">Lvl</span><span class="sval vl" id="lbl-lvl"></span></div>
    <div class="stat"><span class="slbl">Coins</span><span class="sval vg" id="lbl-cv"></span></div>
    <div class="stat"><span class="slbl">Water</span><span class="sval" id="wvc"></span></div>
    <div class="stat"><span class="slbl">Fish</span><span class="sval" id="lbl-fv"></span></div>
  </div>
  <button class="hbtn" id="modebtn" onclick="toggleMode()"></button>
</div>
<div id="combo-ui"><div id="ctxt">Combo x1.0</div><div class="cbar"><div class="cfill" id="cfill"></div></div></div>

<nav id="nav">
  <button class="nb" id="nb-market" onclick="setTab('market')"><span class="ni" id="ic-nav-market"></span>Market</button>
  <button class="nb" id="nb-decor"  onclick="setTab('decor')"><span class="ni" id="ic-nav-decor"></span>Decor</button>
  <button class="nb" id="nb-finder" onclick="setTab('finder')"><span class="ni" id="ic-nav-finder"></span>Finder</button>
  <button class="nb" id="nb-orders" onclick="setTab('orders')"><span class="ni" id="ic-nav-orders"></span>Orders</button>
  <button class="nb" id="nb-shop"   onclick="setTab('shop')"><span class="ni" id="ic-nav-shop"></span>Shop</button>
  <button class="nb" id="nb-social" onclick="setTab('social')"><span class="ni" id="ic-nav-social"></span>Social</button>
</nav>

function setupPWA(){
  const ico=s=>`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='${s}' height='${s}'><rect width='${s}' height='${s}' rx='${Math.round(s*.22)}' fill='%23001428'/><text y='${Math.round(s*.78)}' font-size='${Math.round(s*.58)}' text-anchor='middle' x='${Math.round(s/2)}' fill='%2367e8f9'>Z</text></svg>`;
  const mf={name:'Zen Aquarium',short_name:'ZenTank',start_url:'./',display:'standalone',orientation:'any',background_color:'#001428',theme_color:'#001428',icons:[{src:ico(192),sizes:'192x192',type:'image/svg+xml'},{src:ico(512),sizes:'512x512',type:'image/svg+xml'}]};
  try{document.getElementById('mlink').href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));}catch(_){}
  
  // Unregister old problematic service workers to fix caching issues
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for(let registration of registrations) {
        registration.unregister();
      }
    }).catch(function(err) {
      console.log('SW Unregistration failed: ', err);
    });
  }
}

function setAccent(idx) {
  curAccent = idx;
  const a = ACCENTS[idx];
  document.documentElement.style.setProperty('--ui-accent', a.hex);
  document.documentElement.style.setProperty('--ui-accent-rgb', a.rgb);
  localStorage.setItem('zenAccent', idx);
  
  const swatches = document.getElementById('swatches');
  if(swatches) {
    Array.from(swatches.children).forEach((el, i) => {
      el.classList.toggle('active', i == curAccent);
    });
  }
}

function initSwatches() {
  const c = document.getElementById('swatches');
  c.innerHTML = ACCENTS.map((a, i) => `<div class="swatch ${i==curAccent?'active':''}" style="background:${a.hex}; color:${a.hex}" onclick="setAccent(${i})"></div>`).join('');

}

const TRAITS = ['greedy', 'shy', 'lazy', 'active'];
const TRAIT_ICONS = { greedy: ICONS.greedy, shy: ICONS.shy, lazy: ICONS.lazy, active: ICONS.active };
const TRAIT_MARKET_MULT = { greedy: 1.0, shy: 1.0, lazy: 0.9, active: 1.2 };

function generateRandomGenes(type) {
  const def = TYPES[type];
  const t1 = TRAITS[Math.floor(Math.random()*TRAITS.length)];
  const t2 = TRAITS[Math.floor(Math.random()*TRAITS.length)];
  return { c1: [def.c1, def.c1], c2: [def.c2, def.c2], trait: [t1, t2], szMod: 0.8 + Math.random()*0.45 };
}

function mendelianCross(momGenes, dadGenes, typeDef) {
  const mutRate = (UPGRADES.uvlight && UPGRADES.uvlight.owned > 0) ? 0.10 : 0.05;
  const isRareMut = Math.random() < mutRate;
  const inherit = (arr1, arr2) => {
    const a1 = arr1[Math.floor(Math.random()*2)];
    const a2 = arr2[Math.floor(Math.random()*2)];
    return [a1, a2];
  };
  let c1 = inherit(momGenes.c1, dadGenes.c1);
  let c2 = inherit(momGenes.c2, dadGenes.c2);
  let trait = inherit(momGenes.trait, dadGenes.trait);
  if(isRareMut) {
    if(Math.random() < 0.5) c1[0] = typeDef.rare.c1;
    else c2[0] = typeDef.rare.c2;
  }
  return { c1, c2, trait, isRareMut };
}

function calcOffline(s){
  const elapsed=Math.min((Date.now()-s.ts)/1000,4*3600);
  if(elapsed<90)return null;
  let total=0;const items=[];
  const sc=(s.upgrades && s.upgrades.snail) || 0;
  if(sc>0){const e=Math.floor(sc*.4*elapsed);total+=e;if(e>0)items.push({icon:ICONS.snail,label:`${sc} snail${sc>1?'s':''} collected`,coins:e});}
  if((s.clams || 0)>0){const e=Math.floor(s.clams*.8*elapsed);total+=e;if(e>0)items.push({icon:ICONS.clam,label:'Pearl clam yielded',coins:e});}
  const fish=s.fish || [];
  if(fish.length>0){
    const avg=fish.reduce((a,f)=>a+((TYPES[f.type] && TYPES[f.type].val) || 1),0)/fish.length;
    const e=Math.floor(fish.length*avg*.03*elapsed);
    total+=e;if(e>0)items.push({icon:ICONS.tank,label:`${fish.length} fish earned`,coins:e});}
  const hrs=Math.floor(elapsed/3600),mins=Math.floor((elapsed%3600)/60);
  return{total,items,timeStr:hrs>0?`${hrs}h ${mins}m`:`${mins}m`};
}

  }

    marketRates[k] += drift;

      </div></div>`;
  }).join('');
}

function getPrice(f) {
  const def = TYPES[f.type];
  const rate = marketRates[f.type] || 1;
  const surgeMult = (f.type === surgingType) ? 1.5 : 1.0;
  const base = def.cost > 0 ? def.cost * 0.4 : 10;
  const ageScale = Math.min(1, f.age / 18000);
  const traitMult = TRAIT_MARKET_MULT[f.genes.trait[0]] || 1.0;
  const rareMult = f.isRare ? 3 : 1;
  return Math.floor(base * rate * rareMult * traitMult * f.scale * ageScale * surgeMult);
}

function sellFish(id, price) {
  const f = fishList.find(x => x.id === id);
  if(!f) return;
  const realPrice = getPrice(f);
  
  const idx = fishList.indexOf(f);
  addCoins(realPrice, W/2, H/3, true);
  spawnJuice(f.x, f.y, 'SOLD!', '#f59e0b', 1.8);
  for(let i=0; i<8; i++) bubbles.push({x:f.x+(Math.random()-.5)*20,y:f.y,r:2+Math.random()*4,spd:2,ph:0,life:1});
  fishList.splice(idx, 1);
  sm.marketSales = (sm.marketSales || 0) + 1;
  updateHUD();
  buildMarket();
  saveGame();
}

// ECOSYSTEM & SMOOTHED AI
function updateEco(){
  const grow=fishList.length*.008,reduce=snails.length*.015+(UPGRADES.filter.owned>0?.08:0)+(UPGRADES.clam.owned>0?.05:0);
  algae=Math.max(0,Math.min(100,algae+grow-reduce));
  const allFed=fishList.length>0&&fishList.every(f=>f.hunger>60);
  isHarmony=algae<15&&allFed;
  if(isHarmony)sm.harmonySec+=1/60;

  if(UPGRADES.autofeed.owned>0&&time%240===0&&foodList.length<fishList.length){
    const hf=fishList.find(f=>f.hunger<50);
    if(hf)foodList.push({x:hf.x+(Math.random()*40-20),y:20,vy:0,vx:(Math.random()-.5)*.5,life:1,eaten:false});
  }
  
  for(let i=eggs.length-1;i>=0;i--){
    const e=eggs[i];e.timer--;
    if(e.timer<=0){
      fishList.push({id:fid++,type:e.type,x:e.x,y:e.y-10,vx:(Math.random()-.5),vy:-1,phase:0,timer:0,eat:0,hunger:100,age:0,scale:.3,bcd:3000,genes:e.genes,isRare:e.isRareMut,bonded:0});
      sm.hatched++;if(e.isRareMut)sm.rares++;
      spawnJuice(e.x,e.y,'Hatched!','#4ade80',1);
      for(let b=0;b<4;b++)bubbles.push({x:e.x+(Math.random()-.5)*10,y:e.y,r:2,spd:2,ph:0,life:1});
      eggs.splice(i,1);
      updateHUD();
    }
  }

  if(comboTimer>0){
    comboTimer--;
    document.getElementById('cfill').style.transform=`scaleX(${comboTimer/maxCT})`;
    if(comboTimer<=0){combo=0;document.getElementById('combo-ui').classList.remove('on');}
  }

  if(time%15===0){
    const wq=Math.floor(100-algae);
    document.getElementById('wv').textContent=wq+'%';
    document.getElementById('wvc').className='sval '+(wq<50?'vw':isHarmony?'vg':'');
    const d=document.getElementById('mdash');
    if(isHarmony)d.classList.add('harmony');else d.classList.remove('harmony');
  }

  if(time%300===0) tickOrders();
  if(time%1200===0) tickMarket();
}

function triggerEat(f,fd,def){
  fd.eaten=true;f.hunger=100;f.eat=18;sm.feeds++;
  combo++;comboTimer=maxCT;
  const cu=document.getElementById('combo-ui');cu.classList.add('on');
  const cm=1+Math.min(combo*.1,2);
  document.getElementById('ctxt').textContent=`Combo x${cm.toFixed(1)}`;
  cu.style.transform='translateX(-50%) scale(1.08)';setTimeout(()=>cu.style.transform='translateX(-50%) scale(1)',100);
  
  const rareMult=f.isRare?2.5:1;
  const bondMult=f.bonded>0?1.5:1; 
  let isGold = false;
  for(const g of [...f.genes.c1, ...f.genes.c2]) if(g.includes('fbbf') || g.includes('eab3') || g.includes('f59e') || g.includes('fde0')) isGold = true;
  const heaterMult = UPGRADES.heater && UPGRADES.heater.owned > 0 ? 1.25 : 1;
  const total=Math.ceil(def.val*rareMult*(isGold?1.5:1)*(UPGRADES.flakes.owned>0?2:1)*cm*(isHarmony?1.5:1)*(algae>60?.5:1)*bondMult*heaterMult);
  addCoins(total,f.x,f.y,isHarmony || f.bonded>0 || isGold);
}

function updateFish(f){
  const def=TYPES[f.type];
  const trait = f.genes.trait[0];
  
  f.phase+=.1;f.timer++;
  if(f.eat>0)f.eat--;
  if(f.bonded>0) {
    f.bonded--;
    if(f.timer%90===0) particles.push({x:f.x, y:f.y-20, vx:(Math.random()-.5)*1, vy:-1.5, life:1, c:'#fb7185'});
  }
  
  f.age++;if(f.scale<1){f.scale+=.0002;if(f.scale>1)f.scale=1;}
  if(f.bcd>0)f.bcd--;
  
  let hDrain = isHarmony ? 0.01 : 0.015;
  if(UPGRADES.oxygen && UPGRADES.oxygen.owned > 0) hDrain *= 0.8;
  if(trait === 'lazy') hDrain *= 0.8;
  if(trait === 'active') hDrain *= 1.2;
  f.hunger=Math.max(0,f.hunger-hDrain);
  
  const sm2=(f.hunger<25)?.6:(isHarmony?1.2:1);
  const mF = baseMaxFish + (UPGRADES.tank.owned*4);
  
  if(UPGRADES.nest.owned>0&&isHarmony&&f.age>3000&&f.scale>=1&&f.bcd<=0&&(fishList.length+eggs.length)<mF&&f.hunger>80){
    const mate=fishList.find(m=>m!==f&&m.type===f.type&&m.age>3000&&m.scale>=1&&m.bcd<=0&&m.hunger>80&&Math.hypot(m.x-f.x,m.y-f.y)<60);
    if(mate){
      f.bcd=8000;mate.bcd=8000;
      const childGenes = mendelianCross(f.genes, mate.genes, def);
      if(childGenes.isRareMut) spawnJuice((f.x+mate.x)/2,f.y-20, ICONS.star + ' Mutation!','#fbcfe8',1.2);
      else spawnJuice((f.x+mate.x)/2,f.y-20, ICONS.egg + ' Egg','#fb7185',1);
      eggs.push({x:(f.x+mate.x)/2,y:H-85,type:f.type,timer:getEggTimerFrames(f.type), genes:childGenes, isRareMut:childGenes.isRareMut});
      for(let b=0;b<3;b++)bubbles.push({x:f.x,y:f.y,r:3,spd:1.5,ph:0,life:1});
      updateHUD();
    }
  }

  let foodRadius = 300;
  if(trait === 'greedy') foodRadius = 450;
  if(trait === 'shy') foodRadius = 200;
  
  let best=null,bestD=Infinity;
  if(f.hunger<99){
    for(const fd of foodList){
      if(fd.eaten)continue;
      const d=Math.hypot(fd.x-f.x,fd.y-f.y);
      if(d<foodRadius&&d<bestD){bestD=d;best=fd;}
    }
  }
  
  let baseSpd = def.spd;
  if(trait === 'greedy' && f.hunger < 50) baseSpd *= 1.2;
  if(trait === 'active') baseSpd *= 1.15;
  if(trait === 'lazy') baseSpd *= 0.75;

  if(best){
    const dx=best.x-f.x,dy=best.y-f.y,d=Math.max(1,Math.hypot(dx,dy));
    f.vx+=(dx/d)*.8;f.vy+=(dy/d)*.6;
    const sp=Math.hypot(f.vx,f.vy),cap=baseSpd*3*sm2;
    if(sp>cap){f.vx*=cap/sp;f.vy*=cap/sp;}
    if(d<22*f.scale)triggerEat(f,best,def);
  }else{
    if(f.timer%120===0){
      if(trait === 'lazy' && Math.random() < 0.5) { f.vx *= 0.3; f.vy *= 0.3; }
      else { f.vx+=(Math.random()-.5)*baseSpd*2; f.vy+=(Math.random()-.5)*baseSpd; }
    }
    
    if(trait === 'shy') {
       for(const other of fishList) {
          if(other === f) continue;
          const od = Math.hypot(other.x - f.x, other.y - f.y);
          if(od < 60) { f.vx -= (other.x - f.x) * 0.002; f.vy -= (other.y - f.y) * 0.002; }
       }
    }

    if(Math.abs(f.vx)<baseSpd*.3)f.vx+=(f.vx>=0?.2:-.2);
  }
  
  f.vx*=.95;f.vy*=.95;f.x+=f.vx*sm2;f.y+=f.vy*sm2;
  const mx=40,ty=90,by=SWIM_BOT();
  
  if(f.x<mx){f.x=mx;f.vx=(Math.abs(f.vx)+0.2)*0.9;}
  if(f.x>W-mx){f.x=W-mx;f.vx=-(Math.abs(f.vx)+0.2)*0.9;}
  if(f.y<ty){f.y=ty;f.vy=(Math.abs(f.vy)+0.1)*0.9;}
  if(f.y>by){f.y=by;f.vy=-(Math.abs(f.vy)+0.1)*0.9;}
}

// VISUALS
function initDecor(){
  seaweeds=[];
  const n = Math.max(15, Math.floor(W/25));
  for(let i=0; i<n; i++) {
    const type = ownedFlora[Math.floor(Math.random() * ownedFlora.length)];
    let h = 40 + Math.random()*110;
    let hue = 130 + Math.random()*30;
    let sat = 40 + Math.random()*30;
    
    if(type === 'seaweed') {
      h = 35 + Math.random()*130;
      hue = 120 + Math.random()*45;
      sat = 35 + Math.random()*45;
    } else if(type === 'grass') {
      h = 20 + Math.random()*60;
      hue = 100 + Math.random()*30;
      sat = 50 + Math.random()*20;
    } else if(type === 'kelp') {
      hue = 260 + Math.random()*40;
    } else if(type === 'coral') {
      hue = 0 + Math.random()*25;
    }

    seaweeds.push({
      x: (i + .2 + Math.random()*.6) * (W/n),
      type,
      z: Math.random() > 0.5 ? 'front' : 'back',
      segs: 4 + Math.floor(Math.random()*4),
      h: h,
      ph: Math.random() * Math.PI*2,
      hue: hue,
      sat: sat
    });
  }
}

function updateSnail(s){
  s.timer++;
  if(Math.random()<.005){s.state=s.state==='moving'?'idle':'moving';if(Math.random()<.5)s.dir*=-1;}
  if(s.state==='moving'){
    if(s.wall==='floor'){
      s.x+=s.spd*s.dir; s.ph+=.08;
      if(s.x<10){ s.x=10; s.wall='left'; s.dir=1; }
      if(s.x>W-10){ s.x=W-10; s.wall='right'; s.dir=1; }
    } else if(s.wall==='left'){
      s.y-=s.spd*s.dir; s.ph+=.08;
      if(s.y<150){ s.y=150; s.dir=-1; }
      if(s.y>H-85){ s.y=H-85; s.wall='floor'; s.dir=1; s.x=15; }
    } else if(s.wall==='right'){
      s.y-=s.spd*s.dir; s.ph+=.08;
      if(s.y<150){ s.y=150; s.dir=-1; }
      if(s.y>H-85){ s.y=H-85; s.wall='floor'; s.dir=-1; s.x=W-15; }
    }
  }
  if(s.timer%450===0){addCoins(isHarmony?6:3,s.x,s.y-20,isHarmony);}
}

function drawSnail(s){
  ctx.save();
  if(s.wall==='floor'){ctx.translate(s.x,s.y);if(s.dir<0)ctx.scale(-1,1);}
  else if(s.wall==='left'){ctx.translate(s.x,s.y);ctx.rotate(Math.PI/2);if(s.dir>0)ctx.scale(-1,1);}
  else{ctx.translate(s.x,s.y);ctx.rotate(-Math.PI/2);if(s.dir<0)ctx.scale(-1,1);}
  ctx.beginPath();ctx.ellipse(0,-3,14,6,0,0,Math.PI*2);ctx.fillStyle='#a1a1aa';ctx.fill();
  ctx.beginPath();ctx.moveTo(10,-5);ctx.lineTo(16,-12);ctx.moveTo(10,-1);ctx.lineTo(16,6);ctx.strokeStyle='#a1a1aa';ctx.lineWidth=2;ctx.stroke();
  const sy=s.state==='moving'?Math.abs(Math.sin(s.ph))*2:0;
  ctx.beginPath();ctx.arc(-2,-10-sy,12,0,Math.PI*2);
  const sg=ctx.createRadialGradient(-2,-10-sy,2,-2,-10-sy,12);
  sg.addColorStop(0,'#fde047');sg.addColorStop(1,'#b45309');
  ctx.fillStyle=sg;ctx.fill();
  ctx.beginPath();ctx.arc(-2,-10-sy,6,0,Math.PI);ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function drawEye(ctx, ex, ey, esz) {
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ex, ey, esz, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(ex+esz*.2, ey, esz*.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ex+esz*.4, ey-esz*.2, esz*.2, 0, Math.PI*2); ctx.fill();
}

function drawExclamation(ctx, x, y, size) {
  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(x-size*.15, y-size*.5, size*.3, size*.6);
  ctx.beginPath(); ctx.arc(x, y+size*.4, size*.15, 0, Math.PI*2); ctx.fill();
}

function drawHeart(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size*.3);
  ctx.bezierCurveTo(x - size, y - size*.5, x - size*.3, y - size, x, y - size*.4);
  ctx.bezierCurveTo(x + size*.3, y - size, x + size, y - size*.5, x, y + size*.3);
  ctx.fill();
}

function drawFish(f){
  const def=TYPES[f.type],dir=f.vx>=0?1:-1,s=def.sz,eating=f.eat>0;
  const ts=(f.hunger<30?.2:.1)+(eating?.2:0)+Math.abs(f.vx)*.05;
  const wag=Math.sin(time*ts+f.id)*(s*.4);
  const pw=Math.sin(time*ts*2+f.id)*(s*.2);
  const paddle = Math.sin(time*ts*3+f.id)*s*.15; 
  const br=1+Math.sin(time*.05+f.id)*.03;
  
  const fs = f.scale * (f.genes.szMod||1);
  ctx.save();ctx.translate(f.x,f.y);ctx.scale(fs,fs);
  
  if(f.hunger<25){
    drawExclamation(ctx, 0, -s-15, 11);
  }
  
  if(f.bonded > 0 && f.scale >= 1) {
    drawHeart(ctx, 0, -s-22, 10, '#fb7185');
  }

  const ang=Math.atan2(f.vy,Math.abs(f.vx)+.1);
  if(dir<0)ctx.scale(-1,1);
  ctx.rotate(ang*.5);ctx.scale(1,br);
  
  const bg=ctx.createLinearGradient(0,-s,0,s);
  bg.addColorStop(0, f.genes.c1[0]);
  bg.addColorStop(0.5, f.genes.c1[0]);
  bg.addColorStop(1, f.genes.c2[0]);

  if(f.type==='guppy'){
    ctx.fillStyle=f.genes.c2[0]+'cc';
    ctx.beginPath();ctx.moveTo(-s*.2,0);
    ctx.bezierCurveTo(-s*1.2, -s*.8, -s*1.6, -s+wag, -s*1.8, wag*1.5);
    ctx.bezierCurveTo(-s*1.6, s+wag, -s*1.2, s*.8, -s*.2, 0);
    ctx.fill();
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,s*.8,s*.35,0,0,Math.PI*2);ctx.fill();
    drawEye(ctx, s*.4, -s*.05, s*.12);
    ctx.fillStyle=f.genes.c2[0]+'99';
    ctx.beginPath();ctx.ellipse(s*.1, s*.1, s*.3, s*.15, Math.PI/6 + paddle*.1, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='tetra'){
    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.moveTo(-s*.8,0);ctx.lineTo(-s*1.4,-s*.4+wag);ctx.lineTo(-s*1.4,s*.4+wag);ctx.fill();
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath();ctx.ellipse(0,0,s*.8,s*.25,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=f.genes.c1[0];
    ctx.fillRect(-s*.6,-s*.05,s*1.2,s*.1);
    drawEye(ctx, s*.5, -s*.05, s*.06);
  }
  else if(f.type==='seahorse'){
    const bob = Math.sin(time*0.1+f.id)*s*0.1;
    ctx.translate(0, bob);
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.arc(-s*.2, s*.8, s*.3, 0, Math.PI);ctx.fill(); 
    ctx.fillStyle=bg;
    ctx.beginPath();
    ctx.moveTo(s*.2, -s*.6); 
    ctx.quadraticCurveTo(-s*.3, -s*.2, -s*.3, s*.3);
    ctx.quadraticCurveTo(-s*.6, s*1.2, 0, s);
    ctx.quadraticCurveTo(s*.2, s*.7, -s*.1, s*.4);
    ctx.quadraticCurveTo(s*.6, s*2.2, 0, -s*.2);
    ctx.lineTo(s*.4, -s*.3); ctx.lineTo(s*.4, -s*.5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=f.genes.c1[0]; ctx.lineWidth=2;
    for(let i=0;i<5;i++){ ctx.beginPath();ctx.moveTo(-s*.3,s*.3-i*s*.15);ctx.lineTo(0,s*.3-i*s*.15);ctx.stroke(); }
    drawEye(ctx, s*.1, -s*.45, s*.06);
    ctx.fillStyle=f.genes.c2[0]+'99';
    ctx.beginPath();ctx.ellipse(-s*.4, s*.1, s*.15, s*.2, -paddle*.5, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='goldfish'){
    ctx.fillStyle=f.genes.c2[0]+'cc';
    ctx.beginPath();ctx.moveTo(-s*.2,0);
    ctx.bezierCurveTo(-s*1.2, -s*.6+wag, -s*1.5, -s*1.2+wag, -s*1.8, wag*0.5);
    ctx.bezierCurveTo(-s*1.5, s*1.2+wag, -s*1.2, s*.6+wag, -s*.2, 0); ctx.fill();
    ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,s*1.1,s*.6,0,0,Math.PI*2); ctx.fill();
    drawEye(ctx, s*.6, -s*.1, s*.15);
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.ellipse(s*.2, s*.2, s*.4, s*.2, Math.PI/4 + paddle*.1, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='angelfish'){
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-s*1.8,-s*1.5+wag*.5);ctx.lineTo(-s*.2,0);ctx.lineTo(-s*1.8,s*1.5+wag*.5);ctx.fill();
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0, s*.8);ctx.quadraticCurveTo(-s*.5, s*2.5, -s+wag, s*3);ctx.stroke();
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,s*.6,s*.9,0,0,Math.PI*2);ctx.fill();
    drawEye(ctx, s*.25, -s*.2, s*.1);
    ctx.fillStyle=f.genes.c2[0]+'66';
    ctx.beginPath();ctx.ellipse(s*.1, 0, s*.2, s*.4, Math.PI/4 + paddle*.05, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='discus'){
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.moveTo(-s*.6,0);ctx.lineTo(-s*1.5,-s*.8+wag);ctx.lineTo(-s*1.5,s*.8+wag);ctx.fill();
    ctx.fillStyle=bg; ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=f.genes.c1[0];ctx.lineWidth=2;
    for(let i=1;i<=3;i++){ctx.beginPath();ctx.arc(0,0,s*.25*i,-Math.PI/2,Math.PI/2);ctx.stroke();}
    drawEye(ctx, s*.6, -s*.1, s*.12);
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath();ctx.ellipse(0, s*.6, s*.4, s*.2, paddle*.2, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='lionfish'){
    ctx.strokeStyle=f.genes.c1[0]; ctx.lineWidth=2;
    for(let i=0; i<9; i++){
      const a = -Math.PI/2 + (i/8)*Math.PI; 
      const r = s*1.5 + Math.sin(time*2+i)*s*.2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.stroke();
    }
    ctx.fillStyle=bg; 
    ctx.beginPath(); ctx.ellipse(0,0,s*.9,s*.5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=3;
    for(let i=-2; i<=2; i++){ ctx.beginPath();ctx.moveTo(i*s*.25, -s*.45);ctx.lineTo(i*s*.25, s*.45);ctx.stroke(); }
    drawEye(ctx, s*.5, -s*.15, s*.1);
    ctx.fillStyle=f.genes.c1[0]+'88';
    ctx.beginPath();ctx.ellipse(0,s*.2,s*.6,s*.6,paddle*.5,0,Math.PI);ctx.fill();
  }
  else if(f.type==='idol'){
    ctx.fillStyle=f.genes.c2[0]+'cc'; 
    ctx.beginPath();ctx.moveTo(-s*.7,0);ctx.lineTo(-s*1.2,-s*.4+wag);ctx.lineTo(-s*1.2,s*.4+wag);ctx.fill();
    ctx.fillStyle=bg; 
    const mb = new Path2D(); mb.ellipse(0,0,s*.8,s,0,0,Math.PI*2); ctx.fill(mb);
    ctx.save(); ctx.clip(mb);
    ctx.fillStyle=f.genes.c2[0];
    ctx.fillRect(-s*.3, -s, s*.25, s*2); ctx.fillRect(s*.2, -s, s*.15, s*2);
    ctx.restore();
    ctx.strokeStyle='#f8fafc'; ctx.lineWidth=3; 
    ctx.beginPath(); ctx.moveTo(0, -s*.9); ctx.quadraticCurveTo(-s, -s*1.5, -s*2+wag, -s*1.2); ctx.stroke();
    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath(); ctx.moveTo(s*.6, -s*.2); ctx.lineTo(s*1.1, -s*.1); ctx.lineTo(s*1.1, s*.1); ctx.lineTo(s*.7, s*.2); ctx.fill();
    drawEye(ctx, s*.4, -s*.3, s*.08);
  }
  else if(f.type==='betta'){
    ctx.fillStyle=f.genes.c2[0]+'77';
    ctx.beginPath();ctx.moveTo(s*.2,-s*.1);ctx.bezierCurveTo(-s*.5, -s*2.5+wag, -s*2, -s*1.5, -s*1.8,-s*.5);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*.2,s*.1);ctx.bezierCurveTo(-s*.5, s*2.5+wag, -s*2, s*1.5, -s*1.8,s*.5);ctx.fill();
    ctx.fillStyle=f.genes.c1[0]+'99';
    ctx.beginPath();ctx.moveTo(-s*.4,0);ctx.bezierCurveTo(-s*1.5,-s*2+wag*2,-s*3.5,-s*.5+wag*1.5,-s*2.5,0);ctx.bezierCurveTo(-s*3.5,s*.5+wag*1.5,-s*1.5,s*2+wag*2,-s*.4,0);ctx.fill();
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,s*.7,s*.25,0,0,Math.PI*2);ctx.fill();
    drawEye(ctx, s*.4, -s*.05, s*.08);
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.ellipse(s*.2, s*.1, s*.3, s*.15, Math.PI/6 + paddle*.2, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='jellyfish'){
    const pulse = Math.sin(time*0.1 + f.id)*0.2;
    ctx.fillStyle=f.genes.c1[0]+'66';
    ctx.beginPath();ctx.arc(0, -s*.2, s*.6*(1+pulse), Math.PI, 0); ctx.fill();
    ctx.strokeStyle=f.genes.c2[0]+'88'; ctx.lineWidth=2;
    for(let i=-2; i<=2; i++){
      ctx.beginPath(); ctx.moveTo(i*s*.15, 0); 
      ctx.quadraticCurveTo(i*s*.3, s+wag, i*s*.2, s*1.5+wag); ctx.stroke();
    }
  }
  else if(f.type==='octopus'){
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(s*.3, 0, s*.7, s*.5, 0, 0, Math.PI*2);ctx.fill();
    ctx.strokeStyle=f.genes.c1[0]; ctx.lineWidth=4;
    for(let i=0; i<8; i++){
      const a = (i/7)*Math.PI - Math.PI/2;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.quadraticCurveTo(Math.cos(a)*s, Math.sin(a)*s+wag, Math.cos(a)*s*1.5, Math.sin(a)*s*1.5+wag);
      ctx.stroke();
    }
    drawEye(ctx, s*.5, -s*.15, s*.08);
  }
  else if(f.type==='turtle'){
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath();ctx.ellipse(s*.7, 0, s*.4, s*.25, 0, 0, Math.PI*2);ctx.fill();
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0, 0, s, s*.7, 0, 0, Math.PI*2);ctx.fill();
    ctx.strokeStyle=f.genes.c1[0]+'44'; ctx.lineWidth=2;
    for(let i=0;i<3;i++) { ctx.beginPath();ctx.moveTo(-s+i*s*.7,-s);ctx.lineTo(-s+i*s*.7,s);ctx.stroke(); }
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(-s*.5, -s*.7, s*.5, s*.3, 0.5, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(-s*.5, s*.7, s*.5, s*.3, -0.5, 0, Math.PI*2);ctx.fill();
    drawEye(ctx, s*.9, -s*.1, s*.06);
  }
  else if(f.type==='whaleshark'){
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,s*2,s*.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff3';
    for(let i=0;i<12;i++) ctx.beginPath();ctx.arc(-s+Math.random()*s*2, -s*.4+Math.random()*s*.8, 2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.moveTo(-s*1.5, 0); ctx.lineTo(-s*2.2, -s*.6+wag); ctx.lineTo(-s*2.2, s*.6+wag); ctx.closePath(); ctx.fill();
    drawEye(ctx, s*1.8, -s*.2, s*.05);
  }
  else if(f.type==='narwhal'){
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,s*1.5,s*.5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s*1.4, -s*.1); ctx.lineTo(s*2.8, -s*.2); ctx.stroke();
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.moveTo(-s*1.2, 0); ctx.lineTo(-s*1.8, -s*.4+wag); ctx.lineTo(-s*1.8, s*.4+wag); ctx.closePath(); ctx.fill();
    drawEye(ctx, s*1.2, -s*.1, s*.06);
  }
  
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = s*0.1;
  ctx.beginPath();
  if(f.type==='angelfish') ctx.ellipse(0,0,s*.5,s*.8,0, Math.PI, Math.PI*1.5);
  else ctx.ellipse(0,0,s*.7,s*.25,0, Math.PI, Math.PI*1.5);
  ctx.stroke();

  if(f.name) {
    ctx.scale(1/fs, 1/fs);
    ctx.fillStyle = 'rgba(0,10,25,0.6)';
    ctx.beginPath();
    const tw = ctx.measureText(f.name).width;
    ctx.roundRect(-tw/2-6, -s*fs-40, tw+12, 16, 8);
    ctx.fill();
    ctx.font = '10px system-ui, sans-serif';
    ctx.fillStyle = f.isRare ? '#fbbf24' : '#f8fafc';
    ctx.textAlign = 'center';
    ctx.fillText(f.name, 0, -s*fs-29);
  }

  ctx.restore();
}

// GAME LOOP
function loop(){
try {
  if(!W || !H) resize();
  time++;updateEco();if(time%60===0)checkMilestones();ctx.clearRect(0,0,W,H);

  let theme = THEMES[curTheme] || THEMES['default'];
  if(curTheme === 'default') {
    const hr = new Date().getHours();
    const isDay = hr >= 7 && hr < 19;
    if(isDay) theme = {c1:'#0284c7', c2:'#0369a1', c3:'#082f49'};
  }
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, theme.c1);
  g.addColorStop(.5, theme.c2);
  g.addColorStop(1, theme.c3);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Marine Snow
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for(let i=0;i<marineSnow.length;i++){
    const p=marineSnow[i];
    p.y -= p.v; p.x += Math.sin(time*0.01 + i)*0.2;
    if(p.y < -10) p.y = H+10;
    if(p.x < -10) p.x = W+10; if(p.x > W+10) p.x = -10;
    ctx.globalAlpha = p.o;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.globalCompositeOperation='screen';
  for(let i=0;i<4;i++){
    ctx.beginPath();const rx=(W/4)*i+Math.sin(time*.005+i)*60;
    ctx.moveTo(rx,0);ctx.lineTo(rx-120,H);ctx.lineTo(rx+180,H);
    const rg=ctx.createLinearGradient(0,0,0,H);
    rg.addColorStop(0,'rgba(255,255,255,.06)');rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg;ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  if(algae>0){ctx.fillStyle=`rgba(34,139,34,${algae*.003})`;ctx.fillRect(0,0,W,H);}
  if(isHarmony){ctx.fillStyle='rgba(251,191,36,.055)';ctx.fillRect(0,0,W,H);}

  function drawFlora(sw) {
    // Slower, more subtle swaying for organic look
    const timeMod = time * 0.006 + sw.ph;
    const swayBase = Math.sin(timeMod) * (4 + sw.h * 0.06);
    const swayExtra = Math.sin(timeMod * 2.4 - sw.ph) * 1; 
    const sway = swayBase + swayExtra;
    ctx.lineCap = 'round';
    
    if(sw.type === 'seaweed') {
      for(let b=0; b<3; b++) {
        ctx.beginPath();
        let px = sw.x + (b-1)*8, py = H-85;
        ctx.moveTo(px, py);
        const hScale = sw.h * (0.8 + b*0.1);
        const bSway = sway * (0.9 + b*0.1);
        const cp1x = px + bSway * 0.5, cp1y = py - hScale * 0.5;
        const endX = px + bSway, endY = py - hScale;
        ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);
        const g = ctx.createLinearGradient(px, py, endX, endY);
        g.addColorStop(0, `hsla(${sw.hue}, ${sw.sat}%, ${15 + b*5}%, 0.8)`);
        g.addColorStop(1, `hsla(${sw.hue + 10}, ${sw.sat + 10}%, ${40 + b*10}%, 0.1)`);
        ctx.strokeStyle = g; ctx.lineWidth = 6 - b; ctx.stroke();
      }
    } else if(sw.type === 'grass') {
      for(let b=0; b<5; b++) {
        ctx.beginPath();
        let px = sw.x + (b-2)*3, py = H-85;
        ctx.moveTo(px, py);
        const hScale = sw.h * (0.8 + b*0.1);
        const bSway = sway * (1.1 + b*0.1);
        const cp1x = px + bSway * 0.5, cp1y = py - hScale * 0.5;
        const endX = px + bSway, endY = py - hScale;
        ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);
        ctx.strokeStyle = `hsla(${sw.hue}, ${sw.sat}%, ${25 + b*8}%, 0.8)`;
        ctx.lineWidth = 3 - b*0.5; ctx.stroke();
      }
    } else if(sw.type === 'kelp') {
      ctx.beginPath();
      let px = sw.x, py = H-85; ctx.moveTo(px, py);
      const bSway = sway * 1.2;
      const cp1x = px + bSway * 0.2, cp1y = py - sw.h * 0.3;
      const cp2x = px + bSway * 0.7, cp2y = py - sw.h * 0.6;
      const endX = px + bSway, endY = py - sw.h;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
      ctx.strokeStyle = `hsla(${sw.hue}, ${sw.sat}%, 20%, 0.7)`;
      ctx.lineWidth = 15; ctx.stroke();
      for(let l=0; l<sw.segs; l++) {
        const lp = l/sw.segs;
        const lx = px + bSway * lp, ly = py - sw.h * lp;
        ctx.fillStyle = `hsla(${sw.hue}, ${sw.sat + 10}%, 30%, 0.6)`;
        ctx.beginPath();
        ctx.ellipse(lx + Math.sin(timeMod + l)*10, ly, 12, 6, Math.PI/4 + Math.sin(timeMod)*0.5, 0, Math.PI*2);
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      let px = sw.x, py = H-85;
      for(let r=-2; r<=2; r++) {
        ctx.moveTo(px, py);
        const rx = px + r * 15 + sway;
        const ry = py - sw.h * 0.6;
        ctx.quadraticCurveTo(px + r*5, py - sw.h*0.3, rx, ry);
      }
      ctx.strokeStyle = `hsla(${sw.hue}, ${sw.sat}%, 45%, 0.5)`;
      ctx.lineWidth = 4; ctx.stroke();
    }
  }

  for(const sw of seaweeds) { if(sw.z === 'back') drawFlora(sw); }

  ctx.fillStyle = 'rgba(0,5,15,0.4)';
  for(const f of fishList) {
    const s = TYPES[f.type].sz * f.scale * (f.genes.szMod||1);
    ctx.beginPath();
    ctx.ellipse(f.x, H-80, s*1.2, s*0.4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  for(const e of eggs){
    ctx.save();ctx.translate(e.x,e.y);
    const pulse=1+Math.sin(time*.1)*.1;ctx.scale(pulse,pulse);
    ctx.beginPath();ctx.ellipse(0,0,6,8,0,0,Math.PI*2);
    const eg=ctx.createRadialGradient(0,-2,1,0,0,8);
    eg.addColorStop(0,'#fbcfe8');eg.addColorStop(1,e.genes.c1[0]);
    ctx.fillStyle=eg;ctx.fill();
    ctx.beginPath();ctx.ellipse(-2,-3,2,3,Math.PI/4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
    ctx.restore();
    const secs = Math.ceil(e.timer / 60);
    let str = '';
    if(secs >= 3600) str = Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
    else if(secs >= 60) str = Math.floor(secs/60) + 'm ' + String(secs%60).padStart(2,'0') + 's';
    else str = secs + 's';
    ctx.font='bold 10px -apple-system, sans-serif';ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(str, e.x, e.y - 14);
    ctx.fillStyle='#fff';ctx.fillText(str, e.x, e.y - 15);
  }
  
  for(const s of snails){updateSnail(s);drawSnail(s);}

  for(const c of clams){
    c.timer++;ctx.save();ctx.translate(c.x,H-75);
    ctx.scale(1,1+Math.sin(c.timer*.02)*.05);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,10,15,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(0,0,18,Math.PI,0);ctx.fillStyle='#64748b';ctx.fill();
    if(c.timer%1200>1100){
      ctx.beginPath();ctx.arc(0,-10,4,0,Math.PI*2);ctx.fillStyle='#f8fafc';ctx.shadowBlur=10;ctx.shadowColor='#fff';ctx.fill();ctx.shadowBlur=0;
    }
    ctx.rotate(-Math.max(0,Math.sin(c.timer*.02))*.5);ctx.beginPath();ctx.arc(0,0,19,Math.PI,0);ctx.fillStyle='#94a3b8';ctx.fill();ctx.restore();
    if(c.timer%1200===0){addCoins(150,c.x,H-100,true);spawnJuice(c.x,H-750, ICONS.star + ' PEARL!','#f8fafc',1.5);}
  }

  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];b.y-=b.spd;b.x+=Math.sin(time*.004+b.ph)*.6;
    if(b.y<-10){bubbles.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${b.life*.45})`;ctx.stroke();
  }
  if(bubbles.length<20&&Math.random()<.05)bubbles.push({x:20+Math.random()*(W-40),y:H+10,r:2+Math.random()*5,spd:.8+Math.random()*1.2,ph:Math.random()*Math.PI*2,life:.6+Math.random()*.4});

  for(let i=foodList.length-1;i>=0;i--){
    const fd=foodList[i];
    if(fd.eaten)fd.life-=.1;
    else{
      fd.vy=Math.min(fd.vy+.02,1.2);fd.vx*=.98;
      fd.x+=fd.vx+Math.sin(time*.02+fd.y)*.2;fd.y+=fd.vy;
      if(fd.y>=FOOD_FL()){fd.y=FOOD_FL();fd.vy=0;fd.vx=0;fd.life-=.002;if(Math.random()<.05)algae=Math.min(100,algae+.1);}
    }
    if(fd.life<=0){foodList.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,fd.life);
    ctx.beginPath();ctx.ellipse(fd.x,fd.y,4.5,3.5,0,0,Math.PI*2);
    ctx.fillStyle=UPGRADES.flakes.owned? ACCENTS[curAccent].hex :'#d4940a';ctx.fill();
    ctx.globalAlpha=1;
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.03;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }ctx.globalAlpha=1;

  fishList.sort((a,b)=>a.scale-b.scale);
  for(const f of fishList){updateFish(f);drawFish(f);}
  for(const sw of seaweeds) { if(sw.z === 'front') drawFlora(sw); }

  function drawSubstrate() {
    const f = FLOORS[curFloor];
    ctx.fillStyle = f.c;
    ctx.beginPath(); ctx.moveTo(0, H+5); ctx.lineTo(0, H-85);
    for(let i=0; i<=W; i+=40) ctx.lineTo(i, H-85 + Math.sin(i*0.04)*4);
    ctx.lineTo(W, H+5); ctx.fill();
    ctx.save();
    ctx.clip();
    for(let i=0; i<300; i++) {
       const gx = (i * 137.5) % W;
       const gy = H - 85 + (i * 7.1) % 90;
       ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random()*0.05})`;
       ctx.fillRect(gx, gy, 1.5, 1.5);
       if(i % 10 === 0) {
         ctx.fillStyle = 'rgba(0,0,0,0.1)';
         ctx.beginPath(); ctx.arc(gx, gy, 2 + Math.random()*3, 0, Math.PI*2); ctx.fill();
       }
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H-85);
    for(let i=0; i<=W; i+=40) ctx.lineTo(i, H-85 + Math.sin(i*0.04)*4);
    ctx.stroke();
  }
  drawSubstrate();

  saveTimer++;
  if(saveTimer>=1800){saveTimer=0;saveGame();}

  requestAnimationFrame(loop);
} catch(crashError) {
  if(!window.crashedAlready) {
    window.crashedAlready=true;
    const errBox = document.createElement('div');
    errBox.style.cssText = 'position:fixed;inset:0;background:purple;color:white;z-index:999999;font-family:monospace;padding:20px;font-size:16px;overflow:auto;word-wrap:break-word;';
    errBox.innerHTML = '<h2>LOOP CRASH</h2>' + crashError.message + '<br><br>' + crashError.stack;
    document.body.appendChild(errBox);
  }
}
}

// INPUT & INTERACTION
function dropFood(x,y) {
  if(foodList.length<fishList.length*5+10){
    const n=UPGRADES.flakes.owned?2:1;
    for(let i=0;i<n;i++)foodList.push({x:x+(Math.random()-.5)*20,y:Math.max(40,Math.min(y,H-85))+(Math.random()-.5)*10,vx:(Math.random()-.5)*2,vy:-1,life:1,eaten:false});
  }
}

function doTap(x,y){
  if(isClean){
    if(algae>0){
      algae=Math.max(0,algae-.5);sm.cleaned+=.5;
      if(Math.random()<.3)bubbles.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,r:2+Math.random()*3,spd:3,ph:0,life:1});
      if(Math.random()<.08)spawnJuice(x,y, ICONS.clean,'#34d399',.8);
    }
  }else{
    let hitFish = null;
    for(const f of fishList) {
      const s = TYPES[f.type].sz * f.scale * (f.genes.szMod||1);
      if(Math.hypot(f.x - x, f.y - y) < s * 2) { hitFish = f; break; }
    }
    if(hitFish) {
      if(hitFish.bonded < 300) { 
        hitFish.bonded = 3600; 
        for(let i=0;i<6;i++) particles.push({x:x,y:y-30,vx:(Math.random()-.5)*3,vy:-1-Math.random()*2,life:1,c:'#fb7185'});
      }
      return; 
    }
    dropFood(x,y);
  }
}

cv.addEventListener('pointerdown',e=>{
  if(document.querySelector('.panel.open')||e.target.closest('#ui')||e.target.closest('#nav'))return;
  pDown=true;lx=e.clientX;ly=e.clientY;
  doTap(lx,ly);
});
cv.addEventListener('pointermove',e=>{
  if(!pDown) return;
  if(isClean) {
    const d=Math.hypot(e.clientX-lx,e.clientY-ly);
    if(d>10){doTap(e.clientX,e.clientY);lx=e.clientX;ly=e.clientY;}
  } else {
    const d = Math.hypot(e.clientX-lx, e.clientY-ly);
    if(d > 35) { dropFood(e.clientX, e.clientY); lx = e.clientX; ly = e.clientY; }
  }
});
cv.addEventListener('pointerup',()=>pDown=false);
cv.addEventListener('pointercancel',()=>pDown=false);

function toggleMode(){
  isClean=!isClean;
  const b=document.getElementById('modebtn');
  if(isClean){b.classList.add('cleaning');b.innerHTML= ICONS.clean + ' Clean';cv.style.cursor='cell';}
  else{b.classList.remove('cleaning');b.innerHTML= ICONS.feed + ' Feed';cv.style.cursor='crosshair';}
}

let _tt;
function toast(msg,col='#10b981'){
  const t=document.getElementById('toast');t.innerHTML=msg;t.style.background=col;t.style.opacity=1;
  clearTimeout(_tt);_tt=setTimeout(()=>t.style.opacity=0,3200);
}
function spawnJuice(x,y,html,color,scale=1){
  for(let i=0;i<5;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-1,life:1,c:color});
  const el=document.createElement('div');el.className='ft';
  el.style.cssText=`left:${x-20}px;top:${y-20}px;color:${color};font-size:${16*scale}px;`;
  el.innerHTML=html;document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}
function addCoins(amt,x,y,bonus=false){
  coins+=amt;totalCoins+=amt;
  document.getElementById('cv').textContent=coins;
  checkLevel();
  spawnJuice(x,y,`+${amt}`,bonus?'#fbbf24':'var(--ui-accent)',1+Math.min(amt*.01,.6));
}
const LEVEL_THRESHOLDS=[0,1000,4000,15000,45000,150000,400000,1000000,2500000,6000000];
function checkLevel(){
  const old=playerLevel;
  for(let i=LEVEL_THRESHOLDS.length-1;i>=1;i--){
    if(totalCoins>=LEVEL_THRESHOLDS[i]){playerLevel=i+1;break;}
  }
  if(playerLevel>old){
    document.getElementById('lvl').textContent=playerLevel;
    toast(ICONS.star+` Level ${playerLevel}! New items unlocked`,'var(--ui-accent)');
    spawnJuice(W/2,H/4,ICONS.star+' LEVEL UP!','var(--ui-accent)',2);
    document.getElementById('nb-shop').classList.add('notify');
    checkMilestones();
  }
}

function checkMilestones() {
  currentOrders.forEach(o => {
    if(o.metric==='rares_owned') o.progress = fishList.filter(f=>f.isRare).length;
    if(o.metric==='level7' && playerLevel >= 7) o.progress = 1;
    if(o.metric==='milestone_5m' && totalCoins >= 5000000) o.progress = 1;
  });
}

// TABS, SHOP, AND DECOR
let currentTab='tank';
function setTab(t){
  currentTab=t;
  if(t==='tank') closeAll();
  else {
    document.querySelectorAll('.panel').forEach(px => { px.classList.remove('open','full','dragging'); px.style.height=''; px.style.transform=''; });
    buildPanel(t);
    const p = document.getElementById({market:'mpanel', decor:'dpanel', orders:'opanel', shop:'spanel', social:'socpanel', finder:'fpanel'}[t]);
    if(p) { p.classList.add('open'); p.classList.remove('full'); p.style.height=''; p.style.transform=''; }
    document.getElementById('sov').classList.add('open');
    document.getElementById('sov').style.opacity='';
    ['market','decor','orders','shop','social','finder'].forEach(id=>{
      const el = document.getElementById('nb-'+id);
      if(el) el.classList.toggle('active',id===t);
    });
    if(t==='market') document.getElementById('nb-market').classList.remove('notify');
    if(t==='shop') document.getElementById('nb-shop').classList.remove('notify');
    if(t==='orders') document.getElementById('nb-orders').classList.remove('notify');
  }
}

function buildPanel(t){
  if(t==='market') buildMarket();
  if(t==='shop') buildShop();
  if(t==='decor') buildDecor();
  if(t==='orders') buildOrders();
  if(t==='social') buildSocial();
  if(t==='finder') buildFishFinder();
}

function getPersonality(f) {
  const p1 = ['Playful','Calm','Curious','Vibrant','Loyal','Grumpy'][f.id % 6];
  const p2 = ['Bubbler','Explorer','Dancer','Watcher','Zinger','Floaty'][Math.floor(f.id/10) % 6];
  const likes = ['Green Algae','Bubbles','Sand','Snails','Food Plankton'][f.id % 5];
  const dislikes = ['Dirty Water','Noise','Empty Tanks','Cold'][Math.floor(f.id/7) % 4];
  return { desc: `${p1} ${p2}`, likes, dislikes };
}

function buildFishFinder() {
  const flist = document.getElementById('flist');
  if(!fishList.length) { flist.innerHTML = '<div style="color:#475569;text-align:center;padding:20px;">No fish in tank.</div>'; return; }
  
  flist.innerHTML = fishList.map(f => {
    const def = TYPES[f.type];
    const ageTxt = f.age > 18000 ? "Adult" : f.age > 6000 ? "Juvenile" : "Baby";
    const pers = getPersonality(f);
    const trait = f.genes.trait[0];
    const bondLv = Math.min(5, Math.floor((f.bonded || 0) / 720) + 1);
    const hearts = '❤️'.repeat(bondLv) + '<span style="opacity:0.2;">' + '❤️'.repeat(5-bondLv) + '</span>';
    
    let html = `<div class="finder-card">
      <div style="display:flex; align-items:center; gap:12px;">
        <span style="font-size:28px; filter:drop-shadow(0 0 10px rgba(255,255,255,0.2));">${def.icon}</span>
        <div style="flex:1;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="color:#fff; font-weight:900; font-size:14px; letter-spacing:0.3px;">${f.name || def.name}</span>
            <span class="m-badge b-age">${ageTxt}</span>
            ${f.isRare?'<span class="m-badge b-rare">RARE</span>':''}
          </div>
          <div style="color:#475569; font-size:10px; font-weight:700;">${def.name.toUpperCase()} • ID:${f.id}</div>
        </div>
        <div style="display:flex;gap:5px;">
           <div class="c-dot" style="background:${f.genes.c1[0]}; box-shadow:0 0 10px ${f.genes.c1[0]}66;"></div>
           <div class="c-dot" style="background:${f.genes.c2[0]}; box-shadow:0 0 10px ${f.genes.c2[0]}66;"></div>
        </div>
      </div>`;

    if(playerLevel >= 4) {
      html += `
        <div class="f-row"><span>Bond Level</span><span style="font-size:10px;">${hearts}</span></div>
        <div class="f-row"><span>Trait Pattern</span><span class="f-val">${ICONS[trait]} ${trait.toUpperCase()}</span></div>
        <div class="f-trait-desc">Current multiplier: <span style="color:#fbbf24">x${TRAIT_MARKET_MULT[trait]}</span></div>
        <div class="f-row"><span>Condition</span><span class="f-val">${Math.floor(f.hunger)}% Satiated</span></div>
      `;
    }
    
    if(playerLevel >= 7) {
      html += `
        <div class="f-row"><span>Genetics</span><span class="f-val" style="font-family:monospace;font-size:9px;">${f.genes.c1[0]} / ${f.genes.c2[0]}</span></div>
        <div class="f-personality">
          <div style="font-weight:900; color:#fff; margin-bottom:4px; font-size:10px; text-transform:uppercase; letter-spacing:1px;">${pers.desc}</div>
          <div>Loves: <span style="color:#34d399">${pers.likes}</span> • Dislikes: <span style="color:#f43f5e">${pers.dislikes}</span></div>
        </div>
      `;
    } else {
       html += `<div style="font-size:9px; color:#334155; margin-top:10px; font-style:italic; text-align:center; border-top:1px solid rgba(255,255,255,0.05); padding-top:8px;">Reach Level ${playerLevel<4?4:7} for detailed bio</div>`;
    }

    html += `</div>`;
    return html;
  }).join('');
}

function closeAll(){
  document.querySelectorAll('.panel').forEach(p=>{
    p.classList.remove('open','full','dragging');
    p.style.height=''; p.style.transform='';
  });
  document.getElementById('sov').classList.remove('open');
  document.getElementById('sov').style.opacity='';
  ['market','decor','orders','shop','social'].forEach(id=>document.getElementById('nb-'+id).classList.remove('active'));
  currentTab='tank';
}

// ─── PANEL DRAG SYSTEM ────────────────────────────────────────────────────────
const HALF_H=0.52, FULL_H=0.92;
let _dp=null,_dSY=0,_dS0=0,_dLY=0,_dLT=0,_dVel=0,_dCur=0;

function _pSetH(p,h){
  h=Math.max(0,Math.min(1,h)); _dCur=h;
  p.style.height=`${h*100}dvh`;
  document.getElementById('sov').style.opacity=Math.max(0,Math.min(1,(h/FULL_H)*0.7));
}
function _pSnap(p){
  p.classList.remove('dragging');
  p.style.height=''; p.style.transform='';
  document.getElementById('sov').style.opacity='';
  const h=_dCur, v=_dVel;
  if(v>0.5){       if(h>0.4){p.classList.remove('full');p.classList.add('open');}else closeAll(); }
  else if(v<-0.5){ p.classList.add('full','open'); }
  else if(h>0.72){ p.classList.add('full','open'); }
  else if(h>0.26){ p.classList.remove('full');p.classList.add('open'); }
  else{            closeAll(); }
  _dp=null;
}

document.querySelectorAll('.ph').forEach(ph=>{
  ph.addEventListener('touchstart',e=>{
    const p=ph.closest('.panel');
    if(!p||!p.classList.contains('open'))return;
    _dp=p; _dSY=e.touches[0].clientY;
    _dS0=p.classList.contains('full')?FULL_H:HALF_H;
    _dCur=_dS0; _dLY=_dSY; _dLT=Date.now(); _dVel=0;
    p.classList.add('dragging');
  },{passive:true});
});

window.addEventListener('touchmove',e=>{
  if(!_dp)return;
  if(e.cancelable)e.preventDefault();
  const y=e.touches[0].clientY;
  const h=_dS0+(_dSY-y)/window.innerHeight;
  _pSetH(_dp,h);
  const now=Date.now(),dt=now-_dLT;
  if(dt>0)_dVel=(y-_dLY)/dt;
  _dLY=y; _dLT=now;
},{passive:false});

window.addEventListener('touchend',()=>{ if(_dp)_pSnap(_dp); });
window.addEventListener('touchcancel',()=>{ if(_dp)_pSnap(_dp); });

const TYPE_MAP  = ['guppy','tetra','goldfish','betta','angelfish','discus'];
const TRAIT_MAP = ['greedy','shy','lazy','active'];

function encodeFish(f) {
  const ti = TYPE_MAP.indexOf(f.type);
  const t1 = TRAIT_MAP.indexOf(f.genes.trait[0]);
  const t2 = TRAIT_MAP.indexOf(f.genes.trait[1]);
  const r  = f.isRare ? 1 : 0;
  const raw = `${ti}${t1}${t2}${r}`;
  let sum = raw.split('').reduce((a,c)=>a+parseInt(c),0);
  const check = (sum % 36).toString(36).toUpperCase();
  return `FISH${raw}${check}`;
}

function decodeFish(code) {
  if(!code.startsWith('FISH') || code.length !== 9) return null;
  const raw = code.slice(4,8), check = code[8];
  if(!/^[0-9]+$/.test(raw)) return null;
  let sum = raw.split('').reduce((a,c)=>a+parseInt(c),0);
  if((sum%36).toString(36).toUpperCase() !== check) return null;
  const type  = TYPE_MAP[parseInt(raw[0])];
  const t1    = TRAIT_MAP[parseInt(raw[1])];
  const t2    = TRAIT_MAP[parseInt(raw[2])];
  const isRare = raw[3] === '1';
  if(!type||!t1||!t2) return null;
  return {type, t1, t2, isRare};
}

function getEggTimerFrames(type) {
  const req = (TYPES[type] && TYPES[type].req) || 1;
  let mins = 5;
  if(req === 2) mins = 10;
  if(req === 3) mins = 20;
  if(req === 4) mins = 30;
  if(req === 5) mins = 45;
  if(req === 6) mins = 60;
  return mins * 60 * 60;
}

  if(idx < 0) return;
  const f = fishList[idx];

}

function makeCosmCard(id, def, isOwned, isEquipped, lk, colorVal, onBuy, onEquip) {
  const canBuy = !isOwned && !lk && coins >= def.cost;
  let btnHtml = '';
  if(isEquipped) btnHtml = `<span class="cpr" style="color:var(--ui-accent)">${ICONS.done} EQUIPPED</span>`;
  else if(isOwned) btnHtml = `<span class="cpr" style="color:#10b981">OWNED</span>`;
  else btnHtml = `<span class="cpr" style="display:flex;align-items:center;justify-content:center;gap:3px;">${ICONS.coin}${def.cost}</span>`;
  const c = document.createElement('div');
  c.className = `card ${(canBuy||isOwned)?'buyable':''} ${isEquipped?'equipped':''} ${lk?'locked':''}`;
  c.setAttribute('data-req', def.req);
  c.innerHTML = `<span class="ci" style="color:${colorVal}">${def.icon}</span><span class="cn">${def.name}</span>${btnHtml}`;
  if(!lk) c.onclick = () => {
    if(isEquipped) return;
    if(isOwned) { onEquip(); spawnJuice(W/2,H/2,ICONS.done+' Equipped!','var(--ui-accent)',1.4); }
    else if(canBuy) { coins-=def.cost; document.getElementById('cv').textContent=coins; onBuy(); spawnJuice(W/2,H/2,ICONS.star+' Unlocked!','#10b981',1.4); }
    buildDecor(); saveGame();
  };
  return c;
}

function myCode(){
  const d=new Date(),key=uid+`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  let h=0;for(const c of key)h=((h<<5)-h+c.charCodeAt(0))&0x7FFFFFFF;
  const ch='ACDEFGHJKLMNPQRUVWXY34679';let code='Z';
  for(let i=0;i<7;i++){h=(h*1103515245+12345)&0x7FFFFFFF;code+=ch[Math.abs(h)%ch.length];}
  return code;
}
function copyCode(){
  const c=myCode();
  try{navigator.clipboard.writeText(c).catch(()=>{});}catch(_){}
  toast(ICONS.done + ' Code copied!','#10b981');
}
function redeemCode(raw){
  const code=raw.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(code.startsWith('FISH')) {
    const fData = decodeFish(code);
    if(!fData) { toast('Invalid fish code!','#ef4444'); return; }
    if(claimedCodes.has(code)){ toast('Already claimed this fish!','#ef4444'); return; }
    const mF = baseMaxFish + (UPGRADES.tank.owned*4);
    if((fishList.length+eggs.length) >= mF) { toast('Tank is full!','#ef4444'); return; }
    
    claimedCodes.add(code); codesRedeemed++;
    const def = TYPES[fData.type];
    const genes = { c1: [def.c1, def.c1], c2: [def.c2, def.c2], trait: [fData.t1, fData.t2] };
    if(fData.isRare) {
        if(Math.random()<0.5) genes.c1[0] = def.rare.c1;
        else genes.c2[0] = def.rare.c2;
    }
    eggs.push({x:Math.random()*(W-100)+50,y:H-85,type:fData.type,timer:getEggTimerFrames(fData.type),genes:genes,isRareMut:fData.isRare});
    updateHUD();
    toast(ICONS.egg + ' Egg received!','#10b981');
    document.getElementById('codein').value='';
    document.getElementById('soclog').innerHTML=`${ICONS.done} Claimed fish code!`;
    saveGame(); buildSocial();
    return;
  }
  
  if(code.length<8){toast('Enter a valid code!','#ef4444');return;}
  if(code===myCode()){toast("Can't redeem your own code!",'#ef4444');return;}
  if(claimedCodes.has(code)){toast('Already redeemed!','#ef4444');return;}
  if(code.startsWith('Z')&&code.length===8){
    claimedCodes.add(code);codesRedeemed++;
    const r=100+Math.floor(Math.random()*101);
    addCoins(r,W/2,H/3,true);
    toast(ICONS.social + ` Gift received! +${r}`,'#10b981');
    document.getElementById('codein').value='';
    document.getElementById('soclog').innerHTML=`${ICONS.done} Redeemed ${code} for +${r} coins`;
    saveGame();buildSocial();
  }else{toast('Invalid code format!','#ef4444');}
}

function renameFish(id) {
  const f = fishList.find(x => x.id === id);
  if(!f) return;
  const nn = prompt(`Enter a new name for your ${f.isRare?'Rare ':''}${TYPES[f.type].name}:`, f.name||'');
  if(nn !== null) {
    if(nn.trim() === '') delete f.name;
    else f.name = nn.trim().substring(0, 16);
    saveGame(); buildSocial();
  }
}

function exportSave() {
  saveGame();
  const raw = localStorage.getItem(MASTER_KEY);
  if(!raw) return;
  try {
    const b64 = btoa(encodeURIComponent(raw));
    navigator.clipboard.writeText(b64).catch(()=>{});
    toast(ICONS.done + ' Save copied to clipboard!', '#10b981');
  } catch(e) { toast('Export failed.', '#ef4444'); }
}

function importSaveClick() {
  const str = prompt("Paste your exported save data code here. WARNING: This will overwrite your current save totally and reload the game.");
  if(!str) return;
  try {
    const dec = decodeURIComponent(atob(str));
    JSON.parse(dec); // validate it parses
    localStorage.setItem(MASTER_KEY, dec);
    location.reload();
  } catch(e) {
    alert("Invalid save code. Import failed.");
  }
}

} catch (crashError) {
  const errBox = document.createElement('div');
  errBox.style.cssText = 'position:fixed;inset:0;background:black;color:red;z-index:999999;font-family:monospace;padding:20px;font-size:16px;overflow:auto;word-wrap:break-word;';
  errBox.innerHTML = '<h2>CRASH DETECTED</h2>' + crashError.message + '<br><br>' + crashError.stack;
  document.body.appendChild(errBox);
}
document.addEventListener('visibilitychange',()=>{if(document.hidden)saveGame();});
// End of script. loop() was already called above.

// ─────────────────────────────────────────────────────────────────────────────
// ORDERS FUNCTIONS (full)
// ─────────────────────────────────────────────────────────────────────────────
function getRawMetricValue(o) {
  switch(o.metric){
    case'feeds':      return sm.feeds || 0;
    case'harmonySec': return Math.floor(sm.harmonySec || 0);
    case'cleaned':    return Math.floor(sm.cleaned || 0);
    case'marketSales':return sm.marketSales || 0;
    case'hatched':    return sm.hatched || 0;
    case'fish':       return fishList.filter(f=>f.type===o.ftype).length;
    default:          return 0;
  }
}

function getDifficultyScale() {
  return 1.0 + Math.min(completedOrders * 0.05, 2.5);
}

function generateSingleOrder(index) {
  const scale = getDifficultyScale();
  let template;
  let forceTrade = (completedOrders > 0 && completedOrders % 4 === 0 && index === 0);

  if(forceTrade) {
    const validTrades = TRADE_POOL.filter(o => playerLevel >= TYPES[o.ftyperew].req);
    template = validTrades.length > 0 ? validTrades[Math.floor(Math.random() * validTrades.length)] : TRADE_POOL[0];
  } else {
    const validPool = ORDER_POOL.filter(o => {
      if(!o.isState) return true;
      const scaledTarget = Math.ceil(o.target * scale);
      const maxPoss = (TYPES[o.ftype] && TYPES[o.ftype].max) || 999;
      return getRawMetricValue(o) < Math.min(scaledTarget, maxPoss); 
    });
    const poolToUse = validPool.length > 0 ? validPool : ORDER_POOL;
    template = poolToUse[Math.floor(Math.random() * poolToUse.length)];
  }

  let t = template.isTrade ? template.target : Math.ceil(template.target * scale);
  if(template.isState && template.ftype) t = Math.min(t, TYPES[template.ftype].max);
  const r = template.isTrade ? 0 : Math.ceil(template.reward * scale);

  currentOrders[index] = {
    id: template.id,
    icon: template.icon,
    desc: template.desc,
    metric: template.metric,
    ftype: template.ftype,
    isState: template.isState,
    isTrade: template.isTrade,
    ftypereq: template.ftypereq,
    ftyperew: template.ftyperew,
    target: t,
    reward: r,
    startVal: 0,
    progress: 0,
    complete: false,
    claimed: false
  };
  if(!template.isState && !template.isTrade) currentOrders[index].startVal = getRawMetricValue(currentOrders[index]);
}

function generateOrders() {
  currentOrders = [];
  for(let i=0; i<ORDER_SLOTS; i++) generateSingleOrder(i);
}

function orderProg(o) {
  if(o.claimed) return o.target;
  if(o.isTrade) return fishList.some(f=>f.type===o.ftypereq && f.scale>=1) ? 1 : 0;
  const current = getRawMetricValue(o);
  if(o.isState) return current;
  return Math.max(0, current - o.startVal);
}

function tickOrders() {
  let newDone = false;
  for(const o of currentOrders){
    if(o.claimed) continue;
    o.progress = Math.min(orderProg(o), o.target);
    if(!o.complete && o.progress >= o.target){ o.complete = true; newDone = true; }
  }
  if(newDone){ toast(ICONS.done + ' Order ready!','#10b981'); document.getElementById('nb-orders').classList.add('notify'); }
}

function claimOrder(i) {
  const o = currentOrders[i]; if(!o || !o.complete || o.claimed) return;
  o.claimed = true; 
  completedOrders++;
  if(o.isTrade) {
    const fIdx = fishList.findIndex(f=>f.type===o.ftypereq && f.scale>=1);
    if(fIdx>=0) fishList.splice(fIdx, 1);
    const def = TYPES[o.ftyperew];
    const genes = { c1: [def.rare.c1, def.rare.c1], c2: [def.rare.c2, def.rare.c2], trait: ['active', 'greedy'], isRareMut:true };
    eggs.push({x:Math.random()*(W-100)+50,y:H-85,type:o.ftyperew,timer:getEggTimerFrames(o.ftyperew),genes:genes,isRareMut:true});
    spawnJuice(W/2, H/3, ICONS.egg + ' RARE EGG!','#fbbf24', 1.4);
    updateHUD();
  } else if(o.ftyperew) {
    const def = TYPES[o.ftyperew];
    const genes = { c1: [def.c1, def.c1], c2: [def.c2, def.c2], trait: ['active', 'greedy'], isRareMut:false };
    eggs.push({x:Math.random()*(W-100)+50,y:H-85,type:o.ftyperew,timer:getEggTimerFrames(o.ftyperew),genes:genes,isRareMut:false});
    spawnJuice(W/2, H/3, ICONS.egg + ' NEW FISH!','var(--ui-accent)', 1.4);
    updateHUD();
  } else {
    addCoins(o.reward, W/2, H/3, true);
    spawnJuice(W/2, H/3, ICONS.done + ' DONE!','#10b981', 1.4);
  }
  generateSingleOrder(i);
  buildOrders(); 
  saveGame();
}

function buildOrders() {
  const olist = document.getElementById('olist');
  if(!olist) return;
  olist.innerHTML = currentOrders.slice(0, 6).map((o,i)=>{
    const p=o.progress, pct=Math.min(100,(p/o.target)*100), done=o.complete||p>=o.target;
    return`<div class="ocard ${o.claimed?'oclaimed':done?'odone':''}">
      <div class="ohead"><span class="oico">${o.icon}</span><div><span class="odesc">${o.desc}</span><span class="orew" style="display:flex;align-items:center;gap:3px;${o.isTrade?'color:#fbbf24;':''}">${o.isTrade ? ICONS.tank + ' Rare ' + TYPES[o.ftyperew].name : ICONS.coin + ' ' + o.reward}</span></div></div>
      <div class="opbg"><div class="opf ${done?'odone':''}" style="width:${pct}%"></div></div>
      <div class="ofoot"><span class="ocnt">${o.claimed? ICONS.done + ' Claimed' : p+' / '+ o.target}</span>
        <button class="cbtn2" onclick="claimOrder(${i})" ${done&&!o.claimed?'':'disabled'}>${o.claimed?'Done':'Claim'}</button>
      </div></div>`;
  }).join('');
}

// RESET SAVE
function resetSave(){
  if(confirm('🗑️ Delete ALL progress and start fresh?\n\nThis cannot be undone.')){
     localStorage.clear();
     // Manual Global Reset for local persistence issues
     coins = 100; totalCoins = 100; playerLevel = 1; algae = 0;
     fishList = []; eggs = []; foodList = []; bubbles = [];
     particles = []; isHarmony = false; combo = 0;
     curFloor = 'default'; curTheme = 'default'; curBorder = 'none'; curBubble = 'default';
     ownedThemes = ['default']; ownedFloors = ['default']; ownedBorders = ['none']; 
     ownedBubbles = ['default']; ownedFlora = ['seaweed', 'grass'];
     boughtCounts = {}; for(let k in TYPES) boughtCounts[k] = 0;
     sm = {feeds:0, harmonySec:0, cleaned:0, hatched:0, rares:0, marketSales:0};
     Object.values(UPGRADES).forEach(u => u.owned = 0);
     
     saveGame(); // Overwrite with blank state
     location.reload(true); 
  }
}
