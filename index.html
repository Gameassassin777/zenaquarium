function getAdultAge(f) {
  // Balanced: 5m to 20m real-time scaling (based on 60fps)
  return 18000 + (TYPES[f.type]?.req||1) * 7200; 
}
function getJuvAge(f) {
  return getAdultAge(f) / 3;
}

// MARKET
function tickMarket() {
  surgeTimer++;
  if(surgeTimer > 180 * 60) { // Every 3 mins @ 60fps
    surgeTimer = 0;
    const ks = Object.keys(TYPES);
    surgingType = ks[Math.floor(Math.random()*ks.length)];
    toast(ICONS.market + ` Market Surge: ${TYPES[surgingType].name} prices are UP!`, '#f59e0b');
  }
  for(let k in marketRates) {
    const drift = (Math.random() - 0.5) * 0.08;
    marketRates[k] += drift;
    if(marketRates[k] > 2.4) marketRates[k] -= 0.05;
    if(marketRates[k] < 0.6) marketRates[k] += 0.05;
  }
  if(currentTab === 'market') buildMarket();
}

function buildMarket() {
  const mlist = document.getElementById('mlist');
  if(!fishList.length) {
    mlist.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px;font-weight:bold;">Your tank is empty!</div>';
    return;
  }
  
  const surgeDef = TYPES[surgingType];
  let hhtml = `
    <div class="m-header">
      <div style="font-size:24px;">${surgeDef.icon}</div>
      <div style="flex:1;">
        <div style="font-size:11px; font-weight:bold; color:var(--money-val); text-transform:uppercase; letter-spacing:1px;">Market Surge</div>
        <div style="font-size:14px; font-weight:900; color:var(--card-text);">${surgeDef.name} Prices x1.5!</div>
      </div>
    </div>
  `;

  const sorted = [...fishList].sort((a,b) => getPrice(b) - getPrice(a));

  mlist.innerHTML = hhtml + sorted.map((f) => {
    const def = TYPES[f.type];
    const price = getPrice(f);
    const rate = marketRates[f.type] || 1;
    const trend = rate > 1.4 ? 'SURGING' : rate < 0.8 ? 'CRASHING' : 'STABLE';
    const tcol = rate > 1.4 ? 'var(--tier-hard)' : rate < 0.8 ? '#0284c7' : 'var(--text-sub)';
    
    let ageTxt = f.age > getAdultAge(f) ? "Adult" : f.age > getJuvAge(f) ? "Juvenile" : "Baby";

    return `<div class="ocard ${f.type===surgingType?'m-surge-hl':''}">
      <div class="ohead">
        <span class="oico">${def.icon}</span>
        <div style="flex:1;">
          <div style="display:flex; align-items:center; gap:5px; margin-bottom:2px;">
            <span class="odesc" style="color:var(--card-text);">${f.isRare? ICONS.star : ''}${def.name} <span style="opacity:0.5; font-size:9px;">#${f.id}</span></span>
            <span class="m-badge b-age">${ageTxt}</span>
            <div style="display:flex;gap:3px;margin-left:auto;">
              <div class="c-dot" style="background:${f.genes.c1[0]}"></div>
              <div class="c-dot" style="background:${f.genes.c2[0]}"></div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="color:${tcol};font-size:10px;font-weight:800;">${trend} ${rate.toFixed(1)}x</span>
            <span class="m-badge b-trait">${ICONS[f.genes.trait[0]]} ${f.genes.trait[0].toUpperCase()}</span>
          </div>
        </div>
      </div>
      <div class="ofoot">
        <span class="m-price">${ICONS.coin}${formatCoins(price)}</span>
        ${f.isAbyssal ? `<span style="color:#a855f7;font-size:11px;font-weight:800;">${ICONS.lock} Unsellable</span>` : `<button class="cbtn2" style="background:linear-gradient(135deg,#b45309,#f59e0b); min-width:80px;" onclick="sellFish(${f.id}, ${price})">Sell</button>`}
      </div></div>`;
  }).join('');
}

function getPrice(f) {
  const t = TYPES[f.type];
  if(!t) return 0;
  const rate = marketRates[f.type] || 1;
  const surgeMult = (f.type === surgingType) ? 1.5 : 1.0;
  const base = t.cost > 0 ? t.cost * 0.4 : 10;
  const ageScale = Math.min(1, f.age / getAdultAge(f));
  const traitMult = TRAIT_MARKET_MULT[f.genes.trait[0]] || 1.0;
  const rareMult = f.isRare ? 3 : 1;
  const colorSellMult = (f._colorBonus?.bonus === 'sellMult') ? f._colorBonus.val : 1.0;
  return Math.floor(base * rate * rareMult * traitMult * f.scale * ageScale * surgeMult * colorSellMult);
}

function generateMasterpieceGenes(type) {
  const h=Math.floor(Math.random()*360);
  const c1=hslToHex(h,95,60), c2=hslToHex((h+180)%360,100,50);
  return {c1:[c1,c1],c2:[c2,c2],trait:['active','greedy'],isRareMut:true,szMod:1.2,isMasterpiece:true};
}

function sellFish(id, price) {
  const f = fishList.find(x => x.id === id);
  if(!f) return;
  if(f.isAbyssal) { toast('Abyssal fish cannot be sold!', '#a855f7'); return; }
  const realPrice = getPrice(f);
  
  const idx = fishList.indexOf(f);
  addCoins(realPrice, W/2, H/3, true);
  spawnJuice(f.x, f.y, 'SOLD!', '#f59e0b', 1.8);
  for(let i=0; i<8; i++) bubbles.push({x:f.x+(Math.random()-.5)*20,y:f.y,r:2+Math.random()*4,spd:2,ph:0,life:1});
  fishList.splice(idx, 1);
  sm.marketSales = (sm.marketSales || 0) + 1;
  updateHUD();
  if(currentTab === 'market') buildMarket();
  if(currentTab === 'finder') buildFishFinder();
  saveGame();
}

// ECOSYSTEM & SMOOTHED AI
function updateEco(){
  let algaeGrowMult = 1.0;
  for(const f of fishList) { if(f._colorBonus?.bonus === 'algaeClean') algaeGrowMult *= f._colorBonus.val; }
  const grow=fishList.length*.008*algaeGrowMult,reduce=snails.length*.015+(UPGRADES.filter.owned>0?.08:0)+(UPGRADES.clam.owned>0?.05:0);
  algae=Math.max(0,Math.min(100,algae+grow-reduce));
  const allFed=fishList.length>0&&fishList.every(f=>f.hunger>60);
  isHarmony=algae<15&&allFed;
  if(isHarmony)sm.harmonySec+=1/60;

  if(UPGRADES.autofeed.owned>0&&time%240===0&&foodList.length<fishList.length){
    const hf=fishList.find(f=>f.hunger<50);
    if(hf)foodList.push({x:hf.x+(Math.random()*40-20),y:20,vy:0,vx:(Math.random()-.5)*.5,life:1,eaten:false});
  }
  
  const now = Date.now();
  for(let i=eggs.length-1;i>=0;i--){
    const e=eggs[i];
    if(e.hatchTime===undefined){e.hatchTime=now+(e.timer||0)*16.666;delete e.timer;}
    if(now >= e.hatchTime){
      fishList.push({id:fid++,type:e.type,x:e.x,y:e.y-10,vx:(Math.random()-.5),vy:-1,phase:0,timer:0,eat:0,hunger:100,age:0,scale:.3,bcd:3000,genes:e.genes,isRare:e.isRareMut,bonded:0,birthTime:Date.now()});
      const _hf = fishList[fishList.length-1];
      computeColorBonus(_hf);
      recordAqEntry(_hf);
      if(_hf._colorBonus?.full) sm.homozyBred = (sm.homozyBred||0) + 1;
      sm.hatched++;if(e.isRareMut)sm.rares++;
      giveXP(e.isRareMut?50:10);
      spawnJuice(e.x,e.y,'Hatched!','#4ade80',1);
      for(let b=0;b<4;b++)bubbles.push({x:e.x+(Math.random()-.5)*10,y:e.y,r:2,spd:2,ph:0,life:1});
      eggs.splice(i,1);
      updateHUD();
    }
  }

  if(comboTimer>0){
    comboTimer--;
    document.getElementById('cfill').style.transform=`scaleX(${comboTimer/maxCT})`;
    if(comboTimer<=0){combo=0;document.getElementById('combo-ui').classList.remove('on');}
  }

  if(time%15===0){
    const wq=Math.floor(100-algae);
    document.getElementById('wv').textContent=wq+'%';
    document.getElementById('wvc').className='sval '+(wq<30?'v-warn':isHarmony?'v-harmony':'v-good');
    const d=document.getElementById('mdash');
    if(isHarmony)d.classList.add('harmony');else d.classList.remove('harmony');
  }

  if(time%300===0) tickOrders();
  if(time%1200===0) tickMarket();
  tickVisitor();

  // Passive coin loss for dirty tanks (WQ < 10% / Algae > 90)
  if(algae > 90 && time % 60 === 0 && fishList.length > 0) {
    // Economic Symmetry: At 100% algae, loss per second matches the maximum potential income of the tank's most valuable fish
    const maxVal = Math.max(...fishList.map(f => getPrice(f))) * 2.5 * 3.0; 
    const baseLoss = maxVal / 60; // Spread over 60 frames
    const scaling = Math.pow((algae - 89) / 11, 2); // Squared scaling from 91 -> 100
    const loss = Math.ceil(baseLoss * scaling * fishList.length);
    
    if(loss > 0) {
      coins = Math.max(0, coins - loss);
      document.getElementById('cv').textContent = formatCoins(coins);
      spawnJuice(W/2, H/3, `-${loss}`, '#ef4444', 0.9);
    }
  }
}

function triggerEat(f,fd,def){
  fd.eaten=true;f.hunger=100;f.eat=18;sm.feeds++;
  _lastActiveFeed=Date.now();
  giveXP(isHarmony?2:1);
  combo++;comboTimer=maxCT;
  sm.comboTaps = (sm.comboTaps||0) + 1;
  sm.maxCombo = Math.max(sm.maxCombo||0, combo);
  
  const cu=document.getElementById('combo-ui');cu.classList.add('on');
  let cm=1+Math.min(combo*.1,2);
  if(f._colorBonus?.bonus === 'comboMult') cm *= f._colorBonus.val;
  document.getElementById('ctxt').textContent=`Combo x${cm.toFixed(1)}`;
  cu.style.transform='translateX(-50%) scale(1.08)';setTimeout(()=>cu.style.transform='translateX(-50%) scale(1)',100);
  
  let isGold = false;
  for(const g of [...f.genes.c1, ...f.genes.c2]) if(g.includes('fbbf') || g.includes('eab3') || g.includes('f59e') || g.includes('fde0')) isGold = true;

  const rareMult  = f.isRare ? 2 : 1;
  const bondMult   = f.bonded > 0 ? 1.3 : 1;
  const heaterMult = UPGRADES.heater && UPGRADES.heater.owned > 0 ? 1.15 : 1;
  const flakesMult = UPGRADES.flakes.owned > 0 ? 1.5 : 1;
  const harmonyMult= isHarmony ? 1.3 : 1;
  let goldMult   = isGold ? 1.3 : 1;
  const isBredGold = isGold && f.isRare;
  if (isBredGold) goldMult = 20;
  
  // WQ < 10% (Algae > 90) yields 0. Linearly scales from 10% WQ to 100% WQ.
  const algaePen   = Math.max(0, (90 - algae) / 90);
  
  const rawMult    = rareMult * bondMult * heaterMult * flakesMult * harmonyMult * goldMult * algaePen;
  // If it's a Legendary (Bred Gold), we bypass the 2.5x cap to allow the full 20x+ bonus
  const cappedMult = isBredGold ? rawMult : Math.min(rawMult, 2.5); 
  let feedBonus = 1.0;
  if(f._colorBonus?.bonus === 'feedMult') feedBonus = f._colorBonus.val;
  const total = Math.ceil(def.val * cm * cappedMult * feedBonus);
  if (total > 0) {
    if (isBredGold) spawnJuice(f.x, f.y - 20, "LEGENDARY X20!", "#f59e0b", 1.5);
    addCoins(total, f.x, f.y, isHarmony || f.bonded>0 || isGold);
  }
  else spawnJuice(f.x, f.y, "Dirty Tank (0x)", "#ef4444", 0.8);
}

function updateFish(f){
  const def=TYPES[f.type];
  const trait = f.genes.trait[0];
  
  // ── PERF: Grounded Fin Phase: baseline oscillation + damped velocity factor
  const ts = (f.hunger < 30 ? 0.12 : 0.08) + (f.eat > 0 ? 0.12 : 0) + Math.min(0.20, Math.abs(f.vx) * 0.03);
  f.phase += ts;
  f.timer++;
  if(f.eat>0)f.eat--;
  if(f.bonded>0) {
    f.bonded--;
    if(f.timer%90===0) particles.push({x:f.x, y:f.y-20, vx:(Math.random()-.5)*1, vy:-1.5, life:1, c:'#fb7185'});
  }
  
  const now = Date.now();
  if (f.birthTime === undefined) { f.birthTime = now - (f.age || 0) * 16.666; delete f.age; }
  f.age = Math.floor((now - f.birthTime) / 16.666);
  // Faster growth: reaches 1.0 from 0.3 in ~23 seconds (approx 1400 ticks)
  f.scale = Math.min(1, 0.3 + f.age * 0.0005);
  
  if(f.bcd>0)f.bcd--;
  
  let hDrain = isHarmony ? 0.01 : 0.015;
  if(UPGRADES.oxygen && UPGRADES.oxygen.owned > 0) hDrain *= 0.8;
  if(trait === 'lazy') hDrain *= 0.8;
  if(trait === 'active') hDrain *= 1.2;
  f.hunger=Math.max(0,f.hunger-hDrain);
  
  const sm2=(f.hunger<25)?.6:(isHarmony?1.2:1);
  const mF = baseMaxFish + (UPGRADES.tank.owned*4);
  
  if(UPGRADES.nest.owned>0&&isHarmony&&f.age>3000&&f.scale>=1&&f.bcd<=0&&(fishList.length+eggs.length)<mF&&f.hunger>80){
    const mate=fishList.find(m=>m!==f&&m.type===f.type&&m.age>3000&&m.scale>=1&&m.bcd<=0&&m.hunger>80&&Math.hypot(m.x-f.x,m.y-f.y)<60);
    if(mate){
      f.bcd=8000;mate.bcd=8000;
      const childGenes = mendelianCross(f.genes, mate.genes, def, f, mate);
      if(childGenes.isRareMut) spawnJuice((f.x+mate.x)/2,f.y-20, ICONS.star + ' Mutation!','#fbcfe8',1.2);
      else spawnJuice((f.x+mate.x)/2,f.y-20, ICONS.egg + ' Egg','#fb7185',1);
      let sx = (f.x+mate.x)/2;
      for(let i=0; i<8; i++) {
        if(!eggs.some(e => Math.abs(e.x - sx) < 45)) break;
        sx += (Math.random() < 0.5 ? -45 : 45);
        if(sx < 50) sx = 50; if(sx > W-50) sx = W-50;
      }
      eggs.push({x:sx, y:FOOD_FL(sx), type:f.type, hatchTime:getEggHatchTime(f.type), genes:childGenes, isRareMut:childGenes.isRareMut});
      for(let b=0;b<3;b++)bubbles.push({x:f.x,y:f.y,r:3,spd:1.5,ph:0,life:1});
      updateHUD();
    }
  }

  let foodRadius = 300;
  if(trait === 'greedy') foodRadius = 450;
  if(trait === 'shy') foodRadius = 200;
  
  let best=null,bestD=Infinity;
  if(f.hunger<99){
    for(const fd of foodList){
      if(fd.eaten)continue;
      const d=Math.hypot(fd.x-f.x,fd.y-f.y);
      if(d<foodRadius&&d<bestD){bestD=d;best=fd;}
    }
  }
  
  let baseSpd = def.spd;
  if(trait === 'greedy' && f.hunger < 50) baseSpd *= 1.2;
  if(trait === 'active') baseSpd *= 1.15;
  if(trait === 'lazy') baseSpd *= 0.75;

  if(best){
    const dx=best.x-f.x,dy=best.y-f.y,d=Math.max(1,Math.hypot(dx,dy));
    f.vx+=(dx/d)*.8;f.vy+=(dy/d)*.6;
    const sp=Math.hypot(f.vx,f.vy),cap=baseSpd*3*sm2;
    if(sp>cap){f.vx*=cap/sp;f.vy*=cap/sp;}
    if(d<35*f.scale)triggerEat(f,best,def);
  }else{
    if(f.timer%120===0){
      if(trait === 'lazy' && Math.random() < 0.5) { f.vx *= 0.3; f.vy *= 0.3; }
      else { f.vx+=(Math.random()-.5)*baseSpd*2; f.vy+=(Math.random()-.5)*baseSpd; }
    }
    
    if(trait === 'shy') {
       for(const other of fishList) {
          if(other === f) continue;
          const od = Math.hypot(other.x - f.x, other.y - f.y);
          if(od < 60) { f.vx -= (other.x - f.x) * 0.002; f.vy -= (other.y - f.y) * 0.002; }
       }
    }

    if(Math.abs(f.vx)<baseSpd*.3)f.vx+=(f.vx>=0?.2:-.2);
  }
  
  f.vx*=.95;f.vy*=.95;f.x+=f.vx*sm2;f.y+=f.vy*sm2;
  const mx=40,ty=90,by=SWIM_BOT();
  
  if(f.x<mx){f.x=mx;f.vx=(Math.abs(f.vx)+0.2)*0.9;}
  if(f.x>W-mx){f.x=W-mx;f.vx=-(Math.abs(f.vx)+0.2)*0.9;}
  if(f.y<ty){f.y=ty;f.vy=(Math.abs(f.vy)+0.1)*0.9;}
  if(f.y>by){f.y=by;f.vy=-(Math.abs(f.vy)+0.1)*0.9;}
}

// VISUALS
function initDecor(){
  seaweeds=[];
  const n = Math.max(15, Math.floor(W/25));
  for(let i=0; i<n; i++) {
    const type = activeFlora.length > 0
      ? activeFlora[Math.floor(Math.random() * activeFlora.length)]
      : ownedFlora[Math.floor(Math.random() * ownedFlora.length)];
    let h = 40 + Math.random()*110;
    let hue = 130 + Math.random()*30;
    let sat = 40 + Math.random()*30;
    
    if(type === 'seaweed') {
      h = 35 + Math.random()*130;
      hue = 120 + Math.random()*45;
      sat = 35 + Math.random()*45;
    } else if(type === 'grass') {
      h = 20 + Math.random()*60;
      hue = 100 + Math.random()*30;
      sat = 50 + Math.random()*20;
    } else if(type === 'kelp') {
      hue = 260 + Math.random()*40;
    } else if(type === 'coral') {
      hue = 0 + Math.random()*25;
    }

    seaweeds.push({
      x: (i + .2 + Math.random()*.6) * (W/n),
      type,
      z: Math.random() > 0.5 ? 'front' : 'back',
      segs: 4 + Math.floor(Math.random()*4),
      h: h,
      ph: Math.random() * Math.PI*2,
      hue: hue,
      sat: sat,
      seeds: Array.from({length:6}, ()=>Math.random())
    });
  }
}

function updateSnail(s){
  s.timer++;
  if(Math.random()<.005){s.state=s.state==='moving'?'idle':'moving';if(Math.random()<.5)s.dir*=-1;}
  if(s.state==='moving'){
    if(s.wall==='floor'){
      s.x+=s.spd*s.dir; s.ph+=.08;
      if(s.x<10){ s.x=10; s.wall='left'; s.dir=1; }
      if(s.x>W-10){ s.x=W-10; s.wall='right'; s.dir=1; }
    } else if(s.wall==='left'){
      s.y-=s.spd*s.dir; s.ph+=.08;
      if(s.y<150){ s.y=150; s.dir=-1; }
      if(s.y>H-85){ s.y=H-85; s.wall='floor'; s.dir=1; s.x=15; }
    } else if(s.wall==='right'){
      s.y-=s.spd*s.dir; s.ph+=.08;
      if(s.y<150){ s.y=150; s.dir=-1; }
      if(s.y>H-85){ s.y=H-85; s.wall='floor'; s.dir=-1; s.x=W-15; }
    }
  }
  if(s.timer%450===0){addCoins(isHarmony?5:2,s.x,s.y-20,isHarmony);}
}

function drawSnail(s){
  ctx.save();
  if(s.wall==='floor'){ctx.translate(s.x,s.y);if(s.dir<0)ctx.scale(-1,1);}
  else if(s.wall==='left'){ctx.translate(s.x,s.y);ctx.rotate(Math.PI/2);if(s.dir>0)ctx.scale(-1,1);}
  else{ctx.translate(s.x,s.y);ctx.rotate(-Math.PI/2);if(s.dir<0)ctx.scale(-1,1);}
  
  const sy = s.state==='moving' ? Math.abs(Math.sin(s.ph))*1.5 : 0;
  
  ctx.beginPath();ctx.ellipse(2, -3, 16, 5, 0, 0, Math.PI*2);ctx.fillStyle='#a1a1aa';ctx.fill();
  
  ctx.beginPath();ctx.moveTo(12,-4);ctx.quadraticCurveTo(18,-8, 20,-12);
  ctx.moveTo(14,-2);ctx.quadraticCurveTo(20,2, 22,6);
  ctx.strokeStyle='#a1a1aa';ctx.lineWidth=2;ctx.stroke();

  drawEye(ctx, 16, -4, 2);

  const cx = -3, cy = -12 - sy;
  const sg = ctx.createRadialGradient(cx-4, cy-4, 2, cx, cy, 16);
  s.hue = (s.hue || Math.random()*360) + 0.05;
  sg.addColorStop(0, `hsl(${s.hue%360}, 90%, 75%)`);
  sg.addColorStop(1, `hsl(${(s.hue-40)%360}, 100%, 35%)`);

  ctx.beginPath();
  ctx.ellipse(cx, cy, 15, 13, -Math.PI/12, 0, Math.PI*2);
  ctx.fillStyle = sg; ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = `rgba(0,0,0,0.5)`; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  const revs = 2.5;
  for(let i=0; i<=revs*20; i++) {
     const t = (i / (revs*20)) * Math.PI * 2 * revs;
     const r = 14 * (1 - t/(Math.PI*2*revs));
     const sx = cx + r * Math.cos(t + Math.PI/2);
     const sy2 = cy + r * Math.sin(t + Math.PI/2) * 0.85; 
     if(i===0) ctx.moveTo(sx, sy2);
     else ctx.lineTo(sx, sy2);
  }
  ctx.stroke();

  ctx.restore();
}

function drawEye(ctx, ex, ey, esz) {
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ex, ey, esz, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(ex+esz*.2, ey, esz*.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(ex+esz*.4, ey-esz*.2, esz*.2, 0, Math.PI*2); ctx.fill();
}

function drawExclamation(ctx, x, y, size) {
  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(x-size*.15, y-size*.5, size*.3, size*.6);
  ctx.beginPath(); ctx.arc(x, y+size*.4, size*.15, 0, Math.PI*2); ctx.fill();
}

function drawHeart(ctx, x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size*.3);
  ctx.bezierCurveTo(x - size, y - size*.5, x - size*.3, y - size, x, y - size*.4);
  ctx.bezierCurveTo(x + size*.3, y - size, x + size, y - size*.5, x, y + size*.3);
  ctx.fill();
}

function drawFish(f){
  if(!f.genes || !f.genes.c1 || !f.genes.c2) return;
  const def=TYPES[f.type],dir=f.vx>=0?1:-1,s=def.sz,eating=f.eat>0;
  // Use accumulated phase to prevent flickering (Ground logic speed)
  const wag = Math.sin(f.phase) * (s * 0.35);
  const paddle = Math.sin(f.phase * 2.5) * s * 0.12; 
  const br = 1 + Math.sin(f.phase * 0.4) * 0.02;
  
  const fs = f.scale * (f.genes.szMod||1) * getGlobalLevelScale();
  ctx.save();ctx.translate(f.x,f.y);ctx.scale(fs,fs);
  
  if(f.hunger<25){
    drawExclamation(ctx, 0, -s-15, 11);
  }
  
  if(f.bonded > 0 && f.scale >= 1) {
    drawHeart(ctx, 0, -s-22, 10, '#fb7185');
  }

  const ang=Math.atan2(f.vy,Math.abs(f.vx)+.1);
  if(dir<0)ctx.scale(-1,1);
  ctx.rotate(ang*.5);ctx.scale(1,br);
  
  const bg=ctx.createLinearGradient(0,-s,0,s);
  bg.addColorStop(0, f.genes.c1[0]);
  bg.addColorStop(0.5, f.genes.c1[0]);
  bg.addColorStop(1, f.genes.c2[0]);

  if(f.type==='guppy'){
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.moveTo(-s*.2,0);
    ctx.bezierCurveTo(-s*1.5, -s*1.2, -s*1.8, -s+wag*1.5, -s*2.2, wag*2);
    ctx.bezierCurveTo(-s*1.8, s+wag*1.5, -s*1.5, s*1.2, -s*.2, 0);
    ctx.fill();
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=1;
    for(let i=-3; i<=3; i++){
      ctx.beginPath(); ctx.moveTo(-s*.2, 0);
      ctx.quadraticCurveTo(-s*1.2, i*s*.2, -s*2, i*s*.3 + wag*2); ctx.stroke();
    }
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,s*.8,s*.35,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=f.genes.c1[0];
    for(let i=0; i<6; i++) {
       ctx.beginPath(); ctx.arc(-s*.4 + i*s*.15, Math.sin(i*2)*s*.1, s*.06, 0, Math.PI*2); ctx.fill();
    }
    drawEye(ctx, s*.4, -s*.05, s*.12);
    ctx.fillStyle=f.genes.c2[0]+'bd';
    ctx.beginPath();ctx.ellipse(s*.1, s*.1, s*.3, s*.15, Math.PI/6 + paddle*.1, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='tetra'){
    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.moveTo(-s*.8,0);ctx.lineTo(-s*1.5,-s*.5+wag);ctx.lineTo(-s*1.5,s*.5+wag);ctx.fill();
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath();ctx.ellipse(0,0,s*.9,s*.28,0,0,Math.PI*2);ctx.fill();
    
    ctx.save();
    ctx.beginPath();ctx.ellipse(0,0,s*.9,s*.28,0,0,Math.PI*2);ctx.clip();
    const rg=ctx.createLinearGradient(0,0,0,s*.3);
    rg.addColorStop(0, 'rgba(255,0,0,0)'); rg.addColorStop(1, '#ef4444');
    ctx.fillStyle=rg; ctx.fillRect(-s,0,s*2,s);
    ctx.restore();

    ctx.strokeStyle=f.genes.c1[0]; ctx.lineWidth=s*.12; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(s*.6, -s*.05);
    ctx.quadraticCurveTo(0, -s*.1, -s*.9, 0); ctx.stroke();
    
    drawEye(ctx, s*.5, -s*.05, s*.08);
  }
  else if(f.type==='seahorse'){
    const bob = Math.sin(f.phase*0.8)*s*0.08;
    ctx.translate(0, bob);
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.arc(-s*.2, s*.8, s*.3, 0, Math.PI);ctx.fill(); 
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=1;
    for(let i=0; i<4; i++){ ctx.beginPath(); ctx.moveTo(-s*.2, s*.8); ctx.lineTo(-s*.2 - s*.3 + i*s*.2, s*1.1); ctx.stroke(); }
    
    ctx.fillStyle=bg;
    ctx.beginPath();
    ctx.moveTo(s*.2, -s*.6); 
    ctx.quadraticCurveTo(-s*.3, -s*.2, -s*.3, s*.3);
    ctx.quadraticCurveTo(-s*.6, s*1.2, 0, s*1.2);
    let tx=0, ty=s*1.2;
    for(let r=0; r<=Math.PI*2.5; r+=0.2){
       const rad = s*.4 * (1 - r/(Math.PI*2.5));
       tx = 0 + rad * Math.cos(r + Math.PI/2 - paddle*0.2);
       ty = s*1.4 + rad * Math.sin(r + Math.PI/2 - paddle*0.2);
       ctx.lineTo(tx, ty);
    }
    ctx.quadraticCurveTo(s*.3, s*1.2, -s*.1, s*.4);
    ctx.quadraticCurveTo(s*.5, -s*.2, s*.4, -s*.3);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.moveTo(s*.1, -s*.6); ctx.lineTo(s*.15, -s*.8); ctx.lineTo(s*.25, -s*.7); ctx.lineTo(s*.3, -s*.9); ctx.lineTo(s*.35, -s*.6); ctx.fill();

    ctx.strokeStyle=f.genes.c1[0]+'88'; ctx.lineWidth=1.5;
    for(let i=0;i<6;i++){ ctx.beginPath();ctx.moveTo(-s*.3, s*.4-i*s*.18);ctx.lineTo(s*.1, s*.4-i*s*.18);ctx.stroke(); }
    
    drawEye(ctx, s*.2, -s*.45, s*.06);
    ctx.fillStyle=f.genes.c2[0]+'99';
    ctx.beginPath();ctx.ellipse(-s*.1, s*.1, s*.12, s*.18, -paddle*.5, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='goldfish'){
    ctx.fillStyle=f.genes.c2[0]+'66';
    ctx.beginPath();ctx.moveTo(-s*.2,0);
    ctx.bezierCurveTo(-s*1.2, -s*.6+wag, -s*1.8, -s*1.4+wag*1.5, -s*2.2, wag*0.5);
    ctx.bezierCurveTo(-s*1.5, s*1.4+wag*1.5, -s*1.2, s*.6+wag, -s*.2, 0); ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*.2,0);
    ctx.bezierCurveTo(-s*1.3, -s*.2+wag*0.5, -s*1.6, -s*.8+wag, -s*2, wag*1.2);
    ctx.bezierCurveTo(-s*1.6, s*.8+wag, -s*1.3, s*.2+wag*0.5, -s*.2, 0); ctx.fill();
    
    ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,s*1.1,s*.6,0,0,Math.PI*2); ctx.fill();
    
    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();
    ctx.moveTo(s*.4, -s*.4);
    for(let i=0; i<6; i++) {
       const a = (i/5)*Math.PI - Math.PI/2;
       ctx.arc(s*.6 + Math.cos(a)*s*.3, -s*.2 + Math.sin(a)*s*.4, s*.15, 0, Math.PI*2);
    }
    ctx.fill();

    drawEye(ctx, s*.7, -s*.1, s*.12);
    ctx.fillStyle=f.genes.c2[0]+'99';
    ctx.beginPath();ctx.ellipse(s*.2, s*.2, s*.4, s*.2, Math.PI/4 + paddle*.1, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='angelfish'){
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-s*1.8,-s*1.5+wag*.5);ctx.lineTo(-s*.2,0);ctx.lineTo(-s*1.8,s*1.5+wag*.5);ctx.fill();
    
    ctx.fillStyle=bg;
    const bp = new Path2D(); bp.ellipse(0,0,s*.6,s*.9,0,0,Math.PI*2); ctx.fill(bp);

    ctx.save(); ctx.clip(bp);
    ctx.fillStyle='#0f172a';
    for(let i=-1; i<=1; i++){
       ctx.beginPath(); ctx.moveTo(i*s*.2, -s);
       ctx.quadraticCurveTo(i*s*.3, 0, i*s*.2, s);
       ctx.lineTo(i*s*.2 - s*.1, s);
       ctx.quadraticCurveTo(i*s*.3 - s*.1, 0, i*s*.2 - s*.1, -s); ctx.fill();
    }
    ctx.restore();

    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0, s*.8);ctx.quadraticCurveTo(-s*.5, s*2.5, -s+wag*2, s*3);ctx.stroke();
    ctx.lineWidth=1; 
    ctx.beginPath(); ctx.moveTo(-s*.1, s*.8); ctx.quadraticCurveTo(-s*.6, s*2.4, -s*1.1+wag*2, s*2.8); ctx.stroke();

    drawEye(ctx, s*.25, -s*.2, s*.08);
    ctx.fillStyle=f.genes.c2[0]+'66';
    ctx.beginPath();ctx.ellipse(s*.1, 0, s*.2, s*.4, Math.PI/4 + paddle*.05, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='discus'){
    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.moveTo(-s*.6,0);ctx.lineTo(-s*1.5,-s*.8+wag);ctx.lineTo(-s*1.5,s*.8+wag);ctx.fill();
    ctx.fillStyle=bg; ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();

    ctx.save();
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.clip();
    ctx.strokeStyle=f.genes.c1[0]+'99'; ctx.lineWidth=2; ctx.lineCap='round';
    for(let i=-5; i<=5; i++){
      ctx.beginPath();
      for(let x=-s; x<=s; x+=s*.2){
         const y = i*s*.18 + Math.sin(x*0.1 + f.id)*s*.08;
         if(x===-s) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    for(let i=-5; i<=5; i++){
      ctx.beginPath();
      for(let y=-s; y<=s; y+=s*.2){
         const x = i*s*.18 + Math.cos(y*0.1 + f.id*2)*s*.08;
         if(y===-s) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.restore();

    drawEye(ctx, s*.6, -s*.1, s*.1);
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath();ctx.ellipse(0, s*.6, s*.4, s*.2, paddle*.2, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='lionfish'){
    ctx.strokeStyle=f.genes.c1[0]; ctx.lineCap='round';
    for(let i=0; i<9; i++){
      const a = -Math.PI/2 + (i/8)*Math.PI; 
      const r = s*1.5 + Math.sin(f.phase*0.6+i)*s*.15;
      ctx.lineWidth=4; ctx.strokeStyle=f.genes.c1[0];
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.stroke();
      ctx.lineWidth=2; ctx.strokeStyle=f.genes.c2[0];
      ctx.setLineDash([s*.2, s*.2]);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.fillStyle=bg; 
    ctx.beginPath(); ctx.ellipse(0,0,s*.9,s*.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=f.genes.c1[0]+'aa';
    ctx.beginPath();ctx.moveTo(0, s*.2);
    for(let i=0; i<=5; i++){
       const a = (i/5)*Math.PI*0.8;
       ctx.lineTo(-s*1.2 + Math.cos(a)*s*1.5, s*0.2 + Math.sin(a)*s*1.5 + paddle*2);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=1;
    for(let i=0; i<=5; i++){
       const a = (i/5)*Math.PI*0.8;
       ctx.beginPath(); ctx.moveTo(0, s*.2); ctx.lineTo(-s*1.2 + Math.cos(a)*s*1.5, s*0.2 + Math.sin(a)*s*1.5 + paddle*2); ctx.stroke();
    }

    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(s*.8, -s*.2); ctx.quadraticCurveTo(s*1.2, -s*.4, s*1.4, Math.sin(time*0.1)*s*.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.7, s*.2); ctx.quadraticCurveTo(s*.9, s*.5, s*1.1, s*.4 + Math.sin(time*0.1)*s*.1); ctx.stroke();

    drawEye(ctx, s*.5, -s*.15, s*.1);
  }
  else if(f.type==='idol'){
    ctx.fillStyle=f.genes.c2[0]+'cc'; 
    ctx.beginPath();ctx.moveTo(-s*.7,0);ctx.lineTo(-s*1.2,-s*.4+wag);ctx.lineTo(-s*1.2,s*.4+wag);ctx.fill();
    ctx.fillStyle=bg; 
    const mb = new Path2D(); mb.ellipse(0,0,s*.8,s,0,0,Math.PI*2); ctx.fill(mb);
    ctx.save(); ctx.clip(mb);
    ctx.fillStyle=f.genes.c2[0];
    ctx.fillRect(-s*.3, -s, s*.25, s*2); ctx.fillRect(s*.2, -s, s*.15, s*2);
    ctx.restore();
    
    ctx.strokeStyle='#f8fafc'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0, -s*.9); 
    ctx.bezierCurveTo(-s*1, -s*2, -s*2.5+wag, -s*1.5+paddle, -s*3.5+wag*2, -s*1.2-paddle);
    ctx.stroke();

    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath(); ctx.moveTo(s*.5, -s*.3); 
    ctx.quadraticCurveTo(s*.8, -s*.3, s*1.4, -s*.1); 
    ctx.lineTo(s*1.4, s*.15); 
    ctx.quadraticCurveTo(s*.8, s*.3, s*.5, s*.3); ctx.fill();
    
    ctx.fillStyle=f.genes.c2[0];
    ctx.beginPath(); ctx.ellipse(s*1.4, 0, s*.1, s*.15, 0, 0, Math.PI*2); ctx.fill();

    drawEye(ctx, s*.4, -s*.3, s*.08);
  }
  else if(f.type==='betta'){
    ctx.fillStyle=f.genes.c2[0]+'77';
    ctx.beginPath();ctx.moveTo(s*.2,-s*.1);ctx.bezierCurveTo(-s*.5, -s*2.5+wag, -s*2, -s*1.5, -s*1.8,-s*.5);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*.2,s*.1);ctx.bezierCurveTo(-s*.5, s*2.5+wag, -s*2, s*1.5, -s*1.8,s*.5);ctx.fill();
    ctx.fillStyle=f.genes.c1[0]+'99';
    ctx.beginPath();ctx.moveTo(-s*.4,0);ctx.bezierCurveTo(-s*1.5,-s*2+wag*2,-s*3.5,-s*.5+wag*1.5,-s*2.5,0);ctx.bezierCurveTo(-s*3.5,s*.5+wag*1.5,-s*1.5,s*2+wag*2,-s*.4,0);ctx.fill();
    
    ctx.strokeStyle=f.genes.c1[0]+'bb'; ctx.lineWidth=1;
    for(let i=0; i<5; i++){
       ctx.beginPath(); ctx.moveTo(0,-s*.2); ctx.quadraticCurveTo(-s*.5 - i*s*.2, -s*1.5 + wag, -s*1.5 - i*s*.1, -s*1); ctx.stroke();
       ctx.beginPath(); ctx.moveTo(0,s*.2); ctx.quadraticCurveTo(-s*.5 - i*s*.2, s*1.5 + wag, -s*1.5 - i*s*.1, s*1); ctx.stroke();
    }

    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.moveTo(-s*.7, 0); ctx.quadraticCurveTo(0, -s*.4, s*.7, -s*.2); 
    ctx.quadraticCurveTo(s*.8, -s*.3, s*.9, -s*.2); 
    ctx.lineTo(s*.8, s*.1); 
    ctx.quadraticCurveTo(s*.6, s*.4, 0, s*.4); 
    ctx.quadraticCurveTo(-s*.5, s*.3, -s*.7, 0);
    ctx.fill();

    drawEye(ctx, s*.5, -s*.1, s*.08);
    ctx.strokeStyle=f.genes.c2[0]; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(s*.3, s*.3); ctx.quadraticCurveTo(s*.1, s+paddle, -s*.2, s*1.2+paddle*2); ctx.stroke();

    ctx.fillStyle=f.genes.c2[0]+'aa';
    ctx.beginPath();ctx.ellipse(s*.2, s*.1, s*.3, s*.15, Math.PI/6 + paddle*.2, 0, Math.PI*2);ctx.fill();
  }
  else if(f.type==='jellyfish'){
    const pulse = Math.abs(Math.sin(time*0.05 + f.id));
    const w = s*.7 * (1 + pulse*0.3);
    const h = s*.5 * (1 - pulse*0.1);
    
    ctx.strokeStyle = f.genes.c1[0] + '44'; ctx.lineWidth = s*.1;
    for(let i=-3; i<=3; i++){
      ctx.beginPath(); ctx.moveTo(i*s*.15, -s*.2);
      ctx.quadraticCurveTo(i*s*.4, s*.5+wag*1.5, i*s*.2, s*1.8+wag);
      ctx.stroke();
    }
    ctx.fillStyle = f.genes.c2[0] + '88';
    ctx.beginPath();
    ctx.moveTo(-w, -s*.2);
    ctx.bezierCurveTo(-w, -s*.2-h*1.5, w, -s*.2-h*1.5, w, -s*.2);
    ctx.quadraticCurveTo(0, -s*.2 + pulse*s*.2, -w, -s*.2);
    ctx.fill();
    
    ctx.strokeStyle = f.genes.c1[0] + 'cc';
    ctx.lineWidth = 1.5;
    for(let i=0; i<4; i++){
      const a = (i/4)*Math.PI*2 + time*0.02;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*s*.2, -s*.3 + Math.sin(a)*s*.1, s*.15, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  else if(f.type==='octopus'){
    ctx.strokeStyle=bg; ctx.lineCap='round'; ctx.lineJoin='round';
    for(let i=0; i<4; i++){
      ctx.lineWidth = s*.2;
      const a = (i/3)*Math.PI*0.8 - Math.PI*0.4;
      ctx.beginPath(); ctx.moveTo(0, s*.2);
      ctx.quadraticCurveTo(Math.cos(a)*s, s+wag*(i%2?-1:1), Math.cos(a)*s*1.2, s*1.8+wag);
      ctx.stroke();
    }
    
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(-s*.3, -s*.2, s*.8, s*.6, -Math.PI/12, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*.3, 0, s*.5, s*.4, Math.PI/12, 0, Math.PI*2);ctx.fill();

    ctx.strokeStyle=f.genes.c2[0];
    for(let i=0; i<4; i++){
      ctx.lineWidth = s*.15;
      const a = (i/3)*Math.PI*0.9 - Math.PI*0.45;
      ctx.beginPath(); ctx.moveTo(s*.1, s*.3);
      ctx.quadraticCurveTo(Math.cos(a)*s*1.5, s+wag*(i%2?1:-1), Math.cos(a)*s*1.8 + wag, s*1.5);
      ctx.stroke();
    }
    
    drawEye(ctx, s*.5, -s*.1, s*.08);
  }
  else if(f.type==='turtle'){
    const hdY = Math.sin(time*0.05+f.id)*s*.05;
    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.ellipse(-s*.7, s*.2, s*.3, s*.12, Math.PI/6 + paddle*.4, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*.3, s*.4, s*.5, s*.15, Math.PI/4 + paddle*.2, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*.9, hdY, s*.35, s*.25, -Math.PI/12, 0, Math.PI*2);ctx.fill();
    
    ctx.fillStyle=f.genes.c2[0] + 'ee';
    ctx.beginPath();ctx.ellipse(0, s*.1, s*.9, s*.2, 0, 0, Math.PI*2);ctx.fill();
    
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0, s*.1, s*.95, s*.5, 0, Math.PI, Math.PI*2);
    ctx.closePath(); ctx.fill();
    
    ctx.strokeStyle=f.genes.c2[0] + '66'; ctx.lineWidth = Math.max(1, s*0.05);
    ctx.beginPath(); ctx.moveTo(-s*.8, -s*.1); ctx.quadraticCurveTo(0, -s*.3, s*.8, -s*.1); ctx.stroke();
    for(let i=-1; i<=1; i++){
      ctx.beginPath(); ctx.moveTo(i*s*.4, -s*.4); ctx.quadraticCurveTo(i*s*.45, -s*.1, i*s*.35+s*.1, s*.1); ctx.stroke();
    }
    
    drawEye(ctx, s*1.0, hdY - s*.05, s*.06);
  }
  else if(f.type==='whaleshark'){
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,s*2,s*.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff3';
    for(let i=0;i<12;i++){ctx.beginPath();ctx.arc(-s+Math.random()*s*2, -s*.4+Math.random()*s*.8, 2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.moveTo(-s*1.5, 0); ctx.lineTo(-s*2.2, -s*.6+wag); ctx.lineTo(-s*2.2, s*.6+wag); ctx.closePath(); ctx.fill();
    drawEye(ctx, s*1.8, -s*.2, s*.05);
  }
  else if(f.type==='narwhal'){
    ctx.fillStyle=bg;
    ctx.beginPath();
    ctx.moveTo(-s*1.5, 0);
    ctx.bezierCurveTo(-s, -s*.8, s*.8, -s*.8, s*1.4, -s*.2);
    ctx.quadraticCurveTo(s*1.5, s*.1, s*1.2, s*.3);
    ctx.bezierCurveTo(s*.5, s*.6, -s, s*.5, -s*1.5, 0);
    ctx.fill();

    ctx.fillStyle=f.genes.c1[0];
    for(let i=0; i<15; i++){
       ctx.beginPath();
       ctx.arc(-s + Math.random()*s*2, -s*.2 - Math.random()*s*.4, s*.04 + Math.random()*s*.04, 0, Math.PI*2);
       ctx.fill();
    }

    ctx.strokeStyle='#f8fafc'; ctx.lineWidth=s*.08; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(s*1.4, -s*.1); ctx.lineTo(s*3.2, -s*.3); ctx.stroke();
    ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0; i<12; i++){
       const tx = s*1.4 + (i/12)*(s*1.8);
       const ty = -s*.1 - (i/12)*(s*.2);
       ctx.moveTo(tx, ty - s*.04); ctx.lineTo(tx + s*.08, ty + s*.04);
    }
    ctx.stroke();

    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.ellipse(s*.2, s*.4, s*.3, s*.1, Math.PI/4 + paddle*.2, 0, Math.PI*2);ctx.fill();

    ctx.fillStyle=f.genes.c1[0];
    ctx.beginPath();ctx.moveTo(-s*1.3, 0); ctx.lineTo(-s*2, -s*.5+wag); ctx.lineTo(-s*2, s*.5+wag); ctx.closePath(); ctx.fill();

    drawEye(ctx, s*1.1, -s*.05, s*.05);
  }
  
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = s*0.1;
  ctx.beginPath();
  if(f.type==='angelfish') ctx.ellipse(0,0,s*.5,s*.8,0, Math.PI, Math.PI*1.5);
  else ctx.ellipse(0,0,s*.7,s*.25,0, Math.PI, Math.PI*1.5);
  ctx.stroke();

  ctx.restore();
}

function drawFishName(f){
  if(!f.name||!f._nameTs) return;
  const elapsed=Date.now()-f._nameTs;
  if(elapsed>3500) return;
  const alpha=elapsed>2800?Math.max(0,1-(elapsed-2800)/700):1;
  const def=TYPES[f.type];
  const s=def?def.sz:20;
  const fs=f.scale*(f.genes?.szMod||1)*getGlobalLevelScale();
  const yOff=s*fs+14;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.font='bold 10px system-ui,sans-serif';
  ctx.textAlign='center';
  const tw=ctx.measureText(f.name).width;
  ctx.fillStyle='rgba(0,10,25,0.65)';
  ctx.beginPath();
  ctx.roundRect(f.x-tw/2-6,f.y-yOff-13,tw+12,16,8);
  ctx.fill();
  ctx.fillStyle=f.isRare?'#fbbf24':'#f8fafc';
  ctx.fillText(f.name,f.x,f.y-yOff);
  ctx.restore();
}

// Caching for performance
let cachedTheme = null;
function refreshThemeCache() {
  const root = document.documentElement;
  cachedTheme = {
    top: getComputedStyle(root).getPropertyValue('--water-top').trim(),
    bot: getComputedStyle(root).getPropertyValue('--water-bot').trim()
  };
}
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', refreshThemeCache);
refreshThemeCache();

function updateEliteTimerUI() {
  const el = document.getElementById('daily-timer');
  if(el) {
    const now = new Date();
    const midnight = new Date(now).setHours(24,0,0,0);
    if(lastEliteTs && lastEliteTs < new Date(now).setHours(0,0,0,0)) {
      el.innerHTML = `New Elite Daily Available!`;
    } else {
      const diff = midnight - now;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const pad = x => x.toString().padStart(2, '0');
      el.innerHTML = `Next Elite Daily refresh in: <span style="color:var(--ui-accent); margin-left:4px; font-family:monospace; font-size:12px;">${pad(h)}:${pad(m)}:${pad(s)}</span>`;
    }
  }

  let rebuild = false;
  document.querySelectorAll('.c-timer').forEach(tel => {
    const t = parseInt(tel.getAttribute('data-t'));
    const wait = Math.max(0, t - Date.now());
    if(wait <= 0 && t > 0) { rebuild = true; tel.setAttribute('data-t', '0'); } 
    else if (wait > 0) {
      const m = Math.floor(wait / 60000);
      const s = Math.floor((wait % 60000) / 1000).toString().padStart(2, '0');
      tel.textContent = `${m}:${s}`;
    }
  });
  if(rebuild) {
    document.getElementById('nb-orders').classList.add('notify');
    buildOrders();
  }
}

// GAME LOOP
function loop(frameTs){
try {
  if(!_loopRunning){requestAnimationFrame(loop);return;}
  // ── PERF: Delta-time ── advance `time` at a consistent 60fps-equivalent rate
  if(!frameTs) frameTs = performance.now();
  if(!_lastFrame) _lastFrame = frameTs;
  const dtMs = Math.min(frameTs - _lastFrame, 50); // cap at 50ms to avoid spiral
  _lastFrame = frameTs;
  _dtAcc += dtMs;
  const ticks = Math.floor(_dtAcc / 16.666); // 60fps = 16.666ms per tick
  _dtAcc -= ticks * 16.666;
  
  if(!W || !H || cv.width < 10) {
    resize();
    if(!W || !H) { requestAnimationFrame(loop); return; }
  }

  for(let i=0; i<ticks; i++){
    time++;
    updateEco();
    for(const f of fishList) updateFish(f);
    if(time%60===0) { checkMilestones(); updateEliteTimerUI(); }
  }
  updateVisitors();
  
  ctx.clearRect(0,0,W,H);

  // ── PERF: Cached water gradient (rebuild when algae or theme changes) ──
  // ── Dirty water now works on ALL themes, not just default ──
  const algaeInt = Math.floor(algae);
  if(!_waterGrad || algaeInt !== _waterGradAlgae || curTheme !== _waterGradTheme) {
    _waterGradAlgae = algaeInt;
    _waterGradTheme = curTheme;
    _waterGrad = ctx.createLinearGradient(0,0,0,H);
    let theme = THEMES[curTheme] || THEMES['default'];
    if(curTheme === 'default') {
      const hr = new Date().getHours();
      const isDay = hr >= 7 && hr < 19;
      if(isDay) theme = {c1:'#0284c7', c2:'#0369a1', c3:'#082f49'};
    }
    const dirtyPct = Math.min(1, algae / 100);
    const lerpC = (a,b,t) => Math.round(a + (b-a)*t);
    const parseHex = (h) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    // Dirty targets: murky green -> putrid brown
    const dirtyMid = [40, 60, 20];
    const dirtyEnd = [55, 30, 8];
    const [tr1,tg1,tb1] = parseHex(theme.c1);
    const [tr2,tg2,tb2] = parseHex(theme.c2);
    const [tr3,tg3,tb3] = parseHex(theme.c3);
    const phase = Math.min(1, dirtyPct * 1.5);
    const r1 = lerpC(tr1, dirtyPct<0.5?dirtyMid[0]:dirtyEnd[0], phase);
    const g1 = lerpC(tg1, dirtyPct<0.5?dirtyMid[1]:dirtyEnd[1], phase);
    const b1 = lerpC(tb1, dirtyPct<0.5?dirtyMid[2]:dirtyEnd[2], phase);
    const phase2 = Math.min(1, dirtyPct * 2);
    const r2 = lerpC(tr2, dirtyPct<0.5?dirtyMid[0]+10:dirtyEnd[0]+20, phase2);
    const g2 = lerpC(tg2, dirtyPct<0.5?dirtyMid[1]-10:dirtyEnd[1]+5,  phase2);
    const b2 = lerpC(tb2, dirtyPct<0.5?dirtyMid[2]:dirtyEnd[2],       phase2);
    const r3 = lerpC(tr3, dirtyPct<0.5?25:50, phase2);
    const g3 = lerpC(tg3, dirtyPct<0.5?15:10, phase2);
    const b3 = lerpC(tb3, dirtyPct<0.5?5:0,   phase2);
    _waterGrad.addColorStop(0,   `rgb(${r1},${g1},${b1})`);
    _waterGrad.addColorStop(0.5, `rgb(${r2},${g2},${b2})`);
    _waterGrad.addColorStop(1,   `rgb(${r3},${g3},${b3})`);
  }
  ctx.fillStyle=_waterGrad;ctx.fillRect(0,0,W,H);

  // Putrid water murk overlay (appears below 30% cleanliness)
  if(algae > 70) {
    const murkAlpha = Math.min(0.35, (algae - 70) / 100);
    ctx.fillStyle = `rgba(40, 60, 10, ${murkAlpha})`;
    ctx.fillRect(0, 0, W, H);
    // Floating murk particles
    if(time % 4 === 0 && particles.length < 200) {
      particles.push({x:Math.random()*W, y:H-90, vx:(Math.random()-.5)*.3, vy:-0.4-Math.random()*.3, life:1, c:'rgba(60,90,20,0.4)', sz:Math.random()*6+2, murk:true});
    }
  }

  // Marine Snow
  const ERA_SNOW = [0.3, 0.5, 0.7, 0.9, 1.1, 1.4];
  const eraSnowMult = ERA_SNOW[currentEra] || 1.0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for(let i=0;i<marineSnow.length;i++){
    const p=marineSnow[i];
    p.y -= p.v; p.x += Math.sin(time*0.01 + i)*0.2;
    if(p.y < -10) p.y = H+10;
    if(p.x < -10) p.x = W+10; if(p.x > W+10) p.x = -10;
    ctx.globalAlpha = Math.min(1, p.o * eraSnowMult);
    const flakeSize = p.s * (currentEra >= 5 ? 1.5 : 1.0);
    ctx.beginPath(); ctx.arc(p.x, p.y, flakeSize, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── PERF: Cached light ray gradients — tinted per theme (rebuild on resize/theme change) ──
  const themeRayColor = {
    default:'rgba(255,255,255,.08)', reef:'rgba(100,230,255,.12)', sunset:'rgba(255,180,80,.10)',
    abyss:'rgba(0,0,0,0)', aurora:'rgba(80,255,180,.10)', lava:'rgba(255,100,30,.10)',
    biolume:'rgba(0,255,220,.08)', sakura:'rgba(255,160,200,.10)'
  }[curTheme] || 'rgba(255,255,255,.06)';
  const themeRayFade = curTheme === 'abyss' ? 'rgba(0,0,0,0)' : 'rgba(255,255,255,0)';
  if(!_rayGrads || _rayW !== W || _rayH !== H || _waterGradTheme !== curTheme) {
    _rayW = W; _rayH = H;
    _rayGrads = [];
    for(let i=0;i<4;i++){
      const rg=ctx.createLinearGradient(0,0,0,H);
      rg.addColorStop(0,themeRayColor);rg.addColorStop(1,themeRayFade);
      _rayGrads.push(rg);
    }
  }
  // Abyss has no rays — dark deep sea
  if(curTheme !== 'abyss') {
    ctx.globalCompositeOperation='screen';
    for(let i=0;i<4;i++){
      ctx.beginPath();const rx=(W/4)*i+Math.sin(time*.005+i)*60;
      ctx.moveTo(rx,0);ctx.lineTo(rx-120,H);ctx.lineTo(rx+180,H);
      ctx.fillStyle=_rayGrads[i];ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }

  if(algae>0){ctx.fillStyle=`rgba(34,139,34,${algae*.003})`;ctx.fillRect(0,0,W,H);}
  if(isHarmony){ctx.fillStyle='rgba(251,191,36,.055)';ctx.fillRect(0,0,W,H);}

  // ── THEME AMBIENT EFFECTS ──
  if(curTheme === 'lava') {
    // Orange/red glow rising from floor
    const lavG = ctx.createLinearGradient(0, H-120, 0, H);
    lavG.addColorStop(0,'rgba(255,80,10,0)'); lavG.addColorStop(1,'rgba(200,30,0,0.45)');
    ctx.fillStyle = lavG; ctx.fillRect(0, H-120, W, 120);
    // Ember particles spawn
    if(time%3===0 && particles.length < 300)
      particles.push({x:Math.random()*W, y:H-85, vx:(Math.random()-.5)*1.5, vy:-1.2-Math.random()*2, life:0.8+Math.random()*0.4, c:`hsla(${15+Math.random()*25},100%,${50+Math.random()*30}%,1)`});
    // Crack glow lines at bottom
    ctx.globalCompositeOperation='screen';
    ctx.strokeStyle='rgba(255,100,20,0.12)'; ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      const cx=W*0.1+W*0.8*(i/4), spread=30+Math.sin(time*0.03+i)*15;
      ctx.beginPath(); ctx.moveTo(cx-spread,H-85); ctx.lineTo(cx,H-75); ctx.lineTo(cx+spread,H-85); ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
  }
  else if(curTheme === 'aurora') {
    // Sweeping vertical aurora beams
    ctx.globalCompositeOperation='screen';
    const aColors = ['rgba(0,255,150,.06)','rgba(0,180,255,.05)','rgba(150,0,255,.04)','rgba(0,255,100,.05)'];
    for(let i=0;i<4;i++){
      const bx = (W*0.15)*i + W*0.1 + Math.sin(time*0.003+i*1.3)*W*0.1;
      const ag = ctx.createLinearGradient(bx, 0, bx, H*0.7);
      ag.addColorStop(0, aColors[i]); ag.addColorStop(0.5, aColors[(i+1)%4]); ag.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.moveTo(bx-80,0); ctx.lineTo(bx+80,0); ctx.lineTo(bx+120,H*0.7); ctx.lineTo(bx-120,H*0.7); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
    // Sparkling aurora stars
    if(time%6===0 && particles.length < 200)
      particles.push({x:Math.random()*W, y:Math.random()*H*0.5, vx:0, vy:0.1, life:1.5, decay:0.008, sz:2, c:`hsla(${140+Math.random()*80},100%,80%,1)`});
  }
  else if(curTheme === 'biolume') {
    // Dark vignette — abyss feel
    const vigG = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3, W/2,H/2,Math.max(W,H)*0.8);
    vigG.addColorStop(0,'rgba(0,0,0,0)'); vigG.addColorStop(1,'rgba(0,0,30,0.5)');
    ctx.fillStyle=vigG; ctx.fillRect(0,0,W,H);
    // Bioluminescent orb glow — spawns glowing cyan/green particles
    if(time%5===0 && particles.length < 250)
      particles.push({x:Math.random()*W, y:80+Math.random()*(H-160), vx:(Math.random()-.5)*0.4, vy:(Math.random()-.5)*0.4, life:2+Math.random(), decay:0.006, sz:3+Math.random()*3, c:`hsla(${170+Math.random()*40},100%,65%,1)`});
    // Pulsing orbs on canvas
    ctx.globalCompositeOperation='screen';
    for(let i=0;i<6;i++){
      const ox=W*(0.15+0.14*i)+Math.sin(time*0.004+i)*30;
      const oy=H*0.3+Math.sin(time*0.006+i*1.7)*H*0.2;
      const pulse=0.08+Math.abs(Math.sin(time*0.03+i))*0.12;
      const og=ctx.createRadialGradient(ox,oy,0,ox,oy,60);
      og.addColorStop(0,`rgba(0,255,210,${pulse})`); og.addColorStop(1,'rgba(0,255,210,0)');
      ctx.fillStyle=og; ctx.fillRect(ox-60,oy-60,120,120);
    }
    ctx.globalCompositeOperation='source-over';
  }
  else if(curTheme === 'sakura') {
    // Soft pink blooming glow from top
    const skG = ctx.createLinearGradient(0,0,0,H*0.4);
    skG.addColorStop(0,'rgba(255,150,190,0.12)'); skG.addColorStop(1,'rgba(255,120,170,0)');
    ctx.fillStyle=skG; ctx.fillRect(0,0,W,H*0.4);
    // Falling petal particles
    if(time%8===0 && particles.length < 200)
      particles.push({x:Math.random()*W, y:-10, vx:(Math.random()-.5)*0.8, vy:0.6+Math.random()*0.8, life:1, decay:0.004, sz:4+Math.random()*3, petal:true, c:`hsla(${340+Math.random()*20},90%,${80+Math.random()*10}%,1)`});
    // Gentle shimmer overlay
    ctx.globalCompositeOperation='screen';
    ctx.fillStyle=`rgba(255,180,210,${0.02+Math.sin(time*0.02)*0.01})`;
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
  }
  else if(curTheme === 'sunset') {
    // Warm orange horizon glow
    const sunG = ctx.createLinearGradient(0, H*0.35, 0, H*0.65);
    sunG.addColorStop(0,'rgba(255,150,30,0)'); sunG.addColorStop(0.5,'rgba(255,90,0,0.18)'); sunG.addColorStop(1,'rgba(180,20,0,0)');
    ctx.fillStyle=sunG; ctx.fillRect(0, H*0.35, W, H*0.3);
    // Sun shimmer sparkles on water surface
    if(time%10===0 && particles.length < 150)
      particles.push({x:Math.random()*W, y:80+Math.random()*60, vx:(Math.random()-.5)*2, vy:-0.5-Math.random(), life:0.8, decay:0.025, sz:2, c:`rgba(255,200,80,1)`});
  }
  else if(curTheme === 'abyss') {
    // Heavy vignette — crushing dark
    const abG = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.15, W/2,H/2,Math.max(W,H));
    abG.addColorStop(0,'rgba(0,0,0,0)'); abG.addColorStop(1,'rgba(0,0,5,0.75)');
    ctx.fillStyle=abG; ctx.fillRect(0,0,W,H);
    // Occasional deep-sea bioluminescent flash
    if(time%120===0) particles.push({x:Math.random()*W, y:Math.random()*H, vx:0, vy:0, life:1.5, decay:0.005, sz:4, c:'rgba(100,200,255,1)'});
  }
  else if(curTheme === 'reef') {
    // Bright caustic shimmer from top
    ctx.globalCompositeOperation='screen';
    for(let i=0;i<6;i++){
      const cx = W*(0.1+0.16*i)+Math.sin(time*0.007+i)*25;
      const cy = 40+Math.cos(time*0.009+i*1.3)*20;
      const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,50);
      cg.addColorStop(0,`rgba(100,240,255,${0.06+Math.abs(Math.sin(time*0.05+i))*0.06})`);
      cg.addColorStop(1,'rgba(0,240,255,0)');
      ctx.fillStyle=cg; ctx.fillRect(cx-50,cy-50,100,100);
    }
    ctx.globalCompositeOperation='source-over';
  }

  function drawFlora(sw) {
    // Slower, more subtle swaying for organic look
    const timeMod = time * 0.006 + sw.ph;
    const swayBase = Math.sin(timeMod) * (4 + sw.h * 0.06);
    const swayExtra = Math.sin(timeMod * 2.4 - sw.ph) * 1; 
    const sway = swayBase + swayExtra;
    ctx.lineCap = 'round';
    
    if(sw.type === 'seaweed') {
      for(let b=0; b<3; b++) {
        ctx.beginPath();
        let s = sw.seeds[b];
        let px = sw.x + (b-1)*8 + (s*6-3), py = H-85;
        ctx.moveTo(px, py);
        const hScale = sw.h * (0.6 + s*0.6);
        const bSway = sway * (0.7 + s*0.6);
        const cp1x = px + bSway * 0.4 + (s*10-5), cp1y = py - hScale * 0.5;
        const endX = px + bSway, endY = py - hScale;
        ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);
        const g = ctx.createLinearGradient(px, py, endX, endY);
        g.addColorStop(0, `hsla(${sw.hue}, ${sw.sat}%, ${15 + b*5}%, 0.8)`);
        g.addColorStop(1, `hsla(${sw.hue + 10}, ${sw.sat + 10}%, ${40 + b*10}%, 0.1)`);
        ctx.strokeStyle = g; ctx.lineWidth = Math.max(2, 6 - b - s*2); ctx.stroke();
      }
    } else if(sw.type === 'grass') {
      for(let b=0; b<5; b++) {
        ctx.beginPath();
        let s = sw.seeds[b];
        let px = sw.x + (b-2)*4 + (s*4-2), py = H-85;
        ctx.moveTo(px, py);
        const hScale = sw.h * (0.5 + s*0.7);
        const bSway = sway * (0.8 + s*0.5);
        const cp1x = px + bSway * 0.6 + (s*8-4), cp1y = py - hScale * 0.5;
        const endX = px + bSway, endY = py - hScale;
        ctx.quadraticCurveTo(cp1x, cp1y, endX, endY);

    // Species label + rare badge above egg (rendered above front flora)
  }
  
  for(const s of snails){updateSnail(s);drawSnail(s);}

  for(const c of clams){

    const breath = Math.sin(c.timer*.02);

    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(0,12,25,8,0,0,Math.PI*2);ctx.fill();

    sgB.addColorStop(0, '#475569'); sgB.addColorStop(1, '#94a3b8');
    ctx.fillStyle = sgB;
    ctx.beginPath(); ctx.ellipse(0, 5, 20, 12, 0, 0, Math.PI*2); ctx.fill();

    const sgT = ctx.createLinearGradient(0,10, 0,-15);

    ctx.beginPath(); ctx.ellipse(0, -2, 22, 14, 0, 0, Math.PI*2); ctx.fill();

    }
  }

  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];b.y-=b.spd;b.x+=Math.sin(time*.004+b.ph)*.6;
    if(b.y<-10){bubbles.splice(i,1);continue;}
    const bDef = BUBBLES[curBubble];
    const isRainbow = curBubble === 'rainbow';
    const hue = (time*2 + b.x) % 360;
    const strokeA = b.life * 0.85;
    const fillA = b.life * 0.22;
    let bcol, bfill;
    if(isRainbow) {
      bcol  = `hsla(${hue}, 100%, 80%, ${strokeA})`;

    } else {
      bcol  = bDef.col.replace('{a}', strokeA);
      bfill = bDef.fill.replace('{fa}', fillA);
    }
    
    ctx.save();
    ctx.lineWidth = Math.max(1, b.r * (b.v === 1 ? 0.35 : 0.22));
    ctx.strokeStyle = bcol;
    ctx.fillStyle = bfill;
    
    // Draw Varied Bubble Shapes
    ctx.beginPath();
    if(b.v === 2) { // Slightly elongated
      ctx.ellipse(b.x, b.y, b.r * 0.9, b.r * 1.1, Math.sin(time*0.01 + b.ph)*0.1, 0, Math.PI * 2);

       ctx.beginPath(); ctx.arc(b.x - b.r*0.4, b.y - b.r*0.4, b.r*0.2, 0, Math.PI*2);
       ctx.fillStyle = `rgba(255,255,255,${b.life*0.4})`; ctx.fill();
    }

    ctx.fill();
    
    ctx.restore();
  }
  ctx.lineWidth = 1;
  if(bubbles.length<20&&Math.random()<.05)bubbles.push({x:20+Math.random()*(W-40),y:H+10,r:3+Math.random()*6,spd:.8+Math.random()*1.2,ph:Math.random()*Math.PI*2,life:.6+Math.random()*.4, v:Math.floor(Math.random()*4)});

  for(let i=foodList.length-1;i>=0;i--){
    const fd=foodList[i];
    if(fd.eaten)fd.life-=.1;
    else{
      // methodic buoyancy: slow sink with gentle horizontal drift
      fd.vy=Math.min(fd.vy+.002, 0.2);

      if(fd.y>=FOOD_FL(fd.x)){fd.y=FOOD_FL(fd.x);fd.vy=0;fd.vx=0;fd.life-=.002;if(Math.random()<.05)algae=Math.min(100,algae+.1);}
    }

    ctx.globalAlpha=Math.max(0,fd.life);
    ctx.beginPath();ctx.ellipse(fd.x,fd.y,4.5,3.5,0,0,Math.PI*2);

  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=(p.decay||0.03);
    if(p.life<=0){particles.splice(i,1);continue;}
    const sz = p.sz || 3;
    const alpha = Math.min(1, p.life);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.c;
    ctx.beginPath();
    if(p.petal) { // sakura petal — small rotated ellipse
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.x*0.01+p.life); ctx.ellipse(0,0,sz,sz*0.5,0,0,Math.PI*2); ctx.restore();
    } else {
      ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
    }
ctx.fill();
  }ctx.globalAlpha=1;

  // ── PERF: Sort fish by scale only every 30 frames (scale changes slowly) ──
  if(time%30===0) fishList.sort((a,b)=>a.scale-b.scale);
  const d=window.devicePixelRatio||1;
  for(const f of fishList){ drawFish(f); }
  for(const f of fishList){ drawFishName(f); }

  // Draw visitors
  for(const v of visitorList) {
    drawFish(v);
    if(!v.spooked && v.trust > 0) {
      const trustAlpha = (v.trust / 100) * 0.6;
      const ringSize = (v.def.sz || 24) * (v.genes.szMod||1) * 1.8;
      ctx.save();
      ctx.beginPath();
      ctx.arc(v.x, v.y, ringSize, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${trustAlpha})`;
      ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath();
      ctx.arc(v.x, v.y, ringSize + 4, -Math.PI/2, -Math.PI/2 + (v.trust/100)*Math.PI*2);
      ctx.strokeStyle = `rgba(168,85,247,${0.4 + trustAlpha * 0.4})`;
      ctx.lineWidth = 3; ctx.stroke();
      ctx.restore();
    }
    ctx.save();
    ctx.font = 'bold 9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(168,85,247,0.8)';
    ctx.fillText('[ ' + v.def.name + ' ]', v.x, v.y - (v.def.sz||24)*1.5 - 10);
    ctx.restore();
  }
  
  // Lanternfish ambient glow
  for(const f of fishList) {
    if(f.name === 'Lanternfish' || (f.isAbyssal && TYPES[f.type]?.name === 'Lanternfish')) {
      const lg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 40);
      lg.addColorStop(0, 'rgba(255,200,100,0.12)');
      lg.addColorStop(1, 'rgba(255,200,100,0)');
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = lg;
      ctx.fillRect(f.x-40, f.y-40, 80, 80);
      ctx.restore();
    }
  }

  for(const sw of seaweeds) { if(sw.z === 'front') drawFlora(sw); }

  // Egg timers ABOVE flora
  const now = Date.now();
  for(const e of eggs){
    if(e.hatchTime===undefined){e.hatchTime=now+(e.timer||0)*16.666;delete e.timer;}
    const msLeft = Math.max(0, e.hatchTime - now);
    const secs = Math.ceil(msLeft / 1000);
    let str = '';
    if(secs >= 3600) str = Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
    else if(secs >= 60) str = Math.floor(secs/60) + 'm ' + String(secs%60).padStart(2,'0') + 's';
    else str = secs + 's';
    ctx.font = 'bold 9px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillText(str, e.x, e.y - 14);
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillText(str, e.x, e.y - 15);
  }

  // ── PERF: Offscreen-cached substrate ──
  if(_substrateDirty || !_substrateCanvas || _substrateCanvas.width!==W || _substrateCanvas.height!==H) {
    _substrateDirty = false;
    _substrateCanvas = document.createElement('canvas');
    _substrateCanvas.width = W; _substrateCanvas.height = H;
    const sc = _substrateCanvas.getContext('2d');
    const fl = FLOORS[curFloor];
    const by = H - 85;
    const getH = (x) => Math.sin(x * 0.015) * 6 + Math.cos(x * 0.03) * 3;
    // Base floor fill
    sc.fillStyle = fl.c;
    sc.beginPath(); sc.moveTo(-20, H + 5); sc.lineTo(-20, by + getH(-20));
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i));
    sc.lineTo(W + 40, H + 5); sc.fill();
    // Clip all substrate textures to floor area
    sc.save();
    sc.beginPath(); sc.moveTo(-20, by + getH(-20));
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i));
    sc.lineTo(W + 40, H + 5); sc.lineTo(-20, H + 5); sc.closePath(); sc.clip();
    // Depth shadow gradient
    const grad = sc.createLinearGradient(0, by - 10, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.5)');
    sc.fillStyle = grad; sc.fillRect(0, by - 15, W, 150);
    // Per-floor grain/pebble texture
    const grainCol = fl.grain || '#ffffff';
    for(let i = 0; i < 600; i++) {
       const r1 = Math.abs((Math.sin(i * 12.9898) * 43758.5453) % 1);
       const r2 = Math.abs((Math.cos(i * 78.233)  * 43758.5453) % 1);
       const r3 = Math.abs((Math.sin(i * 37.719)  * 43758.5453) % 1);
       const gx = -20 + r1 * (W + 40);
       const gy = by + getH(gx) + r2 * 110;
       // grain pebbles
       const sz = 1.5 + r3 * 4.5;
       const alpha = 0.08 + r3 * 0.28;
       sc.fillStyle = grainCol;
       sc.globalAlpha = alpha;
       sc.beginPath(); sc.arc(gx, gy, sz, 0, Math.PI * 2); sc.fill();
       // occasional brighter highlight
       if(i % 10 === 0) {
         sc.globalAlpha = alpha * 1.8;
         sc.beginPath(); sc.arc(gx - sz * 0.35, gy - sz * 0.35, sz * 0.4, 0, Math.PI * 2); sc.fill();
       }
    }
    sc.globalAlpha = 1;
    // Special textures per floor type
    if(curFloor === 'crystal') {
      // Amethyst sparkle shards
      for(let i = 0; i < 60; i++) {
        const r1 = Math.abs((Math.sin(i * 51.7) * 43758.5) % 1);
        const r2 = Math.abs((Math.cos(i * 23.3) * 43758.5) % 1);
        const r3 = Math.abs((Math.sin(i * 73.1) * 43758.5) % 1);
        const cx = r1 * W; const cy = by + r2 * 80;
        sc.save();
        sc.translate(cx, cy); sc.rotate(r3 * Math.PI);
        const sg = sc.createLinearGradient(-6, -12, 6, 12);
        sg.addColorStop(0, 'rgba(216,180,254,0.9)'); sg.addColorStop(0.5, 'rgba(255,255,255,0.95)'); sg.addColorStop(1, 'rgba(139,92,246,0.7)');
        sc.fillStyle = sg;
        sc.beginPath(); sc.moveTo(0,-10); sc.lineTo(4,0); sc.lineTo(0,10); sc.lineTo(-4,0); sc.closePath(); sc.fill();
        sc.restore();
      }
    } else if(curFloor === 'snow') {
      // Ice crack lines
      sc.strokeStyle = 'rgba(224,242,254,0.5)'; sc.lineWidth = 1;
      for(let i = 0; i < 20; i++) {
        const r1 = Math.abs((Math.sin(i * 41.7) * 43758.5) % 1);
        const r2 = Math.abs((Math.cos(i * 29.3) * 43758.5) % 1);
        const r3 = Math.abs((Math.sin(i * 67.1) * 43758.5) % 1);
        sc.beginPath(); sc.moveTo(r1 * W, by + r2 * 60);
        sc.lineTo(r1 * W + (r3 - 0.5) * 80, by + r2 * 60 + 30 + r3 * 40); sc.stroke();
      }
    } else if(curFloor === 'gold') {
      // Gold glimmer sparkles
      sc.fillStyle = 'rgba(255,255,180,0.9)';
      for(let i = 0; i < 80; i++) {
        const r1 = Math.abs((Math.sin(i * 53.9) * 43758.5) % 1);
        const r2 = Math.abs((Math.cos(i * 31.7) * 43758.5) % 1);
        sc.globalAlpha = 0.4 + r2 * 0.5;
        sc.beginPath(); sc.arc(r1 * W, by + r2 * 90, 1 + r1 * 1.5, 0, Math.PI * 2); sc.fill();
      }
      sc.globalAlpha = 1;
    } else if(curFloor === 'coral') {
      // Coral branch stumps
      for(let i = 0; i < 25; i++) {
        const r1 = Math.abs((Math.sin(i * 47.2) * 43758.5) % 1);
        const h = 12 + r1 * 20;
        const cx = (i / 25) * W + (r1 - 0.5) * 20;
        const cy = by + 2;
        sc.strokeStyle = `rgba(251,146,60,${0.5 + r1 * 0.45})`; sc.lineWidth = 3 + r1 * 3; sc.lineCap = 'round';
        sc.beginPath(); sc.moveTo(cx, cy + h); sc.lineTo(cx, cy);
        sc.lineTo(cx - 5, cy - 6); sc.moveTo(cx, cy); sc.lineTo(cx + 5, cy - 5); sc.stroke();
      }
    }
    sc.restore();
    // surface edge highlight
    sc.strokeStyle = 'rgba(255,255,255,0.2)'; sc.lineWidth = 2;
    sc.beginPath(); sc.moveTo(-20, by + getH(-20));
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i));
    sc.stroke();
    sc.strokeStyle = 'rgba(0,0,0,0.25)'; sc.lineWidth = 1;
    sc.beginPath(); sc.moveTo(-20, by + getH(-20) + 2);
    for(let i = -20; i <= W + 40; i += 20) sc.lineTo(i, by + getH(i) + 2);
    sc.stroke();
  }
  ctx.drawImage(_substrateCanvas, 0, 0);

  // ── Border rendered on canvas (box-shadow is clipped by body overflow:hidden) ──
  if(curBorder !== 'none') {
    const bd = BORDERS[curBorder];
    const thick = 14;
    const pulse = curBorder === 'pulse' ? 0.55 + 0.45 * Math.abs(Math.sin(time * 0.04)) :
                  curBorder === 'electric' ? 0.6 + 0.4 * Math.abs(Math.sin(time * 0.08)) : 0.85;
    const alpha = pulse;
    const gAlpha = pulse * 0.35;
    ctx.save();
    // outer glow
    ctx.shadowBlur = 28;
    ctx.shadowColor = `rgba(${bd.r},${bd.g},${bd.gb},${gAlpha + 0.15})`;
    ctx.strokeStyle = `rgba(${bd.r},${bd.g},${bd.gb},${alpha})`;
    ctx.lineWidth = thick;
    ctx.strokeRect(thick/2, thick/2, W - thick, H - thick);
    // inner bright rim
    ctx.shadowBlur = 14;
    ctx.strokeStyle = `rgba(${Math.min(255,bd.r+80)},${Math.min(255,bd.g+80)},${Math.min(255,bd.gb+80)},${alpha * 0.5})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(thick + 2, thick + 2, W - thick * 2 - 4, H - thick * 2 - 4);
    // corner decorations
    const cr = 22;
    ctx.lineWidth = 3;
    ctx.strokeStyle = `rgba(${bd.r},${bd.g},${bd.gb},${alpha})`;
    [[cr,cr],[W-cr,cr],[cr,H-cr],[W-cr,H-cr]].forEach(([cx2,cy2]) => {
      ctx.beginPath();
      ctx.arc(cx2, cy2, cr * 0.65, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  saveTimer++;
  if(saveTimer>=1800){saveTimer=0;saveGame();}

} catch(crashError) {
  // Log every crash to console so subsequent failures are visible
  console.error('[ZenAquarium] LOOP CRASH:', crashError);
  window._lastLoopError = crashError;
  window._loopCrashCount = (window._loopCrashCount||0) + 1;
  // Show overlay only once to avoid spam, but make it dismissable
  if(!window.crashedAlready) {
    window.crashedAlready=true;
    try {
      const errBox = document.createElement('div');
      errBox.id = '_zaCrashBox';
      errBox.style.cssText = 'position:fixed;inset:0;background:#1e1b4b;color:#fef3c7;z-index:999999;font-family:monospace;padding:20px;font-size:14px;overflow:auto;word-wrap:break-word;background-clip:padding-box;';
      errBox.innerHTML = '<h2 style="color:#fbbf24">'+ICONS.warning+' Loop Error (recovering)</h2><div style="margin:10px 0">'+(crashError.message||crashError)+'</div><pre style="font-size:11px;white-space:pre-wrap;color:#a5b4fc">'+(crashError.stack||'')+'</pre><button onclick="document.getElementById(\'_zaCrashBox\').remove()" style="margin-top:12px;padding:8px 16px;background:#7c3aed;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">Dismiss</button>';
      document.body.appendChild(errBox);
    } catch(e) {}
  }
}
// CRITICAL: Always reschedule the next frame, even on crash, so we recover.
requestAnimationFrame(loop);
}

// ── PERF: Pause loop when tab/app is hidden to save battery ──

function dropFood(x,y) {
  if(foodList.length<fishList.length*5+10){
    const n=UPGRADES.flakes.owned?2:1;
    for(let i=0;i<n;i++)foodList.push({x:x+(Math.random()-.5)*16,y:Math.max(40,Math.min(y,H-85))+(Math.random()-.5)*8,vx:(Math.random()-.5)*1.2,vy:0.4,life:1,eaten:false});
  }
}

function doTap(x,y){
  if(isClean){
    if(algae>0){
      algae=Math.max(0,algae-.5);sm.cleaned+=.5;
      giveXP(2);
      if(Math.random()<.3)bubbles.push({x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,r:2+Math.random()*3,spd:3,ph:0,life:1});
      if(Math.random()<.08)spawnJuice(x,y, ICONS.clean,'#34d399',.8);
    }
  }else{
    // Check visitor tap first
    for(const v of visitorList) {
      const sz = (v.def.sz || 24) * 1.5;
      if(Math.hypot(v.x - x, v.y - y) < sz) {
        if(v.spooked) return;
        v._tapCount = (v._tapCount || 0) + 1;
        v._tapReset = 180;
        if(v._tapCount > 5) {
          v.spooked = true; v.spookedTimer = 300;
          v.trust = Math.max(0, v.trust - 20); v._tapCount = 0;
          toast('You spooked the ' + v.def.name + '!', '#ef4444');
        } else {
          v.trust = Math.min(100, v.trust + 8);
          for(let i=0;i<3;i++) particles.push({x:v.x,y:v.y-20,vx:(Math.random()-.5)*2,vy:-1-Math.random()*1.5,life:0.8,c:'#a855f7'});
        }
        return;
      }
    }
    let hitFish = null;
    for(const f of fishList) {
      const s = TYPES[f.type].sz * f.scale * (f.genes.szMod||1);
      if(Math.hypot(f.x - x, f.y - y) < s * 2) { hitFish = f; break; }
    }
    if(hitFish) {
      hitFish._nameTs = Date.now();
      if(hitFish.bonded < 300) { 
        hitFish.bonded = 3600;
        sm.bonded++;
        for(let i=0;i<6;i++) particles.push({x:x,y:y-30,vx:(Math.random()-.5)*3,vy:-1-Math.random()*2,life:1,c:'#fb7185'});
      }
      return; 
    }
    dropFood(x,y);
  }
}

cv.addEventListener('pointerdown',e=>{
  if(document.querySelector('.panel.open')||e.target.closest('#ui')||e.target.closest('#nav'))return;
  pDown=true;lx=e.clientX;ly=e.clientY;
  doTap(lx,ly);
  // Combo quest tracking
  currentOrders.forEach(o => { if(o.metric==='comboTaps') o.progress = Math.min(o.target, (o.progress||0)+1); });
});
cv.addEventListener('pointermove',e=>{
  if(!pDown) return;
  if(isClean) {
    const d=Math.hypot(e.clientX-lx,e.clientY-ly);
    if(d>10){doTap(e.clientX,e.clientY);lx=e.clientX;ly=e.clientY;}
  } else {
    const d = Math.hypot(e.clientX-lx, e.clientY-ly);
    if(d > 35) { dropFood(e.clientX, e.clientY); lx = e.clientX; ly = e.clientY; }
  }
});
cv.addEventListener('pointerup',()=>pDown=false);

function spawnJuice(x,y,html,color,scale=1){

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

function giveXP(base){
  const isActive=(Date.now()-_lastActiveFeed)<30000;
  let mult=isActive?(isHarmony?2.0:1.25):(isHarmony?1.5:1.0);
  const xpFish=fishList.find(f=>f._colorBonus?.bonus==='xpMult');
  if(xpFish)mult*=xpFish._colorBonus.val;
  playerXP+=Math.ceil(base*mult);
  checkLevel();
}

function checkLevel(){
  const old=playerLevel;
  const maxIdx=XP_THRESHOLDS.length-1;
  for(let i=maxIdx;i>=1;i--){
    if(playerXP>=XP_THRESHOLDS[i]){playerLevel=i+1;break;}
  }
  playerLevel=Math.min(50,playerLevel);
  if(playerLevel>old){
    document.getElementById('lvl').textContent=playerLevel;
    spawnJuice(W/2,H/4,ICONS.star+' LEVEL UP!','var(--ui-accent)',2);
    document.getElementById('nb-shop').classList.add('notify');
    checkMilestones();
    const unlocks=(LEVEL_UNLOCKS[playerLevel]||['Higher Quest Multipliers','Increased Base Rewards']);
    document.getElementById('lvlnum').textContent=playerLevel;
    document.getElementById('lvlunlocks').innerHTML=unlocks.map(u=>'• '+u).join('<br>');
    if(CELEBRATION_LEVELS.has(playerLevel)){
      document.getElementById('lvlmodal').classList.add('show','celebrate');
      setTimeout(()=>document.getElementById('lvlmodal').classList.remove('celebrate'),3000);
    } else {
      document.getElementById('lvlmodal').classList.add('show');
    }
  }
  updateHUD();
  checkEraUnlock();
}

function checkEraUnlock(){
  const ERA_REQ_LEVELS=[0,8,16,24,32,40];
  for(let i=ERA_REQ_LEVELS.length-1;i>=1;i--){
    const levelOk=playerLevel>=ERA_REQ_LEVELS[i];
    const abyssOk=i<5||(sm.visitorsTamed>=1);
    if(levelOk&&abyssOk&&i>currentEra){
      currentEra=i;
      showEraAnnouncement(i);
      toast(ICONS.wave+' Era unlocked: '+['Tidepool','Shallows','Coral Reef','Twilight Zone','Open Ocean','Abyss'][i],'#a855f7');
      saveGame();
      break;
    }
  }
}

function tickVisitor() {
  const now = Date.now();
  if(now - _lastVisitorCheck < 60000) return; // check every 60 s
  _lastVisitorCheck = now;
  if(visitorList.length > 0) return;
  if(fishList.length === 0) return;
  const eligible = Object.entries(VISITOR_SPECIES).filter(([k,v]) => v.era <= currentEra);
  if(!eligible.length) return;
  // Per-check chance = hourlyRate / 60, so average rate caps at 10 %/hr at era 5
  const hourlyRate = Math.min(0.10, 0.02 + currentEra * 0.016);
  const baseChance = hourlyRate / 60;
  if(Math.random() > baseChance) return;
  const weights = eligible.map(([k,v]) => v.rarity);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  let chosen = null, chosenKey = null;
  for(const [k,v] of eligible) { r -= v.rarity; if(r <= 0) { chosen = v; chosenKey = k; break; } }
  if(!chosen) { chosen = eligible[0][1]; chosenKey = eligible[0][0]; }
  let echoCopy = null;
  if(chosen.isEcho) {
    const base = [...fishList].sort((a,b) => (b.isRare?1:0) - (a.isRare?1:0) || b.age - a.age)[0];
    if(!base) return;
    echoCopy = base;
  }
  spawnVisitor(chosenKey, chosen, echoCopy);
}

function spawnVisitor(key, def, echoCopy) {
  const fromLeft = Math.random() < 0.5;
  const genes = echoCopy
    ? { ...echoCopy.genes, szMod: 1.0 }
    : { c1:[def.c1, def.c1], c2:[def.c2, def.c2], trait:['active','active'], szMod:1.0 };
  const sz = def.isEcho && echoCopy ? (TYPES[echoCopy.type]?.sz || 24) : def.sz;
  const v = {
    id: 'v_' + Date.now(),
    key, def,
    type: echoCopy ? echoCopy.type : 'guppy',
    x: fromLeft ? -80 : W + 80,
    y: 110 + Math.random() * (SWIM_BOT() - 200),
    vx: fromLeft ? 0.8 + Math.random()*0.4 : -(0.8 + Math.random()*0.4),
    vy: (Math.random() - 0.5) * 0.3,
    phase: Math.random() * Math.PI * 2,
    timer: 0, eat: 0, hunger: 100, age: 30000, scale: 1.0, bonded: 0, bcd: 0,
    genes, isRare: false, isVisitor: true,
    trust: 0, trustTimer: def.trustTime * 60, spooked: false, spookedTimer: 0,
    name: def.name, abyssal: def.abyssal || false, isEcho: def.isEcho || false,
    echoCopy: echoCopy ? echoCopy.type : null, _sz: sz,
    birthTime: Date.now() - 30000*16.666,
  };
  computeColorBonus(v);
  visitorList.push(v);
  toast(ICONS.eye+' '+def.name+' spotted...','#6366f1');
}

function updateVisitors() {
  for(let i = visitorList.length - 1; i >= 0; i--) {
    const v = visitorList[i];
    v.timer++;
    v.phase += 0.1;
    if(v._tapReset > 0) { v._tapReset--; if(v._tapReset <= 0) v._tapCount = 0; }
    v.vx *= 0.97; v.vy *= 0.97;
    if(v.timer % 90 === 0) { v.vx += (Math.random()-.5)*0.6; v.vy += (Math.random()-.5)*0.3; }
    const spd = v.def.spd;
    const cap = spd * 2;
    const sp = Math.hypot(v.vx, v.vy);
    if(sp > cap) { v.vx *= cap/sp; v.vy *= cap/sp; }
    if(Math.abs(v.vx) < spd * 0.3) v.vx += v.vx >= 0 ? 0.15 : -0.15;
    v.x += v.vx; v.y += v.vy;
    const mx=60, ty=110, by=SWIM_BOT();
    if(v.x < mx){ v.x=mx; v.vx=Math.abs(v.vx)*0.8; }
    if(v.x > W-mx){ v.x=W-mx; v.vx=-Math.abs(v.vx)*0.8; }
    if(v.y < ty){ v.y=ty; v.vy=Math.abs(v.vy)*0.8; }
    if(v.y > by){ v.y=by; v.vy=-Math.abs(v.vy)*0.8; }
    if(v.spooked) { v.spookedTimer--; if(v.spookedTimer <= 0) v.spooked = false; }
    if(!v.spooked) {
      for(const fd of foodList) {
        if(!fd.eaten && Math.hypot(fd.x-v.x, fd.y-v.y) < 60) {
          v.trust = Math.min(100, v.trust + 0.15);
          fd.eaten = true; v.eat = 18;
          break;
        }
      }
    }
    v.trustTimer--;
    if(v.trustTimer <= 0) {
      spawnJuice(v.x, v.y - 30, v.def.name + ' swam away...', '#94a3b8', 0.9);
      visitorList.splice(i, 1);
      continue;
    }
    if(v.trust >= 100) { tameVisitor(i); break; }
  }
}

function tameVisitor(idx) {
  const v = visitorList[idx];
  const def = v.def;
  const mF = baseMaxFish + (UPGRADES.tank.owned * 4);
  if((fishList.length + eggs.length) >= mF) {
    toast('Tank full! ' + def.name + ' could not join.', '#ef4444');
    visitorList.splice(idx, 1);
    return;
  }
  const newFish = {
    id: fid++,
    type: v.echoCopy || v.type,
    x: v.x, y: v.y, vx: v.vx, vy: v.vy,
    phase: v.phase, timer: 0, eat: 0,
    hunger: 100, age: 30000, birthTime: Date.now() - 30000*16.666,
    scale: 1.0, bonded: 3600, bcd: 0,
    genes: v.genes, isRare: def.abyssal || false,
    name: def.name, isAbyssal: def.abyssal || false, isEcho: def.isEcho || false,
  };
  computeColorBonus(newFish);
  recordAqEntry(newFish);
  fishList.push(newFish);
  visitorList.splice(idx, 1);
  sm.visitorsTamed = (sm.visitorsTamed || 0) + 1;
  if(def.abyssal) sm.abyssalTamed = (sm.abyssalTamed || 0) + 1;
  giveXP(def.abyssal?300:100);
  spawnJuice(newFish.x, newFish.y - 30, ICONS.sparkle+' '+def.name+' Tamed!', '#a855f7', 2.0);
  for(let i=0;i<12;i++) particles.push({x:newFish.x+(Math.random()-.5)*40,y:newFish.y,vx:(Math.random()-.5)*5,vy:-2-Math.random()*4,life:1.2,c:'#a855f7'});
  toast(ICONS.wave+' '+def.name+' joined your aquarium!','#a855f7');
  updateHUD();
  saveGame();
  checkEraUnlock();
  setTimeout(()=>{
    const nn=prompt('Name your '+def.name+' (leave blank to skip):','');
    if(nn!==null&&nn.trim()!==''){newFish.name=nn.trim().substring(0,16);newFish._nameTs=Date.now();saveGame();}
  },800);
}

function checkMilestones() {
  currentOrders.forEach(o => {
    if(o.metric==='rares_owned') o.progress = fishList.filter(f=>f.isRare).length;
    if(o.metric==='level7' && playerLevel >= 7) o.progress = 1;
    if(o.metric==='milestone_5m' && totalCoins >= 5000000) o.progress = 1;
  });
}

let currentTab='tank';
function setTab(t){
  if(t===currentTab && t!=='tank' && document.querySelector('.panel.open')){

  }
  currentTab=t;
  if(t==='tank') closeAll();
  else {

function getPersonality(f) {
  const p1 = ['Playful','Calm','Curious','Vibrant','Loyal','Grumpy'][f.id % 6];
  const p2 = ['Bubbler','Explorer','Dancer','Watcher','Zinger','Floaty'][Math.floor(f.id/10) % 6];
  const likes = ['Green Algae','Bubbles','Sand','Snails','Food Plankton'][f.id % 5];
  const dislikes = ['Dirty Water','Noise','Empty Tanks','Cold'][Math.floor(f.id/7) % 4];
  return { desc: `${p1} ${p2}`, likes, dislikes };
}

function buildAquapedia() {
  const el = document.getElementById('aqlist');

  const BAND_INK = {
    Crimson:  { bg:'#5a1414', border:'#8a2828', label:'#e8a0a0' },
    Ember:    { bg:'#5a2c0a', border:'#904814', label:'#f0b878' },
    Solar:    { bg:'#504400', border:'#847000', label:'#e8d87a' },
    Verdant:  { bg:'#143a22', border:'#226038', label:'#80cfa0' },
    Abyssal:  { bg:'#082e3c', border:'#0e5268', label:'#72c8e8' },
    Void:     { bg:'#22143e', border:'#4a2e80', label:'#c0a0e8' },
    Prismatic:{ bg:'#3a1028', border:'#7a2852', label:'#f0a8d0' },
  };
  const BAND_SYM = { Crimson:'✦', Ember:'✶', Solar:'☀', Verdant:'✿', Abyssal:'〜', Void:'◈', Prismatic:'✧' };
  const nonPrismaticCount = COLOR_BANDS.filter(b => b.name !== 'Prismatic').length;
  const totalBands = COLOR_BANDS.length;

  // ── Cover ──
  let html = `
  <div style="background:linear-gradient(180deg,#1a110a,#261608,#1a110a);border-bottom:3px double #6a4c22;padding:22px 18px 16px;text-align:center;">
    <div style="font-family:Georgia,serif;font-size:8px;letter-spacing:3px;color:#6a4c22;text-transform:uppercase;margin-bottom:5px;">The Grand</div>
    <div style="font-family:Georgia,serif;font-size:24px;font-weight:700;color:#e0b85a;letter-spacing:2px;line-height:1;">Aquapedia</div>
    <div style="font-family:Georgia,serif;font-size:8px;letter-spacing:2px;color:#5a3c18;margin-top:4px;text-transform:uppercase;">Ocean Records &amp; Chromatic Registry</div>
    <div style="width:50px;height:1px;background:linear-gradient(90deg,transparent,#6a4c22,transparent);margin:10px auto 8px;"></div>
    <div style="font-family:Georgia,serif;font-size:9px;color:#4a3010;font-style:italic;">"Let all hues be known before the Prismatic may swim."</div>
  </div>`;

  // ── Species entries ──
  let cardIdx = 0;
  for(const [key, def] of Object.entries(TYPES)) {
    const seen = sm.aqSeen?.[key] || [];
    const prismaticUnlocked = hasPrismaticUnlocked(key);
    const seenCount = seen.length;
    const discovered = def.req <= playerLevel;
    const delay = (cardIdx * 40) + 'ms';
    cardIdx++;

    // progress bar: use scaleX so no layout reflow
    const scaleX = (seenCount / totalBands).toFixed(3);
    const barColor = prismaticUnlocked ? '#c0905a' : (seenCount >= nonPrismaticCount && seenCount > 0 ? '#8a6c40' : '#4a3010');

    // Band stamps — staggered pop for seen ones
    const stamps = COLOR_BANDS.map((b, si) => {
      const isSeen = seen.includes(b.name);
      const ink = BAND_INK[b.name];
      const sym = BAND_SYM[b.name] || '●';
      const isPrismatic = b.name === 'Prismatic';
      const locked = isPrismatic && !prismaticUnlocked;
      const stampDelay = (si * 35) + 'ms';
      if(locked && !isSeen) {
        return `<div class="aq-stamp" title="Prismatic — locked" style="width:30px;height:30px;border-radius:5px;background:#0c0806;border:1px dashed #3a2010;display:flex;align-items:center;justify-content:center;opacity:0.4;flex-shrink:0;">
          <div style="width:12px;height:12px;color:#4a3010;">${ICONS.lock}</div></div>`;
      }
      return `<div class="aq-stamp${isSeen?' seen':''} ${isSeen?'aq-stamp-pop':''}" title="${b.name}"
        style="width:30px;height:30px;border-radius:5px;background:${isSeen?ink.bg:'#0c0806'};border:1px solid ${isSeen?ink.border:'#2a1808'};
        display:flex;align-items:center;justify-content:center;flex-shrink:0;
        ${isSeen?'':'opacity:0.28;'}animation-delay:${isSeen?stampDelay:'0ms'};">
        <span style="font-size:13px;line-height:1;color:${isSeen?ink.label:'#2a1808'};">${sym}</span>
      </div>`;
    }).join('');

    // Seen band labels
    const seenLabels = seen.map(n => {
      const ink = BAND_INK[n];
      return `<span style="font-family:Georgia,serif;font-size:8px;padding:1px 6px;background:${ink.bg};color:${ink.label};border:1px solid ${ink.border};border-radius:2px;font-style:italic;letter-spacing:0.3px;">${n}</span>`;

    html += `
    <div class="aq-card" style="border-bottom:1px solid #2e1a0a;background:${discovered?'#160e08':'#100806'};${!discovered?'opacity:0.4;':''}animation-delay:${delay};">
      <div style="padding:13px 15px 11px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;">
          <div style="width:2px;align-self:stretch;background:linear-gradient(180deg,${prismaticUnlocked?'#b07840':'#3a2010'},transparent);border-radius:1px;flex-shrink:0;"></div>
          <span style="font-size:22px;">${def.icon}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-family:Georgia,serif;font-weight:700;font-size:13px;color:#d8a860;letter-spacing:0.4px;">${def.name}</div>
            <div style="font-family:Georgia,serif;font-size:9px;color:#6a4c22;font-style:italic;">${seenCount} of ${totalBands} bands recorded</div>
          </div>
          ${prismaticUnlocked
            ? `<div class="aq-prismatic-badge" style="font-family:Georgia,serif;font-size:9px;color:#f0a8d0;background:#280c1c;border:1px solid #6a2244;padding:3px 7px;border-radius:3px;letter-spacing:0.8px;white-space:nowrap;">✧ Prismatic</div>`
            : (seenCount >= nonPrismaticCount && seenCount > 0
                ? `<div style="font-family:Georgia,serif;font-size:9px;color:#c8a050;background:#1a1200;border:1px solid #5a4010;padding:3px 7px;border-radius:3px;font-style:italic;white-space:nowrap;">Almost...</div>`
                : '')}
        </div>

        <div style="display:flex;gap:4px;align-items:center;">${stamps}</div>

        ${seenLabels ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;">${seenLabels}</div>` : ''}

        <div style="margin-top:9px;height:3px;background:#1a0e06;border-radius:2px;overflow:hidden;">
          <div style="height:100%;transform-origin:left;transform:scaleX(${scaleX});background:linear-gradient(90deg,#3a2010,${barColor});border-radius:2px;transition:transform .55s cubic-bezier(.22,1,.36,1);"></div>
        </div>
      </div>
    </div>`;
  }

  html += `<div style="padding:14px;text-align:center;background:#100806;border-top:2px double #3a2010;">
    <span style="font-family:Georgia,serif;font-size:8px;color:#3a2010;letter-spacing:2px;">— Finis —</span>
  </div>`;

  el.innerHTML = html;
}
